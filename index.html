<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="RinggitMe"/>
<meta name="theme-color" content="#000000" media="(prefers-color-scheme:dark)"/>
<meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme:light)"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>RinggitMe</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  /* minimal-premium · neutral palette + single green accent */
  --bg:#f5f5f7;--bg2:#ffffff;--bg3:#f0f0f3;--bg4:#e7e7ec;
  --text:#111114;--text2:#6b6b73;--text3:#a3a3ab;
  --border:#ececf0;--border2:#dddde3;
  --green:#0a8a54;--green-bg:#e9f4ee;--red:#cf3b3b;--red-bg:#faecec;
  --blue:#0a8a54;--blue-bg:#e9f4ee;--orange:#b46a1a;--orange-bg:#f6efe6;--purple:#5b5b66;--purple-bg:#eeeef1;
  --accent:#0a8a54;--accent2:#0a8a54;
  --shadow:0 1px 2px rgba(17,17,20,.04);
  --shadow-lg:0 6px 24px rgba(17,17,20,.08);
  --r:16px;--rl:20px;--rx:24px;
  --font-display:'Space Grotesk',-apple-system,BlinkMacSystemFont,sans-serif;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#000000;--bg2:#121214;--bg3:#1b1b1f;--bg4:#27272d;
  --text:#f5f5f7;--text2:#9d9da6;--text3:#5f5f68;
  --border:#202024;--border2:#303036;
  --green:#34d27f;--green-bg:#0d2418;--red:#ff5b5b;--red-bg:#2a1111;
  --blue:#34d27f;--blue-bg:#0d2418;--orange:#d99a4e;--orange-bg:#241a0e;--purple:#9a9aa6;--purple-bg:#1c1c20;
  --accent:#34d27f;--accent2:#34d27f;
  --shadow:0 1px 2px rgba(0,0,0,.4);
  --shadow-lg:0 8px 30px rgba(0,0,0,.55);
}}
html{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;-webkit-font-smoothing:antialiased;height:100%;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;font-variant-numeric:tabular-nums;font-feature-settings:'tnum' 1;text-rendering:optimizeLegibility}
input,textarea,select{-webkit-user-select:text;user-select:text}
/* unified press feedback — gives every tappable element real "手感" */
.card,.acct,.fav-row,.po,.pill,.cat-btn,.ig-item,.mode-card,.btn,.mini,.t-ic,.add-btn,.ma button,.ni,.sec-a,.cc-acts .btn,.cdot,.pin-key,.face-btn{transition:transform .13s cubic-bezier(.2,.8,.2,1),background .16s ease,border-color .16s ease,opacity .13s ease,box-shadow .16s ease}
.fav-row:active,.po:active,.cat-btn:active,.mode-card:active,.acct:active,.sec-a:active{transform:scale(.975)}
.ni:active{transform:scale(.88);opacity:.6}
@keyframes contentIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.content.tabfade{animation:contentIn .28s cubic-bezier(.2,.85,.25,1)}
.app{position:relative;height:100%;width:100%;margin:0 auto;max-width:440px;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}

/* ── LOCK SCREEN ── */
.lock-screen{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 30px calc(var(--safe-bot) + 30px);z-index:200;text-align:center}
.lock-logo{width:76px;height:76px;border-radius:22px;background:var(--accent);display:flex;align-items:center;justify-content:center;margin:0 auto 22px;box-shadow:var(--shadow-lg)}
.lock-logo i{font-size:34px;color:#fff}
.lock-title{font-size:25px;font-weight:800;letter-spacing:-.5px;margin-bottom:7px}
.lock-sub{font-size:14px;color:var(--text3);line-height:1.55;margin-bottom:34px;max-width:280px}
.face-btn{width:100%;max-width:320px;padding:15px;border-radius:15px;background:var(--accent);border:none;color:#fff;font-size:16px;font-weight:650;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px;box-shadow:var(--shadow)}
.face-btn:active{transform:scale(.98);opacity:.92}
.face-btn.ghost{background:var(--bg2);color:var(--text);border:1px solid var(--border2);box-shadow:none}
.pin-btn-link{font-size:14px;color:var(--accent);cursor:pointer;padding:10px;margin-top:2px;font-weight:600}
.setup-box{width:100%;max-width:320px;background:var(--bg2);border-radius:16px;padding:18px;margin-bottom:20px;border:1px solid var(--border);box-shadow:var(--shadow);text-align:left}
.setup-box p{font-size:13px;color:var(--text2);line-height:1.6}
.pin-display{display:flex;gap:16px;justify-content:center;margin:22px 0}
.pin-dot{width:13px;height:13px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:all .15s}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);transform:scale(1.05)}
.pin-dot.error{background:var(--red);border-color:var(--red)}
.pin-pad{display:grid;grid-template-columns:repeat(3,76px);gap:14px;margin:14px auto 0}
.pin-key{height:72px;border-radius:50%;border:none;background:var(--bg2);font-size:26px;font-weight:500;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;transition:all .12s;user-select:none;box-shadow:var(--shadow)}
.pin-key:active{background:var(--bg4);transform:scale(.93)}
.pin-key.fn{background:transparent;box-shadow:none;font-size:20px;color:var(--text2)}
.pin-error{font-size:13px;color:var(--red);min-height:18px;margin-top:6px;font-weight:600}
.pin-attempts{font-size:11px;color:var(--text3);margin-top:4px}

/* ── TOP BAR ── */
.topbar{padding:calc(var(--safe-top) + 14px) 18px 12px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:var(--bg)}
.t-title{font-size:23px;font-weight:600;letter-spacing:-.5px}
.t-sub{font-size:11.5px;color:var(--text3);margin-top:2px;font-weight:500}
.t-r{display:flex;gap:6px;align-items:center}
.t-ic{width:38px;height:38px;border-radius:12px;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--shadow)}
.t-ic i{font-size:19px;color:var(--text2)}
.t-ic:active{transform:scale(.94)}

.content{flex:1;overflow-y:auto;padding:6px 16px calc(var(--safe-bot) + 96px);-webkit-overflow-scrolling:touch;overscroll-behavior:contain}

/* ── BOTTOM NAV ── */
.nav{position:absolute;bottom:0;left:0;right:0;display:flex;background:var(--bg2);background:color-mix(in srgb,var(--bg2) 88%,transparent);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-top:1px solid var(--border);padding:8px 6px calc(var(--safe-bot) + 8px);justify-content:space-around}
.ni{position:relative;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--text3);cursor:pointer;padding:8px 4px 6px;border:none;background:none;flex:1;font-weight:600;transition:color .15s}
.ni i{font-size:23px;transition:transform .18s cubic-bezier(.2,.8,.2,1)}
.ni.on{color:var(--accent)}
.ni.on i{transform:translateY(-2px) scale(1.06)}
.ni.on::after{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:16px;height:3px;border-radius:99px;background:var(--accent)}

/* numerals + titles in the display typeface for character */
.t-title,.hero-v,.hero-sv,.sv,.cc-owed,.acct-v,.aa-num,.txn-a,.aa-txn-a,.dh-r,.field input.big{font-family:var(--font-display)}
/* ── HERO · premium dark wealth card ── */
.hero{position:relative;border-radius:var(--rx);padding:22px 22px 6px;overflow:hidden;margin:10px 0 18px;color:#fff;background:linear-gradient(157deg,#232733 0%,#15171d 48%,#0b0c10 100%);border:1px solid rgba(255,255,255,.08);box-shadow:0 16px 36px rgba(0,0,0,.30)}
.hero::after{content:"";position:absolute;top:-90px;right:-70px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(52,210,127,.22),transparent 68%);pointer-events:none}
.hero::before{content:"";position:absolute;right:14px;bottom:34px;font-family:var(--font-display);font-size:120px;font-weight:700;color:rgba(255,255,255,.03);content:"RM";line-height:1;pointer-events:none}
.hero-top{display:flex;align-items:center;justify-content:space-between;position:relative}
.hero-l{font-size:12px;color:rgba(255,255,255,.62);font-weight:500;letter-spacing:.03em}
.hero-pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:5px 11px;border-radius:99px;background:rgba(255,255,255,.10);color:rgba(255,255,255,.85);position:relative}
.hero-v{font-size:43px;font-weight:600;letter-spacing:-1.5px;margin:8px 0 18px;color:#fff;line-height:1;position:relative}
.hero-row{display:flex;border-top:1px solid rgba(255,255,255,.12);margin:0 -22px;padding:0;position:relative}
.hero-stat{flex:1;min-width:0;padding:13px 16px;position:relative}
.hero-stat+.hero-stat::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:1px;background:rgba(255,255,255,.12)}
.hero-sl{font-size:10.5px;color:rgba(255,255,255,.55);margin-bottom:3px;font-weight:500}
.hero-sv{font-size:14.5px;font-weight:600;letter-spacing:-.3px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── STAT GRID ── */
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:14px 15px;box-shadow:var(--shadow)}
.sl{font-size:11.5px;color:var(--text3);margin-bottom:4px;font-weight:600}
.sv{font-size:20px;font-weight:800;letter-spacing:-.4px}
.g{color:var(--green)}.r{color:var(--red)}.b{color:var(--blue)}.w{color:var(--orange)}.p{color:var(--purple)}

.sec{font-size:12px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin:26px 2px 11px;display:flex;justify-content:space-between;align-items:center}
.sec-a{font-size:12px;color:var(--accent);cursor:pointer;font-weight:600;display:flex;align-items:center;gap:3px;text-transform:none;letter-spacing:0}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:15px;margin-bottom:10px;box-shadow:var(--shadow)}
.row{display:flex;align-items:center;gap:12px}
.name{font-size:15px;font-weight:650;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{font-size:10px;padding:3px 9px;border-radius:99px;font-weight:700;flex-shrink:0;letter-spacing:.02em}
.bcc{background:var(--red-bg);color:var(--red)}.bsav{background:var(--green-bg);color:var(--green)}.bew{background:var(--orange-bg);color:var(--orange)}.bsub{background:var(--blue-bg);color:var(--blue)}.bloan{background:var(--purple-bg);color:var(--purple)}

/* ── CREDIT CARD VISUAL (premium) ── */
.cc{position:relative;border-radius:var(--rl);padding:18px;color:#fff;overflow:hidden;margin-bottom:11px;box-shadow:0 14px 30px rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.09)}
.cc::after{content:"";position:absolute;top:-80px;right:-60px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.14),transparent 68%);pointer-events:none}
.cc-top{display:flex;align-items:flex-start;justify-content:space-between;position:relative;margin-bottom:16px}
.cc-name{font-size:15px;font-weight:600}
.cc-due{font-size:11px;opacity:.8;margin-top:3px;letter-spacing:.02em}
.cc-chip{width:34px;height:26px;border-radius:6px;background:linear-gradient(135deg,#f3e3b0,#c9ad63);position:relative;margin-bottom:16px;box-shadow:inset 0 0 0 .5px rgba(0,0,0,.15)}
.cc-chip::after{content:"";position:absolute;inset:5px 7px;border-radius:3px;border:.5px solid rgba(0,0,0,.18)}
.cc-owed-l{font-size:11px;opacity:.78;position:relative}
.cc-owed{font-size:28px;font-weight:600;letter-spacing:-.5px;position:relative;margin:2px 0 14px}
.cc-bar{height:5px;border-radius:99px;background:rgba(255,255,255,.22);overflow:hidden;position:relative}
.cc-bar i{display:block;height:100%;border-radius:99px;background:#fff}
.cc-foot{display:flex;justify-content:space-between;font-size:11px;opacity:.85;margin-top:8px;position:relative}
.cc-acts{display:flex;gap:7px;margin:-1px 0 13px;flex-wrap:wrap}

/* ── ACCOUNT ROW (saving / ew) ── */
.acctcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:15px;margin-bottom:10px;box-shadow:var(--shadow)}
.acct-top{display:flex;align-items:center;gap:12px}
.acct-m{flex:1;min-width:0}
.acct-n{font-size:15px;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acct-s{font-size:11.5px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acct-b{text-align:right;flex-shrink:0;padding-left:8px}
.acct-v{font-size:18px;font-weight:800;letter-spacing:-.3px}
.acct-acts{display:flex;gap:8px;margin-top:13px;flex-wrap:wrap}
.mini{width:34px;height:34px;border-radius:11px;border:1px solid var(--border2);background:var(--bg2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);flex-shrink:0}
.mini i{font-size:16px}
.mini:active{transform:scale(.92)}
.mini.g{color:var(--green);background:var(--green-bg);border-color:transparent}
.mini.w{color:var(--orange);background:var(--orange-bg);border-color:transparent}
.mini.del{color:var(--red)}

.dg{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-top:12px}
.db{background:var(--bg3);border-radius:11px;padding:9px 11px}
.dl{font-size:11px;color:var(--text3);margin-bottom:2px;font-weight:500}
.dv{font-size:14px;font-weight:700}
.dv.r{color:var(--red)}.dv.g{color:var(--green)}.dv.w{color:var(--orange)}.dv.b{color:var(--blue)}
.prog{margin-top:12px}
.pl{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px;font-weight:500}
.pt{background:var(--bg4);border-radius:99px;height:6px;overflow:hidden}
.pf{height:100%;border-radius:99px;transition:width .4s}
.acts{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap}
.btn{font-size:12.5px;padding:8px 13px;border-radius:11px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;font-weight:650}
.btn:active{transform:scale(.96)}
.btn.pay{background:var(--blue-bg);border-color:transparent;color:var(--blue)}
.btn.topup{background:var(--green-bg);border-color:transparent;color:var(--green)}
.btn.spd{background:var(--orange-bg);border-color:transparent;color:var(--orange)}
.btn.del{color:var(--red);border-color:transparent;background:transparent;padding:8px 10px}

.add-btn{width:100%;padding:14px;border-radius:var(--r);border:1.5px dashed var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-size:13.5px;display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:10px;font-weight:650}
.add-btn:active{background:var(--bg3)}
.empty{text-align:center;padding:38px 20px;color:var(--text3)}
.empty-ic{width:66px;height:66px;border-radius:20px;background:color-mix(in srgb,var(--accent) 12%,var(--bg2));border:1px solid color-mix(in srgb,var(--accent) 22%,transparent);display:flex;align-items:center;justify-content:center;margin:0 auto 15px}
.empty-ic i{font-size:30px;color:var(--accent)}
.et{font-size:15px;font-weight:650;color:var(--text);margin-bottom:6px}
.es{font-size:13px;line-height:1.6}

/* ── CUSTOM CONFIRM DIALOG (replaces native confirm/alert) ── */
.confirm-wrap{position:absolute;inset:0;z-index:120;display:flex;align-items:center;justify-content:center;padding:34px;background:rgba(8,12,20,.45);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);animation:fade .16s}
.confirm-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:22px 20px 16px;width:100%;max-width:300px;box-shadow:var(--shadow-lg);animation:pop .22s cubic-bezier(.2,.9,.3,1);text-align:center}
@keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.confirm-title{font-size:16px;font-weight:650;color:var(--text);margin-bottom:6px}
.confirm-msg{font-size:13.5px;color:var(--text2);line-height:1.55;margin-bottom:18px}
.confirm-acts{display:flex;gap:10px}
.confirm-btn{flex:1;padding:12px;border-radius:12px;font-size:14.5px;font-weight:650;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);transition:transform .12s}
.confirm-btn.ok{background:var(--accent);color:#fff;border-color:transparent}
.confirm-btn.danger{background:var(--red);color:#fff;border-color:transparent}
.confirm-btn:active{transform:scale(.97)}
/* ── MODAL ── */
.mb{position:absolute;inset:0;background:rgba(8,12,20,.55);z-index:50;display:flex;align-items:flex-end;backdrop-filter:blur(2px);animation:fade .2s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.md{background:var(--bg2);border-radius:var(--rx) var(--rx) 0 0;padding:14px 20px calc(var(--safe-bot) + 26px);width:100%;max-height:92dvh;overflow-y:auto;animation:slideup .28s cubic-bezier(.2,.9,.3,1)}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.md-handle{width:38px;height:5px;border-radius:3px;background:var(--border2);margin:0 auto 18px}
.md-title{font-size:18px;font-weight:800;margin-bottom:18px;display:flex;align-items:center;gap:11px;letter-spacing:-.3px}
.md-ic{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.md-ic i{font-size:19px}
.field{margin-bottom:15px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:7px;font-weight:650}
.field input,.field select,.field textarea{width:100%;border-radius:12px;border:1.5px solid var(--border2);padding:13px 14px;font-size:16px;color:var(--text);background:var(--bg3);outline:none;-webkit-appearance:none;font-family:inherit}
.field input:focus,.field select:focus{border-color:var(--accent);background:var(--bg2)}
.field input.big{font-size:26px;font-weight:800;letter-spacing:-.5px}
.field-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.ma{display:flex;gap:10px;margin-top:22px}
.ma button{flex:1;padding:15px;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2)}
.ma button:active{transform:scale(.98)}
.ma .ok{background:var(--accent);color:#fff;border-color:transparent;box-shadow:none}
.ma .ok.g{background:var(--accent);box-shadow:none}
.pill-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px}
.pill{font-size:13px;padding:9px 15px;border-radius:99px;border:1.5px solid var(--border2);cursor:pointer;color:var(--text2);background:var(--bg2);font-weight:600}
.pill:active{transform:scale(.96)}
.pill.on{background:var(--accent);color:#fff;border-color:transparent}
.pill.og{background:var(--green);color:#fff;border-color:transparent}
.ib{border-radius:13px;padding:12px 14px;margin-bottom:14px;font-size:13px;display:flex;gap:10px;align-items:center;line-height:1.5;font-weight:500}
.ib i{font-size:18px;flex-shrink:0}
.ib.b{background:var(--blue-bg);color:var(--blue)}.ib.g{background:var(--green-bg);color:var(--green)}.ib.w{background:var(--orange-bg);color:var(--orange)}

/* ── ICON PICKER ── */
.icon-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-top:8px;max-height:248px;overflow-y:auto;padding:2px}
.ig-item{display:flex;flex-direction:column;align-items:center;gap:5px;padding:9px 4px;border-radius:14px;cursor:pointer;border:2px solid transparent;transition:all .12s}
.ig-item.sel{border-color:var(--accent);background:var(--blue-bg)}
.ig-item:active{transform:scale(.95)}
.ig-label{font-size:9.5px;color:var(--text3);text-align:center;line-height:1.15;font-weight:600;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  async hashPin(pin){const data=new TextEncoder().encode(pin+'ringgitme_salt_2025');const buf=await crypto.subtle.digest('SHA-256',data);return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');},
  isWebAuthnAvailable(){return window.PublicKeyCredential!==undefined&&location.protocol==='https:';},
  hasSavedCred(){return !!localStorage.getItem(this.CRED_KEY);},
  hasPIN(){return !!localStorage.getItem(this.PIN_KEY);},
  async setupWebAuthn(){try{const challenge=crypto.getRandomValues(new Uint8Array(32));const userId=crypto.getRandomValues(new Uint8Array(16));const cred=await navigator.credentials.create({publicKey:{challenge,rp:{name:'RinggitMe',id:location.hostname},user:{id:userId,name:'ringgitme_user',displayName:'RinggitMe User'},pubKeyCredParams:[{alg:-7,type:'public-key'},{alg:-257,type:'public-key'}],authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required'},timeout:60000}});if(cred){localStorage.setItem(this.CRED_KEY,btoa(String.fromCharCode(...new Uint8Array(cred.rawId))));return true;}}catch(e){console.log('WebAuthn setup failed:',e);}return false;},
  async verifyWebAuthn(){try{const credIdB64=localStorage.getItem(this.CRED_KEY);if(!credIdB64)return false;const credIdBytes=Uint8Array.from(atob(credIdB64),c=>c.charCodeAt(0));const challenge=crypto.getRandomValues(new Uint8Array(32));const assertion=await navigator.credentials.get({publicKey:{challenge,allowCredentials:[{id:credIdBytes,type:'public-key'}],userVerification:'required',timeout:60000}});return !!assertion;}catch(e){console.log('WebAuthn verify failed:',e);return false;}},
  async savePin(pin){localStorage.setItem(this.PIN_KEY,await this.hashPin(pin));},
  async verifyPin(pin){const stored=localStorage.getItem(this.PIN_KEY);if(!stored)return false;return (await this.hashPin(pin))===stored;},

const SI_MAP={"netflix":"netflix","spotify":"spotify","youtube":"youtube","grab":"grab","grabpay":"grab","shopee":"shopee","shopeepay":"shopee","foodpanda":"foodpanda","mcdonalds":"mcdonalds","kfc":"kfc","starbucks":"starbucks","icloud":"icloud","hsbc":"hsbc"};
// Renders a brand icon tile (or uploaded custom image)
function iconHTML(spec,size=38,radius=12){
  size=Number(size);
  if(typeof spec==='string')spec=gi(spec);
  if(!spec)spec=gi('star');
  if(spec.img){return `<img src="${spec.img}" style="width:${size}px;height:${size}px;border-radius:${radius}px;object-fit:cover;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.15)" alt=""/>`;}
  const grad=spec.grad?`linear-gradient(140deg,${spec.bg},${spec.grad})`:spec.bg;
  const tile=(inner,extra='')=>`<div style="width:${size}px;height:${size}px;border-radius:${radius}px;background:${grad};color:${spec.fg||'#fff'};display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.12),inset 0 1px 0 rgba(255,255,255,.12);${extra}">${inner}</div>`;
  // real brand SVG logo (white silhouette on brand-colour tile)
  const slug=spec.id&&SI_MAP[spec.id];
  if(slug&&BRAND_PATHS[slug]){const ps=Math.round(size*0.56);return tile(`<svg viewBox="0 0 24 24" width="${ps}" height="${ps}" fill="${spec.fg||'#fff'}" aria-hidden="true"><path d="${BRAND_PATHS[slug]}"/></svg>`);}
  if(spec.glyph)return tile(`<i class="ti ${spec.glyph}"></i>`,`font-size:${Math.round(size*0.5)}px`);
  const len=(spec.mono||'?').length,fs=len>=3?Math.round(size*0.30):len===2?Math.round(size*0.40):Math.round(size*0.52);
  return tile(`<span style="font-weight:800;letter-spacing:-.5px;line-height:1">${spec.mono}</span>`,`font-size:${fs}px`);
}
// icon for a stored object (card/sub) honoring its uploaded img
const itemIcon=(obj,size,radius)=>iconHTML(obj&&obj.img?{img:obj.img}:gi(obj?obj.iconId:'star'),size,radius);

let _tt;
// light haptic — buzzes on Android; iOS ignores silently (harmless)
function haptic(ms){try{if(navigator.vibrate)navigator.vibrate(ms||8);}catch(e){}}
function toast(msg){clearTimeout(_tt);haptic(12);const o=document.getElementById('_t');if(o)o.remove();const el=document.createElement('div');el.id='_t';el.className='toast';el.textContent=msg;document.getElementById('app').appendChild(el);_tt=setTimeout(()=>el.remove(),2200);}
// in-app confirm dialog (replaces ugly native confirm)
function confirmSheet(title,msg,onYes,opts){opts=opts||{};const el=document.createElement('div');el.className='confirm-wrap';el.innerHTML=`<div class="confirm-box"><div class="confirm-title">${title}</div>${msg?`<div class="confirm-msg">${msg}</div>`:''}<div class="confirm-acts"><button class="confirm-btn" data-no>取消</button><button class="confirm-btn ${opts.danger?'danger':'ok'}" data-yes>${opts.okText||'确认'}</button></div></div>`;document.getElementById('app').appendChild(el);el.querySelector('[data-no]').onclick=()=>el.remove();el.querySelector('[data-yes]').onclick=()=>{el.remove();haptic(14);onYes&&onYes();};el.onclick=e=>{if(e.target===el)el.remove();};}

// LOCK SCREEN LOGIC  (auto-prompts Face ID ONCE — no loop)
// ══════════════════════════════════════════════════════
async function initSecurity(){
  const hasCred=SEC.hasSavedCred(),hasPIN=SEC.hasPIN();
  if(!hasCred&&!hasPIN)LOCK.state='setup_choice';
  else if(hasCred)LOCK.state='locked_face';
  else LOCK.state='locked_pin';
  renderLock();
}
async function tryFaceUnlock(){
  LOCK.pinError='';renderLock();
  const ok=await SEC.verifyWebAuthn();
  if(ok){unlock();return;}
  // Failure: fall back, do NOT re-trigger automatically
  if(SEC.hasPIN()){LOCK.state='locked_pin';LOCK.pinError='Face ID 失败，请输入 PIN';}
  else{LOCK.pinError='Face ID 验证未通过，点按钮重试';}
  renderLock();
}
async function setupFaceId(){
  LOCK.state='setup_webauthn';renderLock();
  const ok=await SEC.setupWebAuthn();
  if(ok){toast('✓ Face ID 设置成功');unlock();}
  else{LOCK.state='setup_pin';LOCK.setupPinStep=1;LOCK.setupPin='';LOCK.setupPinFirst='';LOCK.pinError='Face ID 不可用，请设置 PIN';renderLock();}
}
function startPinSetup(){LOCK.state='setup_pin';LOCK.setupPinStep=1;LOCK.setupPin='';LOCK.setupPinFirst='';LOCK.pinError='';renderLock();}
async function pinKeyPress(key){
  if(LOCK.state==='setup_pin'){
    if(LOCK.setupPin.length>=4)return;
    LOCK.setupPin+=key;LOCK.pinError='';renderLock();
    if(LOCK.setupPin.length===4){await new Promise(r=>setTimeout(r,250));
      if(LOCK.setupPinStep===1){LOCK.setupPinFirst=LOCK.setupPin;LOCK.setupPin='';LOCK.setupPinStep=2;renderLock();}
      else{if(LOCK.setupPin===LOCK.setupPinFirst){await SEC.savePin(LOCK.setupPin);toast('✓ PIN 设置成功');unlock();}
        else{LOCK.pinError='两次不一致，重新设置';LOCK.setupPin='';LOCK.setupPinStep=1;LOCK.setupPinFirst='';renderLock();}}}
  }else if(LOCK.state==='locked_pin'){
    if(LOCK.pinInput.length>=4)return;
    LOCK.pinInput+=key;LOCK.pinError='';renderLock();
    if(LOCK.pinInput.length===4){await new Promise(r=>setTimeout(r,250));
      if(await SEC.verifyPin(LOCK.pinInput))unlock();
      else{LOCK.pinAttempts++;LOCK.pinError=LOCK.pinAttempts>=5?'尝试次数过多':'PIN 错误，请重试';LOCK.pinInput='';renderLock();}}}
}
function pinDel(){if(LOCK.state==='setup_pin'){LOCK.setupPin=LOCK.setupPin.slice(0,-1);renderLock();}else if(LOCK.state==='locked_pin'){LOCK.pinInput=LOCK.pinInput.slice(0,-1);renderLock();}}
function unlock(){LOCK.state='unlocked';LOCK.pinInput='';LOCK.pinError='';LOCK.pinAttempts=0;LOCK.faceAutoTried=false;render();}
function lockApp(){const hasCred=SEC.hasSavedCred();LOCK.state=hasCred?'locked_face':(SEC.hasPIN()?'locked_pin':'setup_choice');LOCK.pinInput='';LOCK.pinError='';LOCK.faceAutoTried=true;/*manual lock → no auto face*/renderLock();}

// Re-lock when app returns from background — but DON'T auto-trigger face
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden&&LOCK.state==='unlocked'){
    const hasCred=SEC.hasSavedCred(),hasPIN=SEC.hasPIN();
    if(hasCred||hasPIN){LOCK.state=hasCred?'locked_face':'locked_pin';LOCK.pinInput='';LOCK.faceAutoTried=true;renderLock();}
  }
});

function renderLock(){
  const app=document.getElementById('app');
  const pin=LOCK.state==='setup_pin'?LOCK.setupPin:LOCK.pinInput;
  const pinLen=pin.length;
  if(LOCK.state==='unlocked'){render();return;}
  let html='<div class="lock-screen">';
  html+=`<div class="lock-logo"><i class="ti ti-shield-lock"></i></div>`;
  if(LOCK.state==='checking'){html+=`<div class="lock-title">RinggitMe</div><div class="lock-sub">正在验证…</div>`;}
  else if(LOCK.state==='setup_choice'){
    html+=`<div class="lock-title">保护你的数据</div><div class="lock-sub">第一次使用，选择解锁方式。数据只存在这台设备上。</div>`;
    if(SEC.isWebAuthnAvailable()){html+=`<button class="face-btn" onclick="setupFaceId()"><i class="ti ti-face-id" style="font-size:20px"></i>用 Face ID 解锁</button>
      <button class="face-btn ghost" onclick="startPinSetup()"><i class="ti ti-lock" style="font-size:18px"></i>用 PIN 码解锁</button>`;}
    else{html+=`<div class="setup-box"><p>当前环境不支持 Face ID（需在 HTTPS 或加到主屏幕后才可用），先用 4 位 PIN 码保护。</p></div>
      <button class="face-btn" onclick="startPinSetup()"><i class="ti ti-lock" style="font-size:18px"></i>设置 PIN 码</button>`;}
  }
  else if(LOCK.state==='setup_webauthn'){html+=`<div class="lock-title">设置 Face ID</div><div class="lock-sub">请按设备提示完成验证…</div><div style="font-size:46px;margin-top:18px">🔐</div>`;}
  else if(LOCK.state==='setup_pin'){
    html+=`<div class="lock-title">${LOCK.setupPinStep===1?'设置 PIN 码':'确认 PIN 码'}</div>
    <div class="lock-sub">${LOCK.setupPinStep===1?'输入 4 位数字':'再输入一次'}</div>
    <div class="pin-display">${[0,1,2,3].map(i=>`<div class="pin-dot ${i<pinLen?'filled':''}"></div>`).join('')}</div>
    <div class="pin-error">${LOCK.pinError}</div>${buildPinPad()}`;
  }
  else if(LOCK.state==='locked_face'){
    html+=`<div class="lock-title">RinggitMe</div><div class="lock-sub">用 Face ID 解锁你的财务数据</div>
    <button class="face-btn" onclick="tryFaceUnlock()"><i class="ti ti-face-id" style="font-size:20px"></i>Face ID 解锁</button>
    <div class="pin-error">${LOCK.pinError}</div>`;
    if(SEC.hasPIN())html+=`<div class="pin-btn-link" onclick="LOCK.state='locked_pin';LOCK.pinInput='';LOCK.pinError='';renderLock()">改用 PIN 码</div>`;
  }
  else if(LOCK.state==='locked_pin'){
    html+=`<div class="lock-title">RinggitMe</div><div class="lock-sub">输入 PIN 码解锁</div>

  }

function exportData(){
  const json=JSON.stringify(D);let copied=false;
  try{if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(json);copied=true;}}catch(e){}
  try{const blob=new Blob([json],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='ringgitme-backup-'+todayISO()+'.json';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1500);}catch(e){}
  const ta=document.getElementById('exp-text');if(ta)ta.value=json;
  toast(copied?'✓ 备份已复制到剪贴板':'✓ 备份已生成，请手动复制下方');
}

function applyImport(text){let obj;try{obj=JSON.parse(text);}catch(e){toast('备份格式错误，无法解析');return;}
  if(!obj||typeof obj!=='object'||(!('cards'in obj)&&!('txns'in obj)&&!('aaPeople'in obj))){toast('这不是有效的 RinggitMe 备份');return;}
  confirmSheet('用备份覆盖当前数据？','当前所有数据会被替换，建议先导出现有备份。',()=>{D=Object.assign(fresh(),obj);save();closeModal();render();toast('✓ 已恢复备份');},{danger:true,okText:'覆盖恢复'});

// Image upload → downscale to 120px square → base64 (keeps storage small)
function onIconUpload(input){
  const f=input.files&&input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{const img=new Image();img.onload=()=>{const S=120,c=document.createElement('canvas');c.width=S;c.height=S;const ctx=c.getContext('2d');const ratio=Math.max(S/img.width,S/img.height);const w=img.width*ratio,h=img.height*ratio;ctx.drawImage(img,(S-w)/2,(S-h)/2,w,h);U.selCustomImg=c.toDataURL('image/jpeg',0.82);U.selIconId=null;render();};img.onerror=()=>toast('图片读取失败');img.src=e.target.result;};
  r.readAsDataURL(f);
}

function renderHome(){
  const ccs=D.cards.filter(c=>c.type==='cc'),savs=D.cards.filter(c=>c.type==='saving'),ews=D.cards.filter(c=>c.type==='ew');
  const totalOwed=ccs.reduce((a,c)=>a+c.owed,0),totalSav=savs.reduce((a,c)=>a+c.balance,0),totalEw=ews.reduce((a,c)=>a+c.balance,0);
  const totalSub=D.subs.reduce((a,s)=>a+s.amt,0),totalLoan=D.loans.reduce((a,l)=>a+l.monthly,0);
  const net=totalSav+totalEw-totalOwed;
  const now=new Date(),thisMonth=D.txns.filter(t=>{const d=new Date(t.isoDate||Date.now());return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).reduce((a,t)=>a+t.amt,0);
  const monthIncome=D.incomes.reduce((a,i)=>a+i.amt,0);
  let h=`<div class="mode-row"><div class="mode-card ${D.incomeMode==='salary'?'on':''}" onclick="setMode('salary')"><div class="mode-lbl">薪水模式</div><div class="mode-val">固定收入</div></div><div class="mode-card on-fc ${D.incomeMode==='fullcomm'?'on':''}" onclick="setMode('fullcomm')"><div class="mode-lbl">全佣模式</div><div class="mode-val">房产经纪</div></div></div>`;
  const monthLabel=new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long'});
  h+=`<div class="hero"><div class="hero-top"><div class="hero-l">净资产 Net Worth</div><div class="hero-pill"><i class="ti ti-calendar-month" style="font-size:13px"></i>${monthLabel}</div></div><div class="hero-v" id="heroNet" data-net="${net}">${fmt(net)}</div><div class="hero-row"><div class="hero-stat"><div class="hero-sl">资产</div><div class="hero-sv">${fmt(totalSav+totalEw)}</div></div><div class="hero-stat"><div class="hero-sl">CC 欠额</div><div class="hero-sv">${fmt(totalOwed)}</div></div><div class="hero-stat"><div class="hero-sl">本月消费</div><div class="hero-sv">${fmt(thisMonth)}</div></div></div></div>`;
  h+=`<div class="sg"><div class="sc"><div class="sl">储蓄 Savings</div><div class="sv">${fmt(totalSav)}</div></div><div class="sc"><div class="sl">eWallet</div><div class="sv">${fmt(totalEw)}</div></div><div class="sc"><div class="sl">月固定支出</div><div class="sv">${fmt(totalSub+totalLoan)}</div></div><div class="sc"><div class="sl">累计收入</div><div class="sv">${fmt(monthIncome)}</div></div></div>`;
  if(D.incomeMode==='fullcomm'&&(totalSub+totalLoan)>0)h+=`<div class="ib w"><i class="ti ti-target-arrow"></i>本月固定开销 ${fmtR(totalSub+totalLoan)}，至少要赚这么多才 cover。</div>`;
  h+=`<div class="sec">收藏快捷 <span class="sec-a" onclick="setTab('record')"><i class="ti ti-plus" style="font-size:13px"></i>去记账</span></div>`;
  if(!D.favs.length)h+=`<div class="empty"><div class="empty-ic"><i class="ti ti-star"></i></div><div class="et">还没有收藏</div><div class="es">记账时勾选「存为收藏」<br>下次一键就能记</div></div>`;
  else D.favs.forEach(f=>{const card=f.payId?D.cards.find(c=>c.id===f.payId):null;h+=`<div class="fav-row" onclick="useFav(${f.id})"><div class="fav-ic"><i class="ti ${f.catIcon||'ti-receipt'}"></i></div><div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${f.name}</div><div style="font-size:11.5px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${f.catLabel}${card?' · '+card.name:''}</div></div><div style="display:flex;align-items:center;gap:9px;flex-shrink:0"><span style="font-size:15px;font-weight:800;color:var(--red)">${fmt(f.amt)}</span><span class="tap-badge">一键</span><i class="ti ti-x" onclick="event.stopPropagation();delFav(${f.id})" style="font-size:18px;color:var(--text3)"></i></div></div>`;});
  if(D.txns.length){h+=`<div class="sec">最近记录 <span class="sec-a" onclick="setTab('history')">全部 →</span></div><div class="card">`;D.txns.slice(0,5).forEach(t=>{h+=`<div class="txn"><div class="txn-ic"><i class="ti ${t.catIcon||'ti-receipt'}"></i></div><div class="txn-m"><div class="txn-n">${t.desc||t.catLabel}</div><div class="txn-s">${t.catLabel}${t.payName?' · '+t.payName:''} · ${t.date}</div></div><div class="txn-a r">−${fmt(t.amt)}</div></div>`;});h+=`</div>`;}
  return h;
}

  h+=`<div class="sec">电子钱包 <span class="sec-a" onclick="openModal('addew')"><i class="ti ti-plus" style="font-size:13px"></i>添加</span></div>`;
  if(!ews.length)h+=`<div class="empty"><div class="empty-ic"><i class="ti ti-wallet"></i></div><div class="et">还没有电子钱包</div></div>`;
  ews.forEach(c=>{h+=`<div class="acctcard"><div class="acct-top">${itemIcon(c,44,13)}<div class="acct-m"><div class="acct-n">${c.name}</div><div class="acct-s">eWallet</div></div><div class="acct-b"><div class="acct-v w">${fmt(c.balance)}</div></div></div><div class="acct-acts"><button class="btn spd" onclick="openModal('ewtopup',{editId:${c.id}})"><i class="ti ti-bolt"></i>充值</button><button class="btn pay" onclick="openModal('spend',{selPayId:${c.id}})"><i class="ti ti-plus"></i>记消费</button><button class="btn" onclick="openModal('addew',{editCardId:${c.id}})"><i class="ti ti-pencil"></i>编辑</button><button class="btn del" onclick="delCard(${c.id})"><i class="ti ti-trash"></i></button></div></div>`;});
  return h;
}
function renderRecord(){
  let h=`<div class="sec">收入类别 <span class="sec-a" onclick="openModal('addIncomeCat')"><i class="ti ti-plus" style="font-size:13px"></i>添加</span></div><div class="pill-row" style="margin-bottom:6px">${D.incomeCats.map(c=>`<div class="pill" style="display:flex;align-items:center;gap:6px">${c.label}<i class="ti ti-x" style="color:var(--text3);font-size:14px" onclick="delIncomeCat('${c.id}')"></i></div>`).join('')}</div><button class="add-btn" style="border-color:var(--green);color:var(--green);margin-top:10px" onclick="openModal('addincome')"><i class="ti ti-plus"></i>记录收入</button>`;
  if(D.incomes.length){h+=`<div class="sec">收入记录</div><div class="card">`;D.incomes.slice(0,6).forEach(inc=>{const cat=D.incomeCats.find(c=>c.id===inc.catId);h+=`<div class="txn"><div class="txn-ic" style="background:var(--green-bg)"><i class="ti ti-trending-up" style="color:var(--green)"></i></div><div class="txn-m"><div class="txn-n">${inc.desc||(cat?cat.label:'收入')}</div><div class="txn-s">${cat?cat.label:'收入'} · ${inc.date}</div></div><div class="txn-a g">+${fmt(inc.amt)}</div></div>`;});h+=`</div>`;}
  h+=`<div class="sec">快速记消费</div><div class="card"><div class="field"><label>金额 (RM)</label><input id="sp-amt" type="number" inputmode="decimal" placeholder="0.00" step="0.01" class="big"/></div><div class="field"><label>描述 <span style="color:var(--text3);font-weight:400">可选</span></label><input id="sp-desc" placeholder="e.g. KFC lunch, Grab to office"/></div><div class="field"><label>日期</label><input id="sp-date" type="date" value="${todayISO()}"/></div><div class="field"><label>付款方式</label>${payOpts(true)}</div><div class="field"><label>消费类别</label>${catPicker()}</div><label style="display:flex;align-items:center;gap:10px;font-size:13.5px;color:var(--text2);font-weight:600;cursor:pointer;margin-bottom:4px"><input type="checkbox" id="sp-fav" style="width:20px;height:20px"/>存为收藏快捷</label><div class="ma" style="margin-top:14px"><button class="ok" onclick="saveSpend()"><i class="ti ti-check"></i> 记录消费</button></div></div>`;
  return h;
}
function renderHistory(){
  if(!D.txns.length)return`<div class="empty" style="margin-top:50px"><div class="empty-ic"><i class="ti ti-calendar"></i></div><div class="et">还没有消费记录</div><div class="es">去「记账」开始记第一笔</div></div>`;
  let h=`<div class="search-bar"><div class="search-wrap"><i class="ti ti-search si"></i><input class="search-input" id="hist-q" placeholder="搜索描述 / 类别 / 卡片…" oninput="histFilter(this.value)"/><span class="search-clear" id="hist-clear" style="display:none" onclick="document.getElementById('hist-q').value='';histFilter('')"><i class="ti ti-x"></i></span></div></div>`;
  // ── this-month spending insights ──
  const now=new Date();const mTx=D.txns.filter(t=>{const d=new Date(t.isoDate||Date.now());return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
  h+=`<div class="ins-wrap">`;
  if(mTx.length){const mTotal=mTx.reduce((a,t)=>a+t.amt,0);const byCat={};mTx.forEach(t=>{const k=t.catLabel||'其他';if(!byCat[k])byCat[k]={sum:0,icon:t.catIcon||'ti-receipt'};byCat[k].sum+=t.amt;});
    const cats=Object.keys(byCat).map(k=>({label:k,sum:byCat[k].sum,icon:byCat[k].icon})).sort((a,b)=>b.sum-a.sum);const max=cats[0].sum||1;
    h+=`<div class="sec">本月消费分析</div><div class="card"><div class="ins-head"><div><div class="ins-hl">${now.toLocaleDateString('zh-CN',{year:'numeric',month:'long'})} 总消费</div><div class="ins-total r">${fmt(mTotal)}</div></div><div class="ins-cnt">${mTx.length} 笔 · ${cats.length} 类</div></div>`;
    cats.slice(0,6).forEach(c=>{const bw=Math.round(c.sum/max*100),pct=Math.round(c.sum/mTotal*100);h+=`<div class="ins-row"><div class="ins-top"><div class="ins-ic"><i class="ti ${c.icon}"></i></div><div class="ins-name">${c.label}</div><div class="ins-amt r">${fmt(c.sum)}</div><div class="ins-pct">${pct}%</div></div><div class="ins-bar"><i style="width:${D.privacyMode?0:bw}%"></i></div></div>`;});
    h+=`</div>`;
  }
  h+=`</div>`;
  const byDate={};D.txns.forEach(t=>{const k=t.isoDate||todayISO();(byDate[k]=byDate[k]||[]).push(t);});
  const sorted=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
  h+=`<div class="sec cal-sec">消费日历</div><div id="hist-empty" class="empty" style="display:none"><div class="empty-ic"><i class="ti ti-search-off"></i></div><div class="et">没有匹配的记录</div></div>`;
  sorted.forEach(date=>{const txns=byDate[date],dayTotal=txns.reduce((a,t)=>a+t.amt,0);const d=new Date(date),lbl=d.toLocaleDateString('en-MY',{weekday:'short',month:'short',day:'numeric'});h+=`<div class="dgroup"><div class="dh"><span class="dh-l">${lbl}</span><span class="dh-r">− ${fmtR(dayTotal)}</span></div><div class="card">`;txns.forEach(t=>{const sk=((t.desc||'')+' '+(t.catLabel||'')+' '+(t.payName||'')).toLowerCase();h+=`<div class="txn" data-search="${sk.replace(/"/g,'')}"><div class="txn-ic"><i class="ti ${t.catIcon||'ti-receipt'}"></i></div><div class="txn-m"><div class="txn-n">${t.desc||t.catLabel}</div><div class="txn-s">${t.catLabel}${t.payName?' · '+t.payName:''}</div></div><div class="txn-x"><div class="txn-a r">−${fmt(t.amt)}</div><i class="ti ti-edit" onclick="openModal('spend',{editId:${t.id}})" style="color:var(--accent)"></i><i class="ti ti-x" onclick="delTxn(${t.id})" style="color:var(--text3)"></i></div></div>`;});h+=`</div></div>`;});
  return h;
}
function renderFixed(){
  const totalSub=D.subs.reduce((a,s)=>a+s.amt,0),totalLoan=D.loans.reduce((a,l)=>a+l.monthly,0);
  let h=`<div class="sg"><div class="sc"><div class="sl">月订阅</div><div class="sv b">${fmt(totalSub)}</div></div><div class="sc"><div class="sl">月贷款 / 租金</div><div class="sv r">${fmt(totalLoan)}</div></div></div>`;
  if(totalSub+totalLoan>0)h+=`<div class="sc" style="margin-bottom:14px"><div class="sl">月固定总支出</div><div class="sv r" style="font-size:24px">${fmt(totalSub+totalLoan)}</div></div>`;
  h+=`<div class="sec">订阅 Subscriptions <span class="sec-a" onclick="openModal('addsub')"><i class="ti ti-plus" style="font-size:13px"></i>添加</span></div>`;
  if(!D.subs.length)h+=`<div class="empty"><div class="empty-ic"><i class="ti ti-repeat"></i></div><div class="et">还没有订阅</div></div>`;
  D.subs.forEach(s=>{h+=`<div class="acctcard"><div class="acct-top">${itemIcon(s,44,13)}<div class="acct-m"><div class="acct-n">${s.name}</div><div class="acct-s">每月 ${s.day} 号扣款</div></div><div class="acct-b"><div class="acct-v b">${fmt(s.amt)}</div><div style="font-size:10.5px;color:var(--text3)">/ 月</div></div><button class="mini del" onclick="delSub(${s.id})" style="margin-left:10px"><i class="ti ti-trash"></i></button></div></div>`;});
  h+=`<div class="sec">贷款 / 租金 <span class="sec-a" onclick="openModal('addloan')"><i class="ti ti-plus" style="font-size:13px"></i>添加</span></div>`;
  if(!D.loans.length)h+=`<div class="empty"><div class="empty-ic"><i class="ti ti-home"></i></div><div class="et">还没有贷款记录</div></div>`;
  D.loans.forEach(l=>{const p=l.total>0?pct(l.total-l.remaining,l.total):0;h+=`<div class="card"><div class="row">${iconHTML(gi(l.iconId||'loan'),42,12)}<div class="name">${l.name}</div><span class="badge bloan">${l.type.split(' ')[0]}</span></div><div class="dg"><div class="db"><div class="dl">月供</div><div class="dv r">${fmt(l.monthly)}</div></div><div class="db"><div class="dl">还款日</div><div class="dv">${l.dueDay} 号</div></div>${l.remaining?`<div class="db" style="grid-column:span 2"><div class="dl">剩余贷款</div><div class="dv">${fmt(l.remaining)}</div></div>`:''}</div>${l.total>0&&l.remaining?`<div class="prog"><div class="pl"><span>已还 ${p}%</span><span>剩 ${fmt(l.remaining)}</span></div><div class="pt"><div class="pf" style="width:${p}%;background:${l.color}"></div></div></div>`:''}<div class="acts"><button class="btn del" onclick="delLoan(${l.id})"><i class="ti ti-trash"></i>删除</button></div></div>`;});
  return h;
}
function renderAA(){
  if(!D.aaPeople.length)return`<div class="empty" style="margin-top:40px"><div class="empty-ic"><i class="ti ti-users"></i></div><div class="et">还没有分账记录</div><div class="es">添加朋友或女朋友<br>开始记录 AA 消费</div></div><button class="add-btn" onclick="openModal('addAAPerson')"><i class="ti ti-user-plus"></i>添加分账对象</button>`;
  let tThey=0,tMe=0;D.aaPeople.forEach(p=>{const b=aaBal(p);tThey+=b.they;tMe+=b.me;});
  let h=`<div class="sg"><div class="sc"><div class="sl">别人欠我</div><div class="sv g">${fmt(tThey)}</div></div><div class="sc"><div class="sl">我欠别人</div><div class="sv r">${fmt(tMe)}</div></div></div>`;
  D.aaPeople.forEach(p=>{const{net}=aaBal(p),unsettled=p.txns.filter(t=>!t.settled),settled=p.txns.filter(t=>t.settled),isOpen=U.expandedId===p.id;
    h+=`<div class="aa-p"><div class="aa-h" onclick="toggle(${p.id})"><div class="aa-av" style="background:${p.color}22;color:${p.color}">${p.name.slice(0,2).toUpperCase()}</div><div class="aa-info"><div class="aa-name">${p.name}</div><div class="aa-sub">${unsettled.length} 笔未结算</div></div><div class="aa-bal"><div class="aa-num" style="color:${net>0?'var(--green)':net<0?'var(--red)':'var(--text3)'}">${net===0?'—':(net>0?'+':'−')+fmtR(net)}</div><div class="aa-lbl">${net>0?'they owe':net<0?'you owe':'all clear'}</div></div><i class="ti ti-chevron-down chevron ${isOpen?'rot':''}"></i></div>`;
    if(isOpen){h+=`<div class="aa-body">`;if(!unsettled.length&&!settled.length)h+=`<div style="padding:18px 0;text-align:center;font-size:13px;color:var(--text3)">还没有记录，加一笔！</div>`;
      if(unsettled.length){h+=`<div class="po-lbl" style="margin:13px 0 6px">未结算</div>`;unsettled.forEach(t=>{const myShare=t.total/t.split,owedAmt=myShare*(t.split-1),iAmOwed=t.paidBy==='me';h+=`<div class="aa-txn"><div class="aa-txn-ic"><i class="ti ${t.catIcon||'ti-receipt'}"></i></div><div class="aa-txn-m"><div class="aa-txn-n">${t.desc}</div><div class="aa-txn-s">${t.catLabel||''} · ${t.date}${t.payName?' · '+t.payName:''} · 共${fmtR(t.total)} ÷${t.split}</div></div><div class="aa-txn-r"><div class="aa-txn-a" style="color:${iAmOwed?'var(--green)':'var(--red)'}">${iAmOwed?'+':'−'}${fmtR(owedAmt)}</div><div class="aa-txn-w">${iAmOwed?p.name.split(' ')[0]+' owes':'you owe'}</div></div><i class="ti ti-edit" onclick="openModal('addAATxn',{activePersonId:${p.id},activeEditTxnId:${t.id}})" style="color:var(--accent);font-size:19px;padding:4px"></i><i class="ti ti-x" onclick="delAATxn(${p.id},${t.id})" style="color:var(--text3);font-size:19px;padding:4px"></i></div>`;});}
      if(settled.length){h+=`<div class="po-lbl" style="margin:13px 0 6px">已结算 (${settled.length})</div>`;settled.slice(-2).forEach(t=>{h+=`<div class="aa-txn" style="opacity:.4"><div class="aa-txn-ic"><i class="ti ti-check"></i></div><div class="aa-txn-m"><div class="aa-txn-n" style="text-decoration:line-through">${t.desc}</div><div class="aa-txn-s">${t.date}</div></div><div class="aa-txn-r"><div class="aa-txn-a" style="color:var(--text3)">${fmtR(t.total/t.split)}</div></div></div>`;});}
      h+=`<div class="aa-acts"><button class="btn pay" onclick="openModal('addAATxn',{activePersonId:${p.id},selPaidBy:'me',selSplit:2})"><i class="ti ti-plus"></i>加记录</button>${net!==0?`<button class="btn topup" onclick="settleAA(${p.id})"><i class="ti ti-check"></i>结算</button>`:''}<button class="btn del" onclick="delAAPerson(${p.id})"><i class="ti ti-trash"></i></button></div></div>`;}
    h+=`</div>`;});
  h+=`<button class="add-btn" onclick="openModal('addAAPerson')"><i class="ti ti-user-plus"></i>添加分账对象</button>`;
  return h;
}

let _lastRenderedTab=null;
function render(){
  if(LOCK.state!=='unlocked'){renderLock();return;}
  const TABS=[{id:'home',i:'ti-home',l:'首页'},{id:'cards',i:'ti-credit-card',l:'卡片'},{id:'record',i:'ti-circle-plus',l:'记账'},{id:'history',i:'ti-calendar',l:'记录'},{id:'fixed',i:'ti-repeat',l:'固定'},{id:'aa',i:'ti-users',l:'AA'}];
  const TITLES={home:'RinggitMe',cards:'卡片管理',record:'收入 & 记账',history:'消费记录',fixed:'固定支出',aa:'AA 分账'};
  const SUBS={home:'马来西亚理财 · 数据存本机 · v22',cards:'信用卡 · 储蓄 · eWallet',record:'收入追踪 · 快速记账',history:'按日期查看消费',fixed:'订阅 · 贷款 · 租金',aa:'分账追踪 · 随时结算'};
  // preserve scroll on same-tab re-render (no more jumping to top on every tap); fade only on tab switch
  const tabChanged=U.tab!==_lastRenderedTab;
  const prevContent=document.querySelector('.content');
  const keepScroll=(prevContent&&!tabChanged)?prevContent.scrollTop:0;
  let content=U.tab==='home'?renderHome():U.tab==='cards'?renderCards():U.tab==='record'?renderRecord():U.tab==='history'?renderHistory():U.tab==='fixed'?renderFixed():renderAA();
  document.getElementById('app').innerHTML=`
    <div class="topbar">
      <div><div class="t-title">${TITLES[U.tab]}</div><div class="t-sub">${SUBS[U.tab]}</div></div>
      <div class="t-r">
        <div class="t-ic" onclick="togglePrivacy()" title="隐私模式"><i class="ti ${D.privacyMode?'ti-eye-off':'ti-eye'}" style="color:${D.privacyMode?'var(--orange)':'var(--text2)'}"></i></div>
        <div class="t-ic" onclick="openModal('settings')" title="数据与备份"><i class="ti ti-database-cog"></i></div>
        <div class="t-ic" onclick="lockApp()" title="锁定"><i class="ti ti-lock"></i></div>
      </div>
    </div>
    <div class="content${tabChanged?' tabfade':''}">${content}</div>
    <div class="nav">${TABS.map(t=>`<button class="ni ${U.tab===t.id?'on':''}" onclick="setTab('${t.id}')"><i class="ti ${t.i}"></i>${t.l}</button>`).join('')}</div>
    ${buildModal()}`;
  const newContent=document.querySelector('.content');
  if(newContent&&keepScroll)newContent.scrollTop=keepScroll;
  // signature touch: count up the net-worth number when entering Home
  if(U.tab==='home'&&tabChanged&&!D.privacyMode)requestAnimationFrame(animateHeroNet);
  _lastRenderedTab=U.tab;
}
function animateHeroNet(){
  const el=document.getElementById('heroNet');if(!el||D.privacyMode)return;
  const target=Math.abs(parseFloat(el.dataset.net)||0);if(!target)return;
  const dur=680,start=performance.now(),ease=t=>1-Math.pow(1-t,3);
  const fmtN=v=>'RM '+v.toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2});
  function frame(now){const t=Math.min(1,(now-start)/dur),v=target*ease(t);el.textContent=fmtN(v);if(t<1)requestAnimationFrame(frame);else el.textContent=fmtN(target);}
  requestAnimationFrame(frame);
}

// ── Modal: drag the sheet down to dismiss (real-app feel) ──
let _drag=null;
document.addEventListener('touchstart',e=>{
  const md=e.target.closest&&e.target.closest('.md');if(!md)return;
  if(md.scrollTop>0)return; // only when sheet is scrolled to top (don't fight content scroll)
  const top=e.touches[0].clientY-md.getBoundingClientRect().top;
  if(top>72&&!e.target.closest('.md-handle'))return; // grab from the top strip / handle only
  _drag={md,mb:md.closest('.mb'),startY:e.touches[0].clientY,dy:0};
  md.style.transition='none';
},{passive:true});
document.addEventListener('touchmove',e=>{
  if(!_drag)return;
  let dy=e.touches[0].clientY-_drag.startY;if(dy<0)dy=0;_drag.dy=dy;
  _drag.md.style.transform='translateY('+dy+'px)';
  if(_drag.mb)_drag.mb.style.background='rgba(8,12,20,'+Math.max(0,0.55-dy/700)+')';
},{passive:true});
document.addEventListener('touchend',()=>{
  if(!_drag)return;const md=_drag.md,dy=_drag.dy||0;
  md.style.transition='transform .26s cubic-bezier(.3,.9,.3,1)';
  if(dy>110){md.style.transform='translateY(100%)';haptic(10);setTimeout(closeModal,200);}
  else{md.style.transform='translateY(0)';}
  _drag=null;
});

// ── START ──
initSecurity();
</script>
