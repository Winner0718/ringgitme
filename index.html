let _drag=null;
document.addEventListener('touchstart',e=>{
  const md=e.target.closest&&e.target.closest('.md');if(!md)return;
  if(md.scrollTop>0)return; // only when sheet is scrolled to top (don't fight content scroll)
  const top=e.touches[0].clientY-md.getBoundingClientRect().top;
  if(top>72&&!e.target.closest('.md-handle'))return; // grab from the top strip / handle only
  _drag={md,mb:md.closest('.mb'),startY:e.touches[0].clientY,dy:0};
  md.style.transition='none';
},{passive:true});
document.addEventListener('touchmove',e=>{
  if(!_drag)return;
  let dy=e.touches[0].clientY-_drag.startY;if(dy<0)dy=0;_drag.dy=dy;
  _drag.md.style.transform='translateY('+dy+'px)';
  if(_drag.mb)_drag.mb.style.background='rgba(8,12,20,'+Math.max(0,0.55-dy/700)+')';
},{passive:true});
document.addEventListener('touchend',()=>{
  if(!_drag)return;const md=_drag.md,dy=_drag.dy||0;
  md.style.transition='transform .26s cubic-bezier(.3,.9,.3,1)';

// FINAL STABLE DATA CONSISTENCY + CALCULATOR PATCH
// Must stay AFTER all original function declarations so overrides really win.

(function(){
  const sameId=(a,b)=>String(a)===String(b);
  const findCard=id=>(D.cards||[]).find(c=>sameId(c.id,id));
  const findTxnIndex=id=>(D.txns||[]).findIndex(t=>sameId(t.id,id));
  const normalOwed=c=>round2(money(c&&(c.currentOutstanding!=null?c.currentOutstanding:c.owed)));
  const setNormalOwed=(c,val)=>{if(!c)return;const n=round2(Math.max(0,money(val)));c.currentOutstanding=n;c.owed=n;if(n<=0)resetCardCycleIfCleared(c);c.availableLimit=getCardAvailableLimit(c);};
  window.rmRefreshDerived=function(){
    (D.cards||[]).forEach(c=>{if(c.type==='cc'){c.currentOutstanding=normalOwed(c);c.owed=c.currentOutstanding;c.availableLimit=getCardAvailableLimit(c);if(c.currentOutstanding<=0)resetCardCycleIfCleared(c);}});
    if(typeof syncAllFixedAAReceivables==='function')try{syncAllFixedAAReceivables();}catch(e){console.log('sync fixed AA skipped',e);}
  };
  window.applyTransactionBalanceEffect=function(tx){
    if(!tx||isRecordOnlyTransaction(tx))return true;
    const c=findCard(tx.payId),amt=round2(tx.amt);
    if(!c||!amt)return true;
    if(c.type==='cc'){
      const before=normalOwed(c),next=before+amt;
      setNormalOwed(c,next);
      if(before<=0&&next>0){const s=tx.isoDate||todayISO();c.currentCycleStartDate=s;c.autoDueDate=addDaysISO(s,30);}
      c.availableLimit=getCardAvailableLimit(c);
      return true;
    }
    if(c.type==='saving'||c.type==='ew'){
      if(money(c.balance)<amt){toast(c.type==='ew'?'eWallet 余额不足':'储蓄余额不足');return false;}
      c.balance=round2(money(c.balance)-amt);
      return true;
    }
    return true;
  };
  window.reverseTransactionBalanceEffect=function(tx){
    if(!tx||isRecordOnlyTransaction(tx))return true;
    const c=findCard(tx.payId),amt=round2(tx.amt);
    if(!c||!amt)return true;
    if(c.type==='cc'){setNormalOwed(c,normalOwed(c)-amt);return true;}
    if(c.type==='saving'||c.type==='ew'){c.balance=round2(money(c.balance)+amt);return true;}
    return true;
  };
  window.delTxn=function(id){
    const idx=findTxnIndex(id);if(idx<0)return;
    const old={...D.txns[idx]};
    reverseTransactionBalanceEffect(old);
    removeAAReceivable('txn',old.id);
    D.txns.splice(idx,1);
    rmRefreshDerived();
    save();try{swClose(null);}catch(e){}render();toast('已删除');
  };
  window.saveSpend=function(){
    const amt=pf('sp-amt');
    if(!amt){toast('请输入金额');return;}
    if(!U.selCatId){toast('请选择类别');return;}
    const cat=(D.spendCats||[]).find(c=>c.id===U.selCatId)||{label:'其他',icon:'ti-receipt'};
    const wasEdit=U.editId!==null&&U.editId!==undefined&&U.editId!=='';
    const idx=wasEdit?findTxnIndex(U.editId):-1;
    if(wasEdit&&idx<0){toast('找不到要编辑的记录');return;}
    const old=wasEdit?{...D.txns[idx]}:null;
    const payId=(U.selPayId!==null&&U.selPayId!==undefined&&U.selPayId!=='')?U.selPayId:(old?old.payId:null);
    const payCard=(payId!==null&&payId!==undefined)?findCard(payId):null;
    const postingMode=U.postingMode||(old&&old.postingMode)||'normal';
    const isoDate=v('sp-date')||todayISO();
    const txnTime=v('sp-time')||'';
    const txnDate=new Date(isoDate).toLocaleDateString('en-MY',{month:'short',day:'numeric'});
    const desc=v('sp-desc')||cat.label;
    let aaSplit=null;
    if(typeof buildSpendAASplit==='function')aaSplit=buildSpendAASplit(amt);else aaSplit=readAASplit('sp-amt',amt);
    if(aaSplit===false)return;
    const makeTxn=(id,base={})=>({...base,id,amt,desc,catId:U.selCatId,catLabel:cat.label,catIcon:cat.icon,payId,payName:payCard?payCard.name:null,postingMode,date:txnDate,isoDate,time:txnTime,files:(U.pendFiles||[]).slice(),aaSplit:aaSplit||null});
    let txn;
    const aaBackup=JSON.stringify(D.aaReceivables||[]);
    if(wasEdit){
      reverseTransactionBalanceEffect(old);
      removeAAReceivable('txn',old.id);
      txn=makeTxn(old.id,D.txns[idx]);
      if(!applyTransactionBalanceEffect(txn)){
        applyTransactionBalanceEffect(old);
        try{D.aaReceivables=JSON.parse(aaBackup);}catch(e){}
        return;
      }
      D.txns[idx]=txn;
    }else{
      txn=makeTxn(nid());
      if(!applyTransactionBalanceEffect(txn))return;
      D.txns.unshift(txn);
      const fav=document.getElementById('sp-fav');
      if(fav&&fav.checked&&desc)D.favs.push({id:nid(),name:desc,catId:U.selCatId,catLabel:cat.label,catIcon:cat.icon,amt,payId,payName:payCard?payCard.name:null});
      if(U.spTaxOn&&U.selTaxCat)D.taxItems.unshift({id:nid(),year:new Date(isoDate).getFullYear(),cat:U.selTaxCat,amount:amt,note:desc});
    }
    if(payCard&&payCard.type==='cc')ensureCardCycle(payCard,isoDate);
    if(aaSplit)upsertAAReceivable('txn',txn.id,amt,aaSplit,txn.desc);else removeAAReceivable('txn',txn.id);
    rmRefreshDerived();
    save();closeModal();
    toast(wasEdit?'✓ 已更新':(postingMode==='recordOnly'?'✓ 已补录 ':'✓ 已记录 ')+fmtR(amt));
    if(!wasEdit)playSound(postingMode==='recordOnly'?'recordOnly':'out');
  };
  window.savePay=function(ccId){
    const amt=pf('p-amt');if(!amt){toast('请输入金额');return;}
    const cc=findCard(ccId);if(!cc)return;
    const srcId=U.selSavId,src=(srcId&&srcId>0)?findCard(srcId):null;
    if(src){if(money(src.balance)<amt){toast(src.type==='ew'?'eWallet 余额不足':'储蓄余额不足');return;}src.balance=round2(money(src.balance)-amt);}
    const beforeDue=getCreditCardMonthlyDue(cc);
    setNormalOwed(cc,normalOwed(cc)-amt);
    cc.lastPaymentAmount=amt;cc.lastPaymentDate=v('p-date')||todayISO();
    const markPaid=!!document.getElementById('p-paid')?.checked||(beforeDue>0&&amt>=beforeDue);
    if(markPaid){cc.monthlyDuePaid=true;cc.monthlyDuePaidAt=cc.lastPaymentDate;}
    rmRefreshDerived();save();closeModal();toast('✓ 已还款 '+fmtR(amt));playSound('neutral');
  };
  function installCalcStyle(){
    if(document.getElementById('rm-calc-style'))return;
    const st=document.createElement('style');st.id='rm-calc-style';st.textContent=`.field.has-calc{position:relative}.field.has-calc input{padding-right:48px}.calc-mini{position:absolute;right:8px;bottom:8px;width:34px;height:34px;border-radius:10px;border:1px solid var(--border2);background:var(--bg2);color:var(--accent);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);z-index:2;cursor:pointer}.calc-mini i{font-size:17px}.calc-mini:active{transform:scale(.94)}`;document.head.appendChild(st);
  }
  function isNumericInput(el){
    if(!el||el.disabled||el.readOnly)return false;
    const type=(el.getAttribute('type')||'text').toLowerCase();
    if(['date','time','month','checkbox','file','password','email','radio','color','hidden','search'].includes(type))return false;
    const im=(el.getAttribute('inputmode')||'').toLowerCase();
    const id=(el.id||'').toLowerCase();
    const label=(el.closest('.field')?.querySelector('label')?.textContent||'').toLowerCase();
    return type==='number'||im==='decimal'||im==='numeric'||el.classList.contains('big')||/(rm|金额|额度|余额|总额|月费|月供|期数|已还|预算|目标|收入|支出|欠额|贷款|租金|百分|人数|amount|limit|balance|total|monthly|tenure|paid|budget|target|owed|outstanding|percent|count)/i.test(id+' '+label);
  }
  window.enhanceNumericCalculators=function(){
    installCalcStyle();
    document.querySelectorAll('.md .field input, .content .field input').forEach(el=>{
      if(!isNumericInput(el)||el.dataset.calcMini==='1')return;
      if(!el.id)el.id='rm-calc-'+Math.random().toString(36).slice(2,9);
      el.dataset.calcMini='1';
      const field=el.closest('.field');if(!field)return;
      field.classList.add('has-calc');
      const btn=document.createElement('button');btn.type='button';btn.className='calc-mini';btn.innerHTML='<i class="ti ti-calculator"></i>';btn.onclick=(e)=>{e.preventDefault();e.stopPropagation();openKeypad(el.id);};
      field.appendChild(btn);
    });
  };
  const origRender=window.render||render;
  window.render=function(){rmRefreshDerived();origRender();setTimeout(enhanceNumericCalculators,0);};
})();
