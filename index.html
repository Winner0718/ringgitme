<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="RinggitMe"/>
<meta name="theme-color" content="#000000" media="(prefers-color-scheme:dark)"/>
<meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme:light)"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>RinggitMe</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap"/>
<link rel="manifest" href="manifest.json"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="icon" type="image/svg+xml" href="icon.svg"/>
<link rel="apple-touch-icon" href="icon.svg"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  /* minimal-premium · neutral palette + single green accent */
  --bg:#f5f5f7;--bg2:#ffffff;--bg3:#f0f0f3;--bg4:#e7e7ec;
  --text:#0e0e12;--text2:#50505a;--text3:#79798a;
  --border:#e7e7ec;--border2:#d4d4dc;
  --green:#0a8a54;--green-bg:#e9f4ee;--red:#cf3b3b;--red-bg:#faecec;
  --blue:#0a8a54;--blue-bg:#e9f4ee;--orange:#b46a1a;--orange-bg:#f6efe6;--purple:#5b5b66;--purple-bg:#eeeef1;
  --accent:#0a8a54;--accent2:#0a8a54;
  --shadow:0 2px 8px rgba(17,17,20,.055);
  --shadow-lg:0 8px 28px rgba(17,17,20,.1);
  --r:16px;--rl:20px;--rx:24px;
  --font-display:'Space Grotesk',-apple-system,BlinkMacSystemFont,sans-serif;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){:root:not([data-theme="light"]){
  --bg:#000000;--bg2:#121214;--bg3:#1b1b1f;--bg4:#27272d;
  --text:#f5f5f7;--text2:#b2b2bd;--text3:#88888f;
  --border:#222228;--border2:#34343c;
  --green:#34d27f;--green-bg:#0d2418;--red:#ff5b5b;--red-bg:#2a1111;
  --blue:#34d27f;--blue-bg:#0d2418;--orange:#d99a4e;--orange-bg:#241a0e;--purple:#9a9aa6;--purple-bg:#1c1c20;
  --accent:#34d27f;--accent2:#34d27f;
  --shadow:0 1px 2px rgba(0,0,0,.4);
  --shadow-lg:0 8px 30px rgba(0,0,0,.55);
}}
:root[data-theme="dark"]{
  --bg:#000000;--bg2:#121214;--bg3:#1b1b1f;--bg4:#27272d;
  --text:#f5f5f7;--text2:#b2b2bd;--text3:#88888f;
  --border:#222228;--border2:#34343c;
  --green:#34d27f;--green-bg:#0d2418;--red:#ff5b5b;--red-bg:#2a1111;
  --blue:#34d27f;--blue-bg:#0d2418;--orange:#d99a4e;--orange-bg:#241a0e;--purple:#9a9aa6;--purple-bg:#1c1c20;
  --accent:#34d27f;--accent2:#34d27f;
  --shadow:0 1px 2px rgba(0,0,0,.4);
  --shadow-lg:0 8px 30px rgba(0,0,0,.55);
}
html{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;-webkit-font-smoothing:antialiased;height:100%;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;font-variant-numeric:tabular-nums;font-feature-settings:'tnum' 1;text-rendering:optimizeLegibility}
input,textarea,select{-webkit-user-select:text;user-select:text}
/* unified press feedback — gives every tappable element real "手感" */
.card,.acct,.fav-row,.po,.pill,.cat-btn,.ig-item,.mode-card,.btn,.mini,.t-ic,.add-btn,.ma button,.ni,.sec-a,.cc-acts .btn,.cdot,.pin-key,.face-btn{transition:transform .13s cubic-bezier(.2,.8,.2,1),background .16s ease,border-color .16s ease,opacity .13s ease,box-shadow .16s ease}
.fav-row:active,.po:active,.cat-btn:active,.mode-card:active,.acct:active,.sec-a:active{transform:scale(.975)}
.ni:active{transform:scale(.88);opacity:.6}
@keyframes contentIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.content.tabfade{animation:contentIn .28s cubic-bezier(.2,.85,.25,1)}
.app{position:relative;height:100%;width:100%;margin:0 auto;max-width:440px;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}

/* ── LOCK SCREEN ── */
.lock-screen{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 30px calc(var(--safe-bot) + 30px);z-index:200;text-align:center}
.lock-logo{width:76px;height:76px;border-radius:22px;background:var(--accent);display:flex;align-items:center;justify-content:center;margin:0 auto 22px;box-shadow:var(--shadow-lg)}
.lock-logo i{font-size:34px;color:#fff}
.lock-title{font-size:25px;font-weight:800;letter-spacing:-.5px;margin-bottom:7px}
.lock-sub{font-size:14px;color:var(--text3);line-height:1.55;margin-bottom:34px;max-width:280px}
.face-btn{width:100%;max-width:320px;padding:15px;border-radius:15px;background:var(--accent);border:none;color:#fff;font-size:16px;font-weight:650;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px;box-shadow:var(--shadow)}
.face-btn:active{transform:scale(.98);opacity:.92}
.face-btn.ghost{background:var(--bg2);color:var(--text);border:1px solid var(--border2);box-shadow:none}
.pin-btn-link{font-size:14px;color:var(--accent);cursor:pointer;padding:10px;margin-top:2px;font-weight:600}
.setup-box{width:100%;max-width:320px;background:var(--bg2);border-radius:16px;padding:18px;margin-bottom:20px;border:1px solid var(--border);box-shadow:var(--shadow);text-align:left}
.setup-box p{font-size:13px;color:var(--text2);line-height:1.6}
.pin-display{display:flex;gap:16px;justify-content:center;margin:22px 0}
.pin-dot{width:13px;height:13px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:all .15s}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);transform:scale(1.05)}
.pin-dot.error{background:var(--red);border-color:var(--red)}
.pin-pad{display:grid;grid-template-columns:repeat(3,76px);gap:14px;margin:14px auto 0}
.pin-key{height:72px;border-radius:50%;border:none;background:var(--bg2);font-size:26px;font-weight:500;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;transition:all .12s;user-select:none;box-shadow:var(--shadow)}
.pin-key:active{background:var(--bg4);transform:scale(.93)}
.pin-key.fn{background:transparent;box-shadow:none;font-size:20px;color:var(--text2)}
.pin-error{font-size:13px;color:var(--red);min-height:18px;margin-top:6px;font-weight:600}
.pin-attempts{font-size:11px;color:var(--text3);margin-top:4px}

/* ── TOP BAR ── */
.topbar{padding:calc(var(--safe-top) + 14px) 18px 12px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-shrink:0;background:var(--bg)}
.topbar>div:first-child{flex:1;min-width:0}
.t-title{font-size:23px;font-weight:600;letter-spacing:-.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.t-sub{font-size:11.5px;color:var(--text3);margin-top:2px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.t-r{display:flex;gap:5px;align-items:center;flex-shrink:0}
.t-ic{width:36px;height:36px;border-radius:11px;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--shadow);font-size:15px}
.t-ic i{font-size:19px;color:var(--text2)}
.t-ic:active{transform:scale(.94)}

.content{flex:1;overflow-y:auto;padding:6px 16px calc(var(--safe-bot) + 96px);-webkit-overflow-scrolling:touch;overscroll-behavior:contain}

/* ── BOTTOM NAV ── */
.nav{position:absolute;bottom:0;left:0;right:0;display:flex;background:var(--bg2);background:color-mix(in srgb,var(--bg2) 88%,transparent);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-top:1px solid var(--border);padding:8px 6px calc(var(--safe-bot) + 8px);justify-content:space-around}
.ni{position:relative;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--text3);cursor:pointer;padding:8px 4px 6px;border:none;background:none;flex:1;font-weight:600;transition:color .15s}
.ni i{font-size:23px;transition:transform .18s cubic-bezier(.2,.8,.2,1)}
.ni.on{color:var(--accent)}
.ni.on i{transform:translateY(-2px) scale(1.06)}
.ni.on::after{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:16px;height:3px;border-radius:99px;background:var(--accent)}
/* ── FLOATING QUICK-ADD ── */
.fab{position:absolute;right:18px;bottom:calc(var(--safe-bot) + 84px);width:56px;height:56px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 22px rgba(10,138,84,.4),0 2px 6px rgba(0,0,0,.2);z-index:40;cursor:pointer;transition:transform .14s cubic-bezier(.2,.8,.2,1)}
.fab i{font-size:28px}
.fab:active{transform:scale(.9)}

/* numerals + titles in the display typeface for character */
.t-title,.hero-v,.hero-sv,.sv,.cc-owed,.acct-v,.aa-num,.txn-a,.aa-txn-a,.dh-r,.field input.big{font-family:var(--font-display)}
/* ── HERO · premium dark wealth card ── */
.hero{position:relative;border-radius:var(--rx);padding:22px 22px 6px;overflow:hidden;margin:10px 0 18px;color:#fff;background:linear-gradient(157deg,#232733 0%,#15171d 48%,#0b0c10 100%);border:1px solid rgba(255,255,255,.08);box-shadow:0 16px 36px rgba(0,0,0,.30)}
.hero::after{content:"";position:absolute;top:-90px;right:-70px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(52,210,127,.22),transparent 68%);pointer-events:none}
.hero::before{content:"";position:absolute;right:14px;bottom:34px;font-family:var(--font-display);font-size:120px;font-weight:700;color:rgba(255,255,255,.03);content:"RM";line-height:1;pointer-events:none}
.hero-top{display:flex;align-items:center;justify-content:space-between;position:relative}
.hero-l{font-size:12px;color:rgba(255,255,255,.62);font-weight:500;letter-spacing:.03em}
.hero-pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:5px 11px;border-radius:99px;background:rgba(255,255,255,.10);color:rgba(255,255,255,.85);position:relative}
.hero-v{font-size:43px;font-weight:600;letter-spacing:-1.5px;margin:8px 0 18px;color:#fff;line-height:1;position:relative}
.hero-row{display:flex;border-top:1px solid rgba(255,255,255,.12);margin:0 -22px;padding:0;position:relative}
.hero-stat{flex:1;min-width:0;padding:13px 16px;position:relative}
.hero-stat+.hero-stat::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:1px;background:rgba(255,255,255,.12)}
.hero-sl{font-size:10.5px;color:rgba(255,255,255,.55);margin-bottom:3px;font-weight:500}
.hero-sv{font-size:14.5px;font-weight:600;letter-spacing:-.3px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── STAT GRID ── */
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.sc{background:linear-gradient(140deg,color-mix(in srgb,var(--scc,var(--accent)) 11%,var(--bg2)),var(--bg2) 70%);border:1px solid var(--border);border-radius:var(--rl);padding:14px 15px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.sc::after{content:'';position:absolute;top:-55%;right:-18%;width:110px;height:110px;border-radius:50%;background:radial-gradient(circle,color-mix(in srgb,var(--scc,#fff) 20%,transparent),transparent 70%);pointer-events:none;z-index:0}
.sc>*{position:relative;z-index:1}
.sc-top{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.sc-ic{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.sl{font-size:11.5px;color:var(--text3);margin-bottom:4px;font-weight:600}
.sv{font-size:20px;font-weight:800;letter-spacing:-.4px}
.g{color:var(--green)}.r{color:var(--red)}.b{color:var(--blue)}.w{color:var(--orange)}.p{color:var(--purple)}

.sec{font-size:12px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin:26px 2px 11px;display:flex;justify-content:space-between;align-items:center}
.sec-a{font-size:12px;color:var(--accent);cursor:pointer;font-weight:600;display:flex;align-items:center;gap:3px;text-transform:none;letter-spacing:0}

/* ── BUDGET ── */
.budget{background:linear-gradient(155deg,color-mix(in srgb,var(--tint,var(--accent)) 9%,var(--bg2)),var(--bg2) 70%);border:1px solid var(--border);border-radius:var(--rl);padding:15px 16px;margin-bottom:14px;box-shadow:var(--shadow);cursor:pointer}
.budget-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:11px}
.budget-l{font-size:12px;color:var(--text3);font-weight:600}
.budget-v{font-size:13.5px;font-weight:700;font-family:var(--font-display)}
.budget-bar{height:8px;border-radius:99px;background:var(--bg4);overflow:hidden}
.budget-bar i{display:block;height:100%;border-radius:99px;transition:width .5s cubic-bezier(.2,.8,.2,1)}
.budget-foot{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-top:8px;font-weight:500}
.budget-set{border-style:dashed;border-color:var(--border2);text-align:center;color:var(--text2);font-size:13.5px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:7px}
/* ── GOALS ── */
.goal{background:linear-gradient(155deg,color-mix(in srgb,var(--tint,var(--accent)) 10%,var(--bg2)),var(--bg2) 68%);border:1px solid var(--border);border-radius:var(--rl);padding:14px 15px;margin-bottom:10px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.goal-top{display:flex;align-items:center;gap:14px}
.goal-ring{position:relative;width:58px;height:58px;flex-shrink:0}
.goal-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:var(--font-display)}
.goal-m{flex:1;min-width:0}
.goal-n{font-size:14.5px;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.goal-s{font-size:12px;color:var(--text3);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card{background:linear-gradient(165deg,var(--bg2),color-mix(in srgb,var(--bg3) 50%,var(--bg2)));border:1px solid var(--border);border-radius:var(--rl);padding:15px;margin-bottom:10px;box-shadow:var(--shadow)}
.row{display:flex;align-items:center;gap:12px}
.name{font-size:15px;font-weight:650;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{font-size:10px;padding:3px 9px;border-radius:99px;font-weight:700;flex-shrink:0;letter-spacing:.02em}
.bcc{background:var(--red-bg);color:var(--red)}.bsav{background:var(--green-bg);color:var(--green)}.bew{background:var(--orange-bg);color:var(--orange)}.bsub{background:var(--blue-bg);color:var(--blue)}.bloan{background:var(--purple-bg);color:var(--purple)}

/* ── CREDIT CARD VISUAL (premium) ── */
.cc{position:relative;border-radius:var(--rl);padding:18px;color:#fff;overflow:hidden;margin-bottom:11px;box-shadow:0 14px 30px rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.09)}
.cc::after{content:"";position:absolute;top:-80px;right:-60px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.14),transparent 68%);pointer-events:none}
.cc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;position:relative;margin-bottom:16px}
.cc-head-m{flex:1;min-width:0;text-align:right}
.cc-name{font-size:15px;font-weight:600;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow-wrap:break-word;word-break:normal}
.cc-due{font-size:11px;opacity:.8;margin-top:3px;letter-spacing:.02em;line-height:1.4;overflow-wrap:break-word;word-break:normal}
.cc-chip{width:34px;height:26px;border-radius:6px;background:linear-gradient(135deg,#f3e3b0,#c9ad63);position:relative;margin-bottom:16px;box-shadow:inset 0 0 0 .5px rgba(0,0,0,.15)}
.cc-chip::after{content:"";position:absolute;inset:5px 7px;border-radius:3px;border:.5px solid rgba(0,0,0,.18)}
.cc-owed-l{font-size:11px;opacity:.78;position:relative}
.cc-owed{font-size:28px;font-weight:600;letter-spacing:-.5px;position:relative;margin:2px 0 14px}
.cc-bar{height:5px;border-radius:99px;background:rgba(255,255,255,.22);overflow:hidden;position:relative}
.cc-bar i{display:block;height:100%;border-radius:99px;background:#fff}
.cc-foot{display:flex;justify-content:space-between;font-size:11px;opacity:.85;margin-top:8px;position:relative}
.cc-acts{display:flex;gap:7px;margin:-1px 0 13px;flex-wrap:wrap}

/* ── ACCOUNT ROW (saving / ew) ── */
.acctcard{background:linear-gradient(155deg,color-mix(in srgb,var(--tint,var(--accent)) 10%,var(--bg2)),var(--bg2) 68%);border:1px solid var(--border);border-radius:var(--rl);padding:15px;margin-bottom:10px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.acct-top{display:flex;align-items:center;gap:12px}
.acct-m{flex:1;min-width:0}
.acct-n{font-size:15px;font-weight:650;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow-wrap:break-word;word-break:normal}
.acct-s{font-size:11.5px;color:var(--text3);margin-top:3px;line-height:1.4;overflow-wrap:break-word;word-break:normal}
.acct-b{text-align:right;flex-shrink:0;padding-left:8px}
.acct-v{font-size:18px;font-weight:800;letter-spacing:-.3px}
.acct-acts{display:flex;gap:8px;margin-top:13px;flex-wrap:wrap}
.mini{width:34px;height:34px;border-radius:11px;border:1px solid var(--border2);background:var(--bg2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);flex-shrink:0}
.mini i{font-size:16px}
.mini:active{transform:scale(.92)}
.mini.g{color:var(--green);background:var(--green-bg);border-color:transparent}
.mini.w{color:var(--orange);background:var(--orange-bg);border-color:transparent}
.mini.del{color:var(--red)}

.dg{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-top:12px}
.db{background:var(--bg3);border-radius:11px;padding:9px 11px}
.dl{font-size:11px;color:var(--text3);margin-bottom:2px;font-weight:500}
.dv{font-size:14px;font-weight:700}
.dv.r{color:var(--red)}.dv.g{color:var(--green)}.dv.w{color:var(--orange)}.dv.b{color:var(--blue)}
.prog{margin-top:12px}
.pl{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px;font-weight:500}
.pt{background:var(--bg4);border-radius:99px;height:6px;overflow:hidden}
.pf{height:100%;border-radius:99px;transition:width .4s}
.acts{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap}
.btn{font-size:12.5px;padding:8px 13px;border-radius:11px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;font-weight:650}
.btn:active{transform:scale(.96)}
.btn.pay{background:var(--blue-bg);border-color:transparent;color:var(--blue)}
.btn.topup{background:var(--green-bg);border-color:transparent;color:var(--green)}
.btn.spd{background:var(--orange-bg);border-color:transparent;color:var(--orange)}
.btn.del{color:var(--red);border-color:transparent;background:transparent;padding:8px 10px}

.add-btn{width:100%;padding:14px;border-radius:var(--r);border:1.5px dashed var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-size:13.5px;display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:10px;font-weight:650}
.add-btn:active{background:var(--bg3)}
.empty{text-align:center;padding:38px 20px;color:var(--text3)}
.empty-ic{width:66px;height:66px;border-radius:20px;background:color-mix(in srgb,var(--accent) 12%,var(--bg2));border:1px solid color-mix(in srgb,var(--accent) 22%,transparent);display:flex;align-items:center;justify-content:center;margin:0 auto 15px}
.empty-ic i{font-size:30px;color:var(--accent)}

/* ── MODAL ── */

.field{margin-bottom:15px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:7px;font-weight:650}

.pill{font-size:13px;padding:9px 15px;border-radius:99px;border:1.5px solid var(--border2);cursor:pointer;color:var(--text2);background:var(--bg2);font-weight:600}

.ib.b{background:var(--blue-bg);color:var(--blue)}.ib.g{background:var(--green-bg);color:var(--green)}.ib.w{background:var(--orange-bg);color:var(--orange)}

.preset-list{display:grid;grid-template-columns:minmax(0,1fr);min-width:0;gap:7px;max-height:238px;overflow-x:hidden;overflow-y:auto;padding:1px 2px 3px;margin:6px -2px 14px}
.preset-pick{display:flex;align-items:center;gap:10px;width:100%;min-width:0;border:1.5px solid var(--border);border-radius:13px;background:var(--bg2);padding:9px 10px;text-align:left;color:var(--text);cursor:pointer}
.preset-pick.on{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 7%,var(--bg2))}
.preset-pick-m{flex:1;min-width:0}.preset-pick-n{display:block;font-size:12.5px;font-weight:700;line-height:1.25;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.preset-pick-s{display:block;font-size:10.5px;color:var(--text3);margin-top:2px}
.preset-asset-note{font-size:11px;color:var(--text3);line-height:1.45;margin:-5px 1px 13px}
.swipe-opt{position:relative;overflow:hidden;border-radius:14px;touch-action:pan-y}
.swipe-main{position:relative;z-index:2;transition:transform .18s ease}
.swipe-opt.show-del .swipe-main{transform:translateX(-62px)}
.swipe-opt .swipe-del{position:absolute;z-index:1;right:0;top:0;bottom:0;width:58px;border:0;border-radius:12px;background:var(--red);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer}
.bank-swipe{width:78px;min-width:78px;flex-shrink:0}.bank-swipe .bank-pick{width:78px;min-width:0;height:100%}
.ig-swipe{border-radius:14px}.ig-swipe .ig-item{width:100%;height:100%}.ig-swipe.show-del .swipe-main{transform:translateX(-48px)}.ig-swipe .swipe-del{width:46px;font-size:11px;border-radius:12px}
.preset-reset{border:0;background:transparent;color:var(--accent);font-size:11.5px;font-weight:700;padding:5px 2px 0;margin:-4px 0 8px;display:inline-flex;align-items:center;gap:4px;cursor:pointer}
.preset-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:3px 1px 6px}
.preset-manage{border:0;background:transparent;color:var(--accent);font-size:11.5px;font-weight:750;padding:5px 0;cursor:pointer;white-space:nowrap}
.preset-tile-wrap{position:relative;border-radius:14px}
.preset-tile-wrap .bank-pick{width:78px;min-width:78px;height:100%}
.preset-tile-wrap.editing .ig-item,.preset-tile-wrap.editing .bank-pick{padding-top:16px}
.ig-del{position:absolute;z-index:3;right:2px;top:2px;border:0;border-radius:99px;background:var(--red);color:#fff;min-width:22px;height:22px;padding:0 6px;font-size:11px;font-weight:850;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.18);cursor:pointer}
.balance-effect{display:grid;grid-template-columns:1fr;gap:7px}
.be-opt{border:1.5px solid var(--border);background:var(--bg2);border-radius:13px;padding:10px 12px;cursor:pointer;display:flex;align-items:flex-start;gap:9px}
.be-opt.on{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 8%,var(--bg2))}
.be-dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--border2);margin-top:1px;flex-shrink:0}.be-opt.on .be-dot{border-color:var(--accent);box-shadow:inset 0 0 0 4px var(--bg2);background:var(--accent)}
.be-t{font-size:12.5px;font-weight:750;line-height:1.35;color:var(--text)}.be-s{font-size:11px;color:var(--text3);line-height:1.45;margin-top:2px}
.mini-badges{display:flex;gap:6px;flex-wrap:wrap;margin:8px 3px 0}.mini-badge{font-size:10.5px;font-weight:750;border-radius:99px;background:rgba(255,255,255,.13);color:rgba(255,255,255,.86);padding:4px 8px;line-height:1.2}.mini-badge.warn{background:rgba(245,158,11,.18);color:#ffd28a}.mini-badge.ok{background:rgba(16,185,129,.2);color:#b8f7d7}
.cc-ob{margin:8px 3px 0;padding:8px 9px;border-radius:12px;background:rgba(255,255,255,.1);display:grid;grid-template-columns:1fr 1fr;gap:6px}.cc-ob div{min-width:0}.cc-ob-l{font-size:9.5px;color:rgba(255,255,255,.66);line-height:1.2}.cc-ob-v{font-size:12px;color:#fff;font-weight:750;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inst-list{display:grid;gap:8px;margin:8px 0 12px}.inst-row{border:1px solid var(--border);border-radius:13px;background:var(--bg2);padding:10px 11px}.inst-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.inst-name{font-size:13px;font-weight:750;line-height:1.3}.inst-meta{font-size:11px;color:var(--text3);line-height:1.45;margin-top:2px}.inst-amt{font-size:13px;font-weight:850;color:var(--accent);white-space:nowrap}.inst-actions{display:flex;gap:7px;margin-top:8px}.inst-actions button{flex:1}
.preset-card-preview{position:relative;overflow:hidden;border-radius:14px;padding:11px 11px 13px;margin:4px 0 14px;color:#fff;background:linear-gradient(155deg,#2c2e34,#161719)}

.preset-card-preview-name{position:relative;font-size:13px;font-weight:700;margin:10px 3px 2px;color:#fff}.preset-card-preview-meta{position:relative;font-size:11px;color:rgba(255,255,255,.72);margin:0 3px}
.cc-real{position:relative;border-radius:var(--rl);padding:11px 11px 14px;margin-bottom:11px;color:#fff;overflow:hidden;background:linear-gradient(155deg,#2c2e34,#161719);box-shadow:0 16px 34px rgba(0,0,0,.34);border:1px solid rgba(255,255,255,.10)}

.cc-real-img{position:relative;margin:0 0 13px}

<script>
// Phase 9.8 early boot guard: ignore iOS Safari share-sheet Script error noise.
(function(){
  var bootAt=Date.now();
  window.__RM_BOOT_READY=false;
  function cleanMsg(err){
    if(!err)return '';
    var msg=(err && (err.stack||err.message)) ? (err.stack||err.message) : String(err||'');
    msg=String(msg||'').trim();
    // iOS Safari can fire generic cross-origin errors while opening Share Sheet / Add to Home Screen.
    // Those are browser noise, not RinggitMe startup crashes. Do not cover the app with boot guard.
    if(!msg || msg==='undefined' || msg==='null' || msg==='[object Event]' || msg==='Unknown error' || msg==='Script error.' || msg==='Script error')return '';
    return msg;
  }
  function showBootError(err){
    try{
      var msg=cleanMsg(err);
      if(!msg)return;
      if(window.__RM_BOOT_READY || Date.now()-bootAt>7000){
        console.error('RinggitMe runtime error blocked',err);
        return;
      }
      var app=document.getElementById('app');
      if(app){
        app.innerHTML='<div style="min-height:100%;padding:calc(env(safe-area-inset-top,0px) + 28px) 18px 28px;background:#f5f5f7;color:#111;font-family:-apple-system,BlinkMacSystemFont,sans-serif;overflow:auto"><div style="max-width:420px;margin:0 auto"><div style="font-size:22px;font-weight:800;margin-bottom:8px">RinggitMe 启动保护</div><div style="font-size:13px;line-height:1.55;background:#fff;border:1px solid #ddd;border-radius:16px;padding:14px;margin-bottom:12px">App 启动时有一段代码报错，所以我先挡住白屏。数据没有丢。把下面错误截图给我。</div><pre style="white-space:pre-wrap;font-size:11px;line-height:1.4;background:#111;color:#fff;border-radius:12px;padding:12px;max-height:260px;overflow:auto">'+msg.replace(/[<>&]/g,function(m){return {"<":"&lt;",">":"&gt;","&":"&amp;"}[m]})+'</pre><button onclick="location.reload()" style="width:100%;margin-top:12px;border:0;border-radius:14px;padding:14px;font-size:15px;font-weight:750;background:#0a8a54;color:#fff">重新载入</button></div></div>';
      }
    }catch(e){}
  }
  window.addEventListener('error',function(e){
    try{
      var msg=String((e && e.message) || '').trim();
      // Safari Share Sheet / Add to Home Screen sometimes emits this without a real stack.
      if(msg==='Script error.' || msg==='Script error')return;
      showBootError(e && (e.error||e.message));
    }catch(_e){}
  },true);
  window.addEventListener('unhandledrejection',function(e){showBootError(e && e.reason);},true);
  setTimeout(function(){window.__RM_BOOT_READY=true;},7000);
})();

// SECURITY — WebAuthn (optional) + PIN
// ══════════════════════════════════════════════════════
const SEC = {
  CRED_KEY:'rm_webauthn_cred', PIN_KEY:'rm_pin_hash',
  async hashPin(pin){const data=new TextEncoder().encode(pin+'ringgitme_salt_2025');const buf=await crypto.subtle.digest('SHA-256',data);return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');},
  isWebAuthnAvailable(){return window.PublicKeyCredential!==undefined&&location.protocol==='https:';},
  hasSavedCred(){return !!localStorage.getItem(this.CRED_KEY);},
  hasPIN(){return !!localStorage.getItem(this.PIN_KEY);},
  async setupWebAuthn(){try{const challenge=crypto.getRandomValues(new Uint8Array(32));const userId=crypto.getRandomValues(new Uint8Array(16));const cred=await navigator.credentials.create({publicKey:{challenge,rp:{name:'RinggitMe',id:location.hostname},user:{id:userId,name:'ringgitme_user',displayName:'RinggitMe User'},pubKeyCredParams:[{alg:-7,type:'public-key'},{alg:-257,type:'public-key'}],authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required'},timeout:60000}});if(cred){localStorage.setItem(this.CRED_KEY,btoa(String.fromCharCode(...new Uint8Array(cred.rawId))));return true;}}catch(e){console.log('WebAuthn setup failed:',e);}return false;},
  async verifyWebAuthn(){try{const credIdB64=localStorage.getItem(this.CRED_KEY);if(!credIdB64)return false;const credIdBytes=Uint8Array.from(atob(credIdB64),c=>c.charCodeAt(0));const challenge=crypto.getRandomValues(new Uint8Array(32));const assertion=await navigator.credentials.get({publicKey:{challenge,allowCredentials:[{id:credIdBytes,type:'public-key'}],userVerification:'required',timeout:60000}});return !!assertion;}catch(e){console.log('WebAuthn verify failed:',e);return false;}},
  async savePin(pin){localStorage.setItem(this.PIN_KEY,await this.hashPin(pin));},
  async verifyPin(pin){const stored=localStorage.getItem(this.PIN_KEY);if(!stored)return false;return (await this.hashPin(pin))===stored;},
};

async function pushCloud(){if(!supaReady())return;try{await supa.from('ledgers').upsert({user_id:SESSION.user.id,data:D,updated_at:new Date(D.updatedAt||Date.now()).toISOString()});}catch(e){console.log('pushCloud',e);}}
async function pullCloud(){if(!supaReady())return null;try{const{data,error}=await supa.from('ledgers').select('data').eq('user_id',SESSION.user.id).maybeSingle();if(error){console.log('pullCloud',error);return null;}return data?data.data:null;}catch(e){console.log('pullCloud',e);return null;}}
// 根据"本机数据归属哪个账号"决定：拉云端 / 推本机 / 换成空账本，避免把 A 的数据漏给 B
async function adoptCloudOrPush(){if(!supaReady())return;const uid=SESSION.user.id,owner=localStorage.getItem('rm_owner')||'';const cloud=await pullCloud();const adopt=()=>{backupPrev();D={...fresh(),...cloud};persistLocal();localStorage.setItem('rm_owner',uid);if(LOCK&&LOCK.state==='unlocked')render();toast('☁️ 已载入该账号的云端数据');};
  if(hasData(cloud)){const cu=cloud.updatedAt||0,lu=D.updatedAt||0;if(owner===uid){if(lu>cu)pushCloud();else if(cu>lu)adopt();localStorage.setItem('rm_owner',uid);}else adopt();}
  else{if(owner&&owner!==uid){backupPrev();D=fresh();persistLocal();localStorage.setItem('rm_owner',uid);if(LOCK&&LOCK.state==='unlocked')render();toast('✓ 已切换到该账号（空账本）');}else{localStorage.setItem('rm_owner',uid);pushCloud();}}}
async function flushCurrent(){if(supaReady()){clearTimeout(_pushT);await pushCloud();}}
async function authSignUp(){if(!supa){toast('请先配置云同步');return;}const email=v('au-email'),pw=v('au-pw');if(!email||pw.length<6){toast('邮箱 + 至少6位密码');return;}await flushCurrent();toast('注册中…');const{data,error}=await supa.auth.signUp({email,password:pw});if(error){toast('注册失败：'+error.message);return;}if(data.session){toast('✓ 注册成功，已登录');}else{toast('✓ 注册成功，请到邮箱点确认链接后登录');}}
async function authSignIn(){if(!supa){toast('请先配置云同步');return;}const email=v('au-email'),pw=v('au-pw');if(!email||!pw){toast('填邮箱和密码');return;}await flushCurrent();toast('登录中…');const{error}=await supa.auth.signInWithPassword({email,password:pw});if(error){toast('登录失败：'+error.message);return;}toast('✓ 登录成功');}
async function authGoogle(){if(!supa){toast('请先配置云同步');return;}await flushCurrent();const{error}=await supa.auth.signInWithOAuth({provider:'google',options:{redirectTo:location.href.split('#')[0],queryParams:{prompt:'select_account'}}});if(error)toast('Google 登录失败：'+error.message);}
async function switchAccount(id){if(!supa){toast('云同步未就绪');return;}if(SESSION&&SESSION.user&&SESSION.user.id===id)return;const acc=accounts().find(a=>a.id===id);if(!acc){toast('账号信息丢失，请重新登录');return;}toast('切换中…');await flushCurrent();const{data,error}=await supa.auth.setSession({access_token:acc.access_token,refresh_token:acc.refresh_token});if(error||!data||!data.session){toast('该账号登录已过期，请重新登录');forgetAccount(id);U.addAccount=true;render();return;}/* onAuthStateChange 会因 uid 变化自动 adoptCloudOrPush */}
function addAnotherAccount(){U.addAccount=true;render();}
function cancelAddAccount(){U.addAccount=false;render();}
function removeAccount(id){const acc=accounts().find(a=>a.id===id);confirmSheet('从这台设备移除该账号？',(acc&&acc.email?acc.email+'\n':'')+'只是不在这台设备保留登录，云端数据不受影响，以后还能重新登录。',async()=>{const others=accounts().filter(a=>a.id!==id);forgetAccount(id);if(SESSION&&SESSION.user&&SESSION.user.id===id){if(others.length){await switchAccount(others[0].id);}else{try{await supa.auth.signOut({scope:'local'});}catch(e){}SESSION=null;render();}}else render();toast('已移除');},{danger:true,okText:'移除'});}
async function syncNow(){if(!supaReady()){toast('未登录');return;}toast('同步中…');await pushCloud();toast('✓ 已上传到云端');}
function saveSupaCfg(){const url=v('supa-url').replace(/\/$/,''),key=v('supa-key');if(!url||!key){toast('填入 URL 和 anon key');return;}localStorage.setItem('rm_supa_url',url);localStorage.setItem('rm_supa_key',key);initSupa();closeModal();setTimeout(()=>openModal('settings'),60);toast('✓ 云同步已配置，请登录');}

}

const today=()=>new Date().toLocaleDateString('en-MY',{month:'short',day:'numeric'});
const todayISO=()=>{const d=new Date();return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10);};
const nowHM=()=>{const d=new Date();return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);};
const fmt=n=>{if(D.privacyMode)return'RM ••••';return'RM '+parseFloat(Math.abs(n)||0).toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2});};
const fmtR=n=>'RM '+parseFloat(Math.abs(n)||0).toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2});
// Display-only normalization for legacy English-first labels; stored IDs and snapshots stay unchanged.
const UI_LABELS={'Mamak / Kopitiam':'嘛嘛档 / 咖啡店 Mamak / Kopitiam','Food delivery':'外卖 Food delivery','Shopee / Lazada':'网购 Shopee / Lazada','Guardian / Watson':'药妆 Guardian / Watson','Grab ride':'网约车 Grab ride','Toll 过路费':'过路费 Toll','Parking':'停车 Parking','TGV / GSC 电影':'电影 TGV / GSC','Karaoke':'卡拉 OK Karaoke','房产佣金 Comm.':'房产佣金 Commission','订阅 Subscription':'订阅 Subscription','贷款 / 租金':'贷款 / 租金 Loans & Rent'};
const uiLabel=label=>UI_LABELS[label]||label||'';
const pct=(u,l)=>Math.min(100,Math.round(((u||0)/(l||1))*100));
const money=n=>parseFloat(n)||0;
function round2(n){return parseFloat((money(n)).toFixed(2));}
function daysInMonth(y,m){return new Date(y,m,0).getDate();}
function lastDayOfMonthISO(ym=todayISO().slice(0,7)){const [y,m]=ym.split('-').map(Number);return `${y}-${String(m).padStart(2,'0')}-${daysInMonth(y,m)}`;}
function autoPaymentDueDay(){return parseInt(lastDayOfMonthISO().slice(-2));}
function addDaysISO(iso,days){const d=new Date((iso||todayISO())+'T00:00:00');d.setDate(d.getDate()+(parseInt(days)||0));return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10);}
function formatISODate(iso){if(!iso)return'';try{return new Date(iso+'T00:00:00').toLocaleDateString('en-MY',{day:'2-digit',month:'short',year:'numeric'});}catch(e){return iso;}}
function getCardCycleStart(card){return card&&(card.currentCycleStartDate||card.cycleStartDate||'');}
function getCardAutoDueDate(card){if(!card)return'';if(card.manualDueDate)return card.manualDueDate;if(card.autoDueDate)return card.autoDueDate;const s=getCardCycleStart(card);return s?addDaysISO(s,30):'';}
function getCardDueLabel(card){const due=getCardAutoDueDate(card);return due?formatISODate(due):'下一笔消费后自动生成';}
function ensureCardCycle(card,isoDate){if(!card)return;const normal=getCardNormalUnpaidSpending(card);if(normal>0&&!getCardCycleStart(card)){const s=isoDate||todayISO();card.currentCycleStartDate=s;card.autoDueDate=addDaysISO(s,30);}if(normal<=0){card.currentCycleStartDate='';card.autoDueDate='';card.manualDueDate=card.manualDueDate||'';}}
function resetCardCycleIfCleared(card){if(card&&getCardNormalUnpaidSpending(card)<=0){card.currentCycleStartDate='';card.autoDueDate='';}}
function monthDiff(startYm,endYm=todayISO().slice(0,7)){if(!startYm)return 0;const [sy,sm]=startYm.split('-').map(Number),[ey,em]=endYm.split('-').map(Number);if(!sy||!sm||!ey||!em)return 0;return Math.max(0,(ey-sy)*12+(em-sm));}
function normalizeCreditCard(card){if(!card)return{};const owed=money(card.currentOutstanding!=null?card.currentOutstanding:card.owed);const dueDay=card.paymentDueDate||card.dueDay||autoPaymentDueDay();return{...card,currentOutstanding:owed,owed,statementBalance:money(card.statementBalance),monthlyDue:money(card.monthlyDue),monthlyDueMode:card.monthlyDueMode||((money(card.monthlyDue)>0)?'manual':'auto'),statementDate:card.statementDate||'',paymentDueDate:dueDay,dueDay,monthlyDuePaid:!!card.monthlyDuePaid,availableLimit:Math.max(0,money(card.limit)-getCardTotalDebt(card.id))};}
function getCardNormalUnpaidSpending(cardOrId){const card=typeof cardOrId==='object'?cardOrId:findCardById(cardOrId);return money(card&&(card.currentOutstanding!=null?card.currentOutstanding:card.owed));}
function getCreditCardOutstanding(card){return getCardNormalUnpaidSpending(card);}
function getCardInstallmentRemaining(cardId){return activeInstallments(cardId).reduce((a,p)=>a+money(p.remainingBalance),0);}
function getCardInstallmentMonthlyDue(cardId){return activeInstallments(cardId).filter(p=>p.includeInMonthlyPressure).reduce((a,p)=>a+money(p.monthlyPayment),0);}
function getCardCurrentMonthNormalSpending(cardId){const mo=todayISO().slice(0,7);return (D.txns||[]).filter(t=>sameId(t.payId,cardId)&&(t.isoDate||'').slice(0,7)===mo&&!isRecordOnlyTransaction(t)).reduce((a,t)=>a+money(t.amt),0);}
function getCardTotalDebt(cardOrId){const card=typeof cardOrId==='object'?cardOrId:findCardById(cardOrId);if(!card)return 0;return getCardNormalUnpaidSpending(card)+getCardInstallmentRemaining(card.id);}
function getCardUsedLimit(cardOrId){return getCardTotalDebt(cardOrId);}
function getCardAvailableLimit(cardOrId){const card=typeof cardOrId==='object'?cardOrId:D.cards.find(c=>c.id===cardOrId);return Math.max(0,money(card&&card.limit)-getCardUsedLimit(card));}
function getCreditCardMonthlyDue(card){if(!card)return 0;const c=normalizeCreditCard(card);if(c.monthlyDueMode==='manual')return money(c.monthlyDue);return getCardNormalUnpaidSpending(c)+getCardInstallmentMonthlyDue(c.id);}
function getCardThisMonthDue(cardOrId){const card=typeof cardOrId==='object'?cardOrId:findCardById(cardOrId);if(!card)return 0;const c=normalizeCreditCard(card);return c.monthlyDuePaid?0:getCreditCardMonthlyDue(c);}
function getPendingCreditCardMonthlyDue(card){return getCardThisMonthDue(card);}
function getCreditCards(){return D.cards.filter(c=>c.type==='cc');}
function getTotalCardDebt(){return getCreditCards().reduce((a,c)=>a+getCardTotalDebt(c),0);}
function getTotalCreditCardOutstanding(){return getTotalCardDebt();}
function getSavingsTotal(){return D.cards.filter(c=>c.type==='saving').reduce((a,c)=>a+money(c.balance),0);}
function getEwalletTotal(){return D.cards.filter(c=>c.type==='ew').reduce((a,c)=>a+money(c.balance),0);}
function getCashNow(){return getSavingsTotal()+getEwalletTotal();}
function getInstallments(){if(!Array.isArray(D.ccInstallments))D.ccInstallments=[];return D.ccInstallments;}
function normalizeInstallment(p){const paid=Math.max(0,parseInt(p&&p.paidMonths)||0),tenure=Math.max(0,parseInt(p&&p.tenureMonths)||0),monthly=money(p&&p.monthlyPayment)||((tenure>0)?money(p&&p.totalAmount)/tenure:0),remainingMonths=Math.max(0,tenure-paid),remainingBalance=money(p&&p.remainingBalance)||(monthly*remainingMonths),status=(p&&p.status)||((remainingMonths<=0)?'completed':'active');return{...p,paidMonths:paid,tenureMonths:tenure,monthlyPayment:monthly,remainingMonths,remainingBalance,status,includeInMonthlyPressure:p&&p.includeInMonthlyPressure!==false,includeInTotalDebt:!!(p&&p.includeInTotalDebt)};}
function cardInstallments(cardId){return getInstallments().filter(p=>sameId(p.cardId,cardId)).map(normalizeInstallment);}
function activeInstallments(cardId){return cardInstallments(cardId).filter(p=>p.status!=='completed'&&p.remainingMonths>0);}
function getInstallmentMonthlyTotal(){return getInstallments().map(normalizeInstallment).filter(p=>p.status!=='completed'&&p.includeInMonthlyPressure).reduce((a,p)=>a+money(p.monthlyPayment),0);}
function getInstallmentRemainingTotal(extraOnly=false){return getInstallments().map(normalizeInstallment).filter(p=>p.status!=='completed'&&(!extraOnly||(!p.cardId&&p.includeInTotalDebt))).reduce((a,p)=>a+money(p.remainingBalance),0);}
function getPendingCardDue(){return getCreditCards().reduce((a,c)=>a+getPendingCreditCardMonthlyDue(c),0);}
function getAfterCardPaymentCash(){return getCashNow()-getPendingCardDue();}
function getFullPayoffPosition(){return getCashNow()-getTotalCardDebt()-getInstallmentRemainingTotal(true);}
function getCreditCardMonthlyObligations(){let out=[];getCreditCards().forEach(c=>{activeInstallments(c.id).filter(p=>p.includeInMonthlyPressure).forEach(p=>out.push({type:'installment',cardId:c.id,id:p.id,name:p.itemName,cardName:c.name,amount:p.monthlyPayment,remainingMonths:p.remainingMonths,tenureMonths:p.tenureMonths,remainingBalance:p.remainingBalance,nextDueDate:p.nextDueDate||getCardDueLabel(c),countInTotal:true,aaSplit:p.aaSplit||null}));});return out;}
function getMonthlyFixedTotal(){return D.subs.reduce((a,s)=>a+money(s.amt),0)+D.loans.reduce((a,l)=>a+money(l.monthly),0)+getCreditCardMonthlyObligations().reduce((a,o)=>a+money(o.amount),0);}
function getFixedMonthlyTotalIncludingCardPayments(){return getMonthlyFixedTotal();}
function getTransactionPostingMode(tx){return(tx&&tx.postingMode)||'normal';}
function isRecordOnlyTransaction(tx){return getTransactionPostingMode(tx)==='recordOnly';}
function sameId(a,b){return String(a)===String(b);}
function findCardById(id){return (D.cards||[]).find(c=>sameId(c.id,id));}
function findTxnIndexById(id){return (D.txns||[]).findIndex(t=>sameId(t.id,id));}
function isCreditCardExpense(tx){const c=tx&&findCardById(tx.payId);return !!(c&&c.type==='cc');}
function isSavingsOrWalletExpense(tx){const c=tx&&findCardById(tx.payId);return !!(c&&(c.type==='saving'||c.type==='ew'));}
function applyTransactionBalanceEffect(tx){if(!tx||isRecordOnlyTransaction(tx))return true;const c=findCardById(tx.payId),amt=round2(tx.amt);if(!c||!amt)return true;if(c.type==='cc'){const before=getCardNormalUnpaidSpending(c),next=before+amt;c.owed=round2(next);c.currentOutstanding=c.owed;if(before<=0&&next>0){const s=tx.isoDate||todayISO();c.currentCycleStartDate=s;c.autoDueDate=addDaysISO(s,30);}c.availableLimit=getCardAvailableLimit(c);return true;}if(c.type==='ew'||c.type==='saving'){if(money(c.balance)<amt){toast(c.type==='ew'?'eWallet 余额不足':'储蓄余额不足');return false;}c.balance=round2(money(c.balance)-amt);return true;}return true;}
function reverseTransactionBalanceEffect(tx){if(!tx||isRecordOnlyTransaction(tx))return true;const c=findCardById(tx.payId),amt=round2(tx.amt);if(!c||!amt)return true;if(c.type==='cc'){const next=Math.max(0,getCardNormalUnpaidSpending(c)-amt);c.owed=round2(next);c.currentOutstanding=c.owed;if(next<=0)resetCardCycleIfCleared(c);c.availableLimit=getCardAvailableLimit(c);return true;}if(c.type==='ew'||c.type==='saving'){c.balance=round2(money(c.balance)+amt);return true;}return true;}
function getAAReceivables(){if(!Array.isArray(D.aaReceivables))D.aaReceivables=[];return D.aaReceivables;}
function aaPersonName(id){const p=(D.aaPeople||[]).find(x=>x.id===id);return p?p.name:'';}
function calcAAOwed(total,split){if(!split||!split.enabled)return 0;if(split.method==='custom')return money(split.amount);if(split.method==='percent')return money(total)*Math.min(100,Math.max(0,money(split.percent)))/100;return money(total)/Math.max(2,parseInt(split.peopleCount)||2);}
function upsertAAReceivable(sourceType,sourceId,total,split,desc){if(!split||!split.enabled||!split.personId)return;const owed=round2(calcAAOwed(total,split));if(!owed)return;const arr=getAAReceivables();const old=arr.find(r=>r.sourceType===sourceType&&r.sourceId===sourceId);const obj={id:old?old.id:nid(),sourceType,sourceId,personId:split.personId,personName:aaPersonName(split.personId),desc:desc||'',owedAmount:owed,settledAmount:old?Math.min(money(old.settledAmount),owed):0,status:(old&&money(old.settledAmount)>=owed)?'paid':'unpaid',date:todayISO()};if(old)Object.assign(old,obj);else arr.unshift(obj);}
function removeAAReceivable(sourceType,sourceId){D.aaReceivables=getAAReceivables().filter(r=>!(r.sourceType===sourceType&&r.sourceId===sourceId));}
function getAAReceivableTotal(){return getAAReceivables().reduce((a,r)=>a+Math.max(0,money(r.owedAmount)-money(r.settledAmount)),0);}
function settleAAReceivable(id){const r=getAAReceivables().find(x=>x.id===id);if(!r)return;const src=U.selSavId&&U.selSavId>0?D.cards.find(c=>c.id===U.selSavId):null,amt=Math.max(0,money(r.owedAmount)-money(r.settledAmount));if(src&&(src.type==='saving'||src.type==='ew'))src.balance=round2(money(src.balance)+amt);r.settledAmount=round2(money(r.owedAmount));r.status='paid';save();render();toast('✓ AA 已结算 '+fmtR(amt));playSound('in');}
const nid=()=>D.nextId++;

function shade(hex,f){try{let c=hex.replace('#','');if(c.length===3)c=c.split('').map(x=>x+x).join('');const n=parseInt(c,16);let r=Math.min(255,Math.max(0,Math.round(((n>>16)&255)*f)));let g=Math.min(255,Math.max(0,Math.round(((n>>8)&255)*f)));let b=Math.min(255,Math.max(0,Math.round((n&255)*f)));return'#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');}catch{return hex;}}

  if(spec.img){return `<img src="${spec.img}" style="width:${size}px;height:${size}px;border-radius:${radius}px;object-fit:cover;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.15)" alt=""/>`;}

function beep(freq,start,dur,type,gain){const ac=_ac();if(!ac)return;try{const o=ac.createOscillator(),g=ac.createGain();o.type=type||'sine';o.frequency.value=freq;o.connect(g);g.connect(ac.destination);const t=ac.currentTime+start;g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(gain||0.18,t+0.012);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.start(t);o.stop(t+dur+0.03);}catch(e){}}
function synthSound(kind){try{if(kind==='in'||kind==='income'){beep(740,0,0.10,'triangle',0.18);beep(988,0.075,0.12,'triangle',0.2);beep(1318,0.16,0.20,'sine',0.16);}else if(kind==='neutral'||kind==='transfer'||kind==='repay'){beep(660,0,0.09,'sine',0.14);beep(880,0.08,0.12,'triangle',0.12);}else if(kind==='recordOnly'){beep(520,0,0.09,'sine',0.08);}else{beep(520,0,0.09,'sine',0.13);beep(330,0.075,0.18,'sine',0.14);}}catch(e){}}
function playAssetSound(path,fallback){let done=false;try{const a=new Audio(path);a.volume=.82;a.preload='auto';a.onerror=()=>{if(!done){done=true;fallback&&fallback();}};const p=a.play();if(p&&p.catch)p.catch(()=>{if(!done){done=true;fallback&&fallback();}});}catch(e){fallback&&fallback();}}
function playSound(kind,force){if(!D.soundOn&&!force)return;try{if(kind==='in'||kind==='income')playAssetSound(SOUND_ASSETS.income,()=>synthSound(kind));else if(kind==='out'||kind==='expense')playAssetSound(SOUND_ASSETS.expense,()=>synthSound(kind));else if(kind==='neutral'||kind==='transfer'||kind==='repay')playAssetSound(SOUND_ASSETS.neutral,()=>synthSound(kind));else synthSound(kind);}catch(e){}}
function previewSound(kind){playSound(kind,true);}
function toggleSound(){D.soundOn=!D.soundOn;save();render();if(D.soundOn)playSound('in',true);}
function toast(msg){clearTimeout(_tt);haptic(12);const o=document.getElementById('_t');if(o)o.remove();const el=document.createElement('div');el.id='_t';el.className='toast';el.textContent=msg;document.body.appendChild(el);_tt=setTimeout(()=>el.remove(),2200);}
// ── Calculator keypad for amount entry (supports + − × ÷) ──
let _kpTarget=null,_kpExpr='';
function kpEvalStr(s){s=(s||'').replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-');if(!/^[-+*/.0-9 ]*$/.test(s))return null;s=s.replace(/[+\-*/.]+$/,'');if(!s)return 0;try{const v=Function('return ('+s+')')();return isFinite(v)?v:null;}catch(e){return null;}}
function openKeypad(id){_kpTarget=id;const el=document.getElementById(id);_kpExpr=(el&&el.value)?(''+el.value):'';let o=document.getElementById('_kp');if(o)o.remove();o=document.createElement('div');o.id='_kp';o.className='kp-wrap';o.onclick=e=>{if(e.target===o)kpDone();};
  const keys=[['AC','fn'],['⌫','fn'],['÷','op'],['×','op'],['7',''],['8',''],['9',''],['−','op'],['4',''],['5',''],['6',''],['+','op'],['1',''],['2',''],['3',''],['=','op'],['00',''],['0',''],['.',''],['OK','ok']];
  o.innerHTML=`<div class="kp-panel"><div class="kp-disp"><div class="kp-expr" id="kp-expr">0</div><div class="kp-res" id="kp-res"></div></div><div class="kp-grid">${keys.map(k=>`<button class="kp-btn ${k[1]}" onclick="kpKey('${k[0]}')">${k[0]}</button>`).join('')}</div></div>`;
  document.body.appendChild(o);kpUpdate();}
function kpUpdate(){const e=document.getElementById('kp-expr'),rr=document.getElementById('kp-res');if(!e)return;const r=kpEvalStr(_kpExpr);e.textContent=_kpExpr||'0';rr.textContent=(r===null)?'—':('RM '+(Math.round(r*100)/100).toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2}));}
function kpKey(ch){if(ch==='AC')_kpExpr='';else if(ch==='⌫')_kpExpr=_kpExpr.slice(0,-1);else if(ch==='='){const r=kpEvalStr(_kpExpr);if(r!==null)_kpExpr=''+(Math.round(r*100)/100);}else if(ch==='OK'){kpDone();return;}else if('÷×−+'.indexOf(ch)>=0){if(!_kpExpr)return;if('÷×−+'.indexOf(_kpExpr.slice(-1))>=0)_kpExpr=_kpExpr.slice(0,-1);_kpExpr+=ch;}else if(ch==='.'){const last=_kpExpr.split(/[÷×−+]/).pop();if(last.indexOf('.')>=0)return;if(!last)_kpExpr+='0';_kpExpr+='.';}else _kpExpr+=ch;haptic(6);kpUpdate();}
function kpDone(){const r=kpEvalStr(_kpExpr);const el=document.getElementById(_kpTarget);if(el){el.value=(_kpExpr===''||r===null)?'':(''+(Math.round(r*100)/100));el.dispatchEvent(new Event('input',{bubbles:true}));}closeKeypad();}
function closeKeypad(){const o=document.getElementById('_kp');if(o)o.remove();_kpTarget=null;_kpExpr='';}
// ── 收据 / 附件（图片压缩 + PDF，存 data URL；可预览 + 下载）──
function compressImage(file,maxDim,quality,cb){const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height;if(w>h&&w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;}else if(h>=w&&h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',quality));};img.src=e.target.result;};r.readAsDataURL(file);}
function addAttach(input){const files=Array.from(input.files||[]);input.value='';if(!U.pendFiles)U.pendFiles=[];files.forEach(f=>{if(f.type&&f.type.indexOf('image')>=0){compressImage(f,1100,0.55,d=>{U.pendFiles.push({name:f.name||'photo.jpg',type:'image/jpeg',data:d});render();});}else if(f.type==='application/pdf'||/\.pdf$/i.test(f.name||'')){if(f.size>2200000){toast('PDF 太大（>2MB），压缩后再传');return;}const r=new FileReader();r.onload=e=>{U.pendFiles.push({name:f.name||'receipt.pdf',type:'application/pdf',data:e.target.result});render();};r.readAsDataURL(f);}else{toast('只支持图片或 PDF');}});}
function rmAttach(i){if(U.pendFiles)U.pendFiles.splice(i,1);render();}
function attachFieldHTML(){const fs=U.pendFiles||[];return `<div class="field"><label>收据 / 附件 <span style="color:var(--text3);font-weight:400">图片或 PDF · 可选</span></label>${fs.length?`<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px">${fs.map((f,i)=>`<div style="display:flex;align-items:center;gap:6px;background:var(--bg3);border-radius:10px;padding:6px 9px;font-size:12px;cursor:pointer" onclick="previewPend()">${f.type.indexOf('image')>=0?`<img src="${f.data}" style="width:26px;height:26px;border-radius:6px;object-fit:cover"/>`:`<i class="ti ti-file-type-pdf" style="color:var(--red);font-size:18px"></i>`}<span style="max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.name}</span><i class="ti ti-x" style="color:var(--text3)" onclick="event.stopPropagation();rmAttach(${i})"></i></div>`).join('')}</div>`:''}<div style="display:flex;gap:8px"><label class="btn" style="flex:1;justify-content:center;padding:11px;cursor:pointer;font-size:13.5px"><input type="file" accept="image/*" capture="environment" style="display:none" onchange="addAttach(this)"><i class="ti ti-camera" style="color:var(--accent)"></i> 拍照</label><label class="btn" style="flex:1;justify-content:center;padding:11px;cursor:pointer;font-size:13.5px"><input type="file" accept="image/*,application/pdf" multiple style="display:none" onchange="addAttach(this)"><i class="ti ti-paperclip" style="color:var(--accent)"></i> 选文件</label></div></div>`;}
let _fvFiles=[];
function openViewer(files){if(!files||!files.length)return;_fvFiles=files;let o=document.getElementById('_fv');if(o)o.remove();o=document.createElement('div');o.id='_fv';o.className='fv-wrap';o.onclick=e=>{if(e.target===o)o.remove();};o.innerHTML=`<div class="fv-box"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="font-weight:700;font-size:15px">收据 / 附件 (${files.length})</div><i class="ti ti-x" style="font-size:22px;color:var(--text3);cursor:pointer" onclick="document.getElementById('_fv').remove()"></i></div>${files.map((f,i)=>f.type.indexOf('image')>=0?`<img src="${f.data}" style="width:100%;border-radius:12px;margin-bottom:8px"/><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><span style="font-size:12px;color:var(--text3);max-width:55%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.name}</span><button class="btn" style="width:auto;padding:7px 14px;font-size:13px;margin:0" onclick="dlFile(${i})"><i class="ti ti-download"></i> 下载</button></div>`:`<div style="display:flex;align-items:center;gap:10px;background:var(--bg3);border-radius:12px;padding:14px;margin-bottom:10px"><i class="ti ti-file-type-pdf" style="color:var(--red);font-size:28px"></i><span style="flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.name}</span><button class="btn" style="width:auto;padding:7px 12px;font-size:13px;margin:0" onclick="dlFile(${i})">打开/下载</button></div>`).join('')}</div>`;document.body.appendChild(o);}
function dlFile(i){const f=_fvFiles[i];if(!f)return;fetch(f.data).then(r=>r.blob()).then(b=>{const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=f.name;document.body.appendChild(a);a.click();setTimeout(()=>{a.remove();URL.revokeObjectURL(u);},1500);}).catch(()=>{try{window.open(f.data);}catch(e){}});}
function previewPend(){openViewer(U.pendFiles||[]);}
function viewTxn(id){const t=D.txns.find(x=>x.id===id);if(t)openViewer(t.files||[]);}
function viewInc(id){const i=D.incomes.find(x=>x.id===id);if(i)openViewer(i.files||[]);}
function viewTax(id){const t=D.taxItems.find(x=>x.id===id);if(t)openViewer(t.files||[]);}
// in-app confirm dialog (replaces ugly native confirm)
function confirmSheet(title,msg,onYes,opts){opts=opts||{};const el=document.createElement('div');el.className='confirm-wrap';el.innerHTML=`<div class="confirm-box"><div class="confirm-title">${title}</div>${msg?`<div class="confirm-msg">${msg}</div>`:''}<div class="confirm-acts"><button class="confirm-btn" data-no>取消</button><button class="confirm-btn ${opts.danger?'danger':'ok'}" data-yes>${opts.okText||'确认'}</button></div></div>`;document.getElementById('app').appendChild(el);el.querySelector('[data-no]').onclick=()=>el.remove();el.querySelector('[data-yes]').onclick=()=>{el.remove();haptic(14);onYes&&onYes();};el.onclick=e=>{if(e.target===el)el.remove();};}

// LOCK SCREEN LOGIC  (auto-prompts Face ID ONCE — no loop)
// ══════════════════════════════════════════════════════
async function initSecurity(){
  const hasCred=SEC.hasSavedCred(),hasPIN=SEC.hasPIN();
  if(hasCred){LOCK.state='locked_face';renderLock();return;}
  if(hasPIN){LOCK.state='locked_pin';renderLock();return;}
  // no lock set — brand-new user sees welcome/login first; onboarded users go straight in
  if(!localStorage.getItem('rm_onboarded')){LOCK.state='welcome';renderLock();return;}
  unlock();
}
function guestMode(){localStorage.setItem('rm_onboarded','1');LOCK.state='sec_setup';renderLock();}
function skipSetup(){localStorage.setItem('rm_onboarded','1');unlock();}
async function tryFaceUnlock(){
  LOCK.pinError='';renderLock();
  const ok=await SEC.verifyWebAuthn();
  if(ok){unlock();return;}
  // Failure: fall back, do NOT re-trigger automatically
  if(SEC.hasPIN()){LOCK.state='locked_pin';LOCK.pinError='Face ID 失败，请输入 PIN';}
  else{LOCK.pinError='Face ID 验证未通过，点按钮重试';}
  renderLock();
}
async function setupFaceId(){
  LOCK.state='setup_webauthn';renderLock();
  const ok=await SEC.setupWebAuthn();
  if(ok){toast('✓ Face ID 设置成功');unlock();}
  else{LOCK.state='setup_pin';LOCK.setupPinStep=1;LOCK.setupPin='';LOCK.setupPinFirst='';LOCK.pinError='Face ID 不可用，请设置 PIN';renderLock();}
}
function startPinSetup(){LOCK.state='setup_pin';LOCK.setupPinStep=1;LOCK.setupPin='';LOCK.setupPinFirst='';LOCK.pinError='';renderLock();}
async function pinKeyPress(key){
  if(LOCK.state==='setup_pin'){
    if(LOCK.setupPin.length>=4)return;
    LOCK.setupPin+=key;LOCK.pinError='';renderLock();
    if(LOCK.setupPin.length===4){await new Promise(r=>setTimeout(r,250));
      if(LOCK.setupPinStep===1){LOCK.setupPinFirst=LOCK.setupPin;LOCK.setupPin='';LOCK.setupPinStep=2;renderLock();}
      else{if(LOCK.setupPin===LOCK.setupPinFirst){await SEC.savePin(LOCK.setupPin);toast('✓ PIN 设置成功');unlock();}
        else{LOCK.pinError='两次不一致，重新设置';LOCK.setupPin='';LOCK.setupPinStep=1;LOCK.setupPinFirst='';renderLock();}}}
  }else if(LOCK.state==='locked_pin'){
    if(LOCK.pinInput.length>=4)return;
    LOCK.pinInput+=key;LOCK.pinError='';renderLock();
    if(LOCK.pinInput.length===4){await new Promise(r=>setTimeout(r,250));
      if(await SEC.verifyPin(LOCK.pinInput))unlock();
      else{LOCK.pinAttempts++;LOCK.pinError=LOCK.pinAttempts>=5?'尝试次数过多':'PIN 错误，请重试';LOCK.pinInput='';renderLock();}}}
}
function pinDel(){if(LOCK.state==='setup_pin'){LOCK.setupPin=LOCK.setupPin.slice(0,-1);renderLock();}else if(LOCK.state==='locked_pin'){LOCK.pinInput=LOCK.pinInput.slice(0,-1);renderLock();}}
function unlock(){LOCK.state='unlocked';LOCK.pinInput='';LOCK.pinError='';LOCK.pinAttempts=0;LOCK.faceAutoTried=false;render();}
function lockApp(){const hasCred=SEC.hasSavedCred();LOCK.state=hasCred?'locked_face':(SEC.hasPIN()?'locked_pin':'setup_choice');LOCK.pinInput='';LOCK.pinError='';LOCK.faceAutoTried=true;/*manual lock → no auto face*/renderLock();}
// ── 锁屏设置（在设置里开关 Face ID / PIN）──
async function enableFaceId(){if(!SEC.isWebAuthnAvailable()){toast('此设备不支持 Face ID / 指纹');return;}const ok=await SEC.setupWebAuthn();if(ok){toast('✓ 已开启 Face ID 解锁');render();}else toast('设置未完成或被取消');}
function disableFaceId(){confirmSheet('关闭 Face ID 解锁？','关闭后打开 app 将不再用 Face ID 验证。',()=>{localStorage.removeItem(SEC.CRED_KEY);render();toast('已关闭 Face ID');},{danger:true,okText:'关闭'});}
function setupPinFromSettings(){closeModal();startPinSetup();}
function disablePin(){confirmSheet('关闭 PIN 码解锁？','关闭后打开 app 将不再要求输入 PIN。',()=>{localStorage.removeItem(SEC.PIN_KEY);render();toast('已关闭 PIN');},{danger:true,okText:'关闭'});}
function lockSettingsHTML(){const face=SEC.hasSavedCred(),pin=SEC.hasPIN(),faceAvail=SEC.isWebAuthnAvailable();
  let h=`<div class="ib ${(!face&&!pin)?'w':'b'}"><i class="ti ti-lock"></i>${(!face&&!pin)?'当前未开启锁，任何人拿到手机都能直接打开。建议至少开一种。':'开启后每次打开 app 都要验证，保护你的财务数据。'}</div>`;
  h+=`<div class="set-row"><span class="set-row-l"><i class="ti ti-face-id" style="color:var(--accent)"></i>Face ID / 指纹</span>${faceAvail?(face?`<button class="btn del" style="padding:7px 15px;font-size:13px;width:auto" onclick="disableFaceId()">关闭</button>`:`<button class="btn" style="padding:7px 15px;font-size:13px;width:auto" onclick="enableFaceId()">开启</button>`):`<span style="font-size:12px;color:var(--text3)">设备不支持</span>`}</div>`;
  h+=`<div class="set-row"><span class="set-row-l"><i class="ti ti-password" style="color:var(--accent)"></i>PIN 码${pin?' <span style="color:var(--green);font-size:11.5px;font-weight:700">已设</span>':''}</span><span style="display:flex;gap:8px">${pin?`<button class="btn" style="padding:7px 13px;font-size:13px;width:auto" onclick="setupPinFromSettings()">修改</button><button class="btn del" style="padding:7px 13px;font-size:13px;width:auto" onclick="disablePin()">关闭</button>`:`<button class="btn" style="padding:7px 15px;font-size:13px;width:auto" onclick="setupPinFromSettings()">设置</button>`}</span></div>`;
  return h;
}

// Re-lock when app returns from background — but DON'T auto-trigger face
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden&&LOCK.state==='unlocked'){
    const hasCred=SEC.hasSavedCred(),hasPIN=SEC.hasPIN();
    if(hasCred||hasPIN){LOCK.state=hasCred?'locked_face':'locked_pin';LOCK.pinInput='';LOCK.faceAutoTried=true;renderLock();}
  }
});

function renderLock(){
  const app=document.getElementById('app');
  const pin=LOCK.state==='setup_pin'?LOCK.setupPin:LOCK.pinInput;
  const pinLen=pin.length;
  if(LOCK.state==='unlocked'){render();return;}
  let html='<div class="lock-screen">';
  html+=`<div class="lock-logo"><i class="ti ti-shield-lock"></i></div>`;
  if(LOCK.state==='checking'){html+=`<div class="lock-title">RinggitMe</div><div class="lock-sub">正在验证…</div>`;}
  else if(LOCK.state==='welcome'){
    html+=`<div class="lock-title">RinggitMe</div><div class="lock-sub">登录可云端同步、换机恢复；也可先以游客身份本地使用。</div>`;
    html+=`<div class="setup-box"><div class="field" style="margin-bottom:10px"><label>邮箱</label><input id="au-email" type="email" autocomplete="username" placeholder="you@gmail.com"/></div><div class="field" style="margin-bottom:12px"><label>密码</label><input id="au-pw" type="password" autocomplete="current-password" placeholder="至少 6 位"/></div><div style="display:flex;gap:8px;margin-bottom:10px"><button class="face-btn" style="flex:1;margin:0;font-size:15px;padding:13px" onclick="authSignIn()">登录</button><button class="face-btn ghost" style="flex:1;margin:0;font-size:15px;padding:13px" onclick="authSignUp()">注册</button></div><button class="face-btn ghost" style="margin:0;font-size:15px;padding:13px" onclick="authGoogle()"><i class="ti ti-brand-google" style="color:#ea4335"></i> 用 Google 登录</button></div>`;
    html+=`<div class="pin-btn-link" onclick="guestMode()">先以游客身份使用（数据存本机）→</div>`;
  }
  else if(LOCK.state==='sec_setup'){
    html+=`<div class="lock-title">要加把锁吗？</div><div class="lock-sub">用 Face ID 或 PIN 保护财务数据。也可暂不设置，之后在设置里随时开启。</div>`;
    if(SEC.isWebAuthnAvailable())html+=`<button class="face-btn" onclick="setupFaceId()"><i class="ti ti-face-id" style="font-size:20px"></i>用 Face ID 加密</button>`;
    html+=`<button class="face-btn ghost" onclick="startPinSetup()"><i class="ti ti-lock" style="font-size:18px"></i>设置 PIN 码</button>`;
    html+=`<div class="pin-btn-link" onclick="skipSetup()">暂不设置，直接进入 →</div>`;
  }
  else if(LOCK.state==='setup_choice'){
    html+=`<div class="lock-title">保护你的数据</div><div class="lock-sub">第一次使用，选择解锁方式。数据只存在这台设备上。</div>`;
    if(SEC.isWebAuthnAvailable()){html+=`<button class="face-btn" onclick="setupFaceId()"><i class="ti ti-face-id" style="font-size:20px"></i>用 Face ID 解锁</button>
      <button class="face-btn ghost" onclick="startPinSetup()"><i class="ti ti-lock" style="font-size:18px"></i>用 PIN 码解锁</button>`;}
    else{html+=`<div class="setup-box"><p>当前环境不支持 Face ID（需在 HTTPS 或加到主屏幕后才可用），先用 4 位 PIN 码保护。</p></div>
      <button class="face-btn" onclick="startPinSetup()"><i class="ti ti-lock" style="font-size:18px"></i>设置 PIN 码</button>`;}
  }
  else if(LOCK.state==='setup_webauthn'){html+=`<div class="lock-title">设置 Face ID</div><div class="lock-sub">请按设备提示完成验证…</div><div style="font-size:46px;margin-top:18px">🔐</div>`;}
  else if(LOCK.state==='setup_pin'){
    html+=`<div class="lock-title">${LOCK.setupPinStep===1?'设置 PIN 码':'确认 PIN 码'}</div>
    <div class="lock-sub">${LOCK.setupPinStep===1?'输入 4 位数字':'再输入一次'}</div>
    <div class="pin-display">${[0,1,2,3].map(i=>`<div class="pin-dot ${i<pinLen?'filled':''}"></div>`).join('')}</div>
    <div class="pin-error">${LOCK.pinError}</div>${buildPinPad()}`;
  }
  else if(LOCK.state==='locked_face'){
    html+=`<div class="lock-title">RinggitMe</div><div class="lock-sub">用 Face ID 解锁你的财务数据</div>
    <button class="face-btn" onclick="tryFaceUnlock()"><i class="ti ti-face-id" style="font-size:20px"></i>Face ID 解锁</button>
    <div class="pin-error">${LOCK.pinError}</div>`;
    if(SEC.hasPIN())html+=`<div class="pin-btn-link" onclick="LOCK.state='locked_pin';LOCK.pinInput='';LOCK.pinError='';renderLock()">改用 PIN 码</div>`;
  }
  else if(LOCK.state==='locked_pin'){
    html+=`<div class="lock-title">RinggitMe</div><div class="lock-sub">输入 PIN 码解锁</div>
    <div class="pin-display">${[0,1,2,3].map(i=>`<div class="pin-dot ${i<pinLen?(LOCK.pinError?'error':'filled'):''}"></div>`).join('')}</div>
    <div class="pin-error">${LOCK.pinError}</div>
    ${LOCK.pinAttempts>0&&LOCK.pinAttempts<5?`<div class="pin-attempts">剩余尝试：${5-LOCK.pinAttempts} 次</div>`:''}
    ${buildPinPad()}`;
    if(SEC.hasSavedCred())html+=`<div class="pin-btn-link" onclick="LOCK.state='locked_face';LOCK.pinInput='';LOCK.pinError='';renderLock()"><i class="ti ti-face-id" style="font-size:14px;vertical-align:-2px"></i> 改用 Face ID</div>`;
  }
  // Tip: only show when NOT already running as an installed app
  var standalone=window.navigator.standalone===true||(window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches);
  if(!standalone&&LOCK.state!=='checking'&&LOCK.state!=='setup_webauthn'){
    html+=`<div style="position:absolute;left:0;right:0;bottom:calc(var(--safe-bot) + 18px);font-size:12px;color:var(--text3);display:flex;align-items:center;justify-content:center;gap:6px;padding:0 24px;line-height:1.5"><i class="ti ti-device-mobile-share" style="font-size:15px"></i>点 Safari「分享 → 加到主屏幕」，全屏体验更佳</div>`;
  }
  html+='</div>';

// Image upload → downscale to 120px square → base64 (keeps storage small)
function onIconUpload(input){
  const f=input.files&&input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{const img=new Image();img.onload=()=>{const S=120,c=document.createElement('canvas');c.width=S;c.height=S;const ctx=c.getContext('2d');const ratio=Math.max(S/img.width,S/img.height);const w=img.width*ratio,h=img.height*ratio;ctx.drawImage(img,(S-w)/2,(S-h)/2,w,h);U.selCustomImg=c.toDataURL('image/jpeg',0.82);U.selIconId=null;render();};img.onerror=()=>toast('图片读取失败');img.src=e.target.result;};
  r.readAsDataURL(f);
}

function billReminders(){const now=new Date(),T=now.getDate(),mo=todayISO().slice(0,7);const due=[];
  D.subs.forEach(s=>{if(s.lastPaid===mo)return;const diff=(s.day||1)-T;if(diff>=-3&&diff<=5)due.push({name:s.name,amt:s.amt,diff,type:'订阅'});});
  D.loans.forEach(l=>{if(l.lastPaid===mo)return;const diff=(l.dueDay||1)-T;if(diff>=-3&&diff<=5)due.push({name:l.name,amt:l.monthly,diff,type:'贷款/租金'});});
  if(!due.length)return '';due.sort((a,b)=>a.diff-b.diff);
  let h=`<div class="card" style="padding:13px 14px;margin-bottom:12px"><div style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--orange);margin-bottom:7px"><i class="ti ti-bell-ringing"></i>账单提醒</div>`;
  due.forEach(d=>{const lbl=d.diff<0?`已过 ${-d.diff} 天`:d.diff===0?'今天到期':`还有 ${d.diff} 天`;const col=d.diff<=0?'var(--red)':d.diff<=2?'var(--orange)':'var(--text2)';h+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 0;font-size:13px"><span style="color:var(--text2);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.name}</span><span style="display:flex;gap:10px;align-items:center;flex-shrink:0"><span style="color:${col};font-weight:600">${lbl}</span><span style="font-weight:700">${fmt(d.amt)}</span></span></div>`;});
  h+=`<div style="font-size:11px;color:var(--text3);margin-top:6px;cursor:pointer" onclick="setTab('fixed')">去「固定」页一键记账 →</div></div>`;return h;}
function netTrendHTML(net){const ym=todayISO().slice(0,7);if(!D.netSnaps)D.netSnaps={};if(D.netSnaps[ym]!==net){D.netSnaps[ym]=net;try{localStorage.setItem('rm_v3',JSON.stringify(D));}catch(e){}}
  const keys=Object.keys(D.netSnaps).sort().slice(-6);if(keys.length<2)return '';
  const vals=keys.map(k=>D.netSnaps[k]);const max=Math.max(...vals),min=Math.min(...vals,0),range=(max-min)||1;
  const first=vals[0],last=vals[vals.length-1],chg=last-first,pct=first?Math.round(chg/Math.abs(first)*100):0;

    }

function animateHeroNet(){
  const el=document.getElementById('heroNet');if(!el||D.privacyMode)return;
  const target=Math.abs(parseFloat(el.dataset.net)||0);if(!target)return;
  const dur=680,start=performance.now(),ease=t=>1-Math.pow(1-t,3);
  const fmtN=v=>'RM '+v.toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2});
  function frame(now){const t=Math.min(1,(now-start)/dur),v=target*ease(t);el.textContent=fmtN(v);if(t<1)requestAnimationFrame(frame);else el.textContent=fmtN(target);}
  requestAnimationFrame(frame);
}

    }

  });

// FINAL STABLE DATA CONSISTENCY + CALCULATOR PATCH
// Must stay AFTER all original function declarations so overrides really win.
// ══════════════════════════════════════════════════════
(function(){
  const sameId=(a,b)=>String(a)===String(b);
  const findCard=id=>(D.cards||[]).find(c=>sameId(c.id,id));
  const findTxnIndex=id=>(D.txns||[]).findIndex(t=>sameId(t.id,id));
  const normalOwed=c=>round2(money(c&&(c.currentOutstanding!=null?c.currentOutstanding:c.owed)));
  const setNormalOwed=(c,val)=>{if(!c)return;const n=round2(Math.max(0,money(val)));c.currentOutstanding=n;c.owed=n;if(n<=0)resetCardCycleIfCleared(c);c.availableLimit=getCardAvailableLimit(c);};
  window.rmRefreshDerived=function(){
    (D.cards||[]).forEach(c=>{if(c.type==='cc'){c.currentOutstanding=normalOwed(c);c.owed=c.currentOutstanding;c.availableLimit=getCardAvailableLimit(c);if(c.currentOutstanding<=0)resetCardCycleIfCleared(c);}});
    if(typeof syncAllFixedAAReceivables==='function')try{syncAllFixedAAReceivables();}catch(e){console.log('sync fixed AA skipped',e);}
  };
  window.applyTransactionBalanceEffect=function(tx){
    if(!tx||isRecordOnlyTransaction(tx))return true;
    const c=findCard(tx.payId),amt=round2(tx.amt);
    if(!c||!amt)return true;
    if(c.type==='cc'){
      const before=normalOwed(c),next=before+amt;
      setNormalOwed(c,next);
      if(before<=0&&next>0){const s=tx.isoDate||todayISO();c.currentCycleStartDate=s;c.autoDueDate=addDaysISO(s,30);}
      c.availableLimit=getCardAvailableLimit(c);
      return true;
    }
    if(c.type==='saving'||c.type==='ew'){
      if(money(c.balance)<amt){toast(c.type==='ew'?'eWallet 余额不足':'储蓄余额不足');return false;}
      c.balance=round2(money(c.balance)-amt);
      return true;
    }
    return true;
  };
  window.reverseTransactionBalanceEffect=function(tx){
    if(!tx||isRecordOnlyTransaction(tx))return true;
    const c=findCard(tx.payId),amt=round2(tx.amt);
    if(!c||!amt)return true;
    if(c.type==='cc'){setNormalOwed(c,normalOwed(c)-amt);return true;}
    if(c.type==='saving'||c.type==='ew'){c.balance=round2(money(c.balance)+amt);return true;}
    return true;
  };
  window.delTxn=function(id){
    const idx=findTxnIndex(id);if(idx<0)return;
    const old={...D.txns[idx]};
    reverseTransactionBalanceEffect(old);
    removeAAReceivable('txn',old.id);
    D.txns.splice(idx,1);
    rmRefreshDerived();
    save();try{swClose(null);}catch(e){}render();toast('已删除');
  };
  window.saveSpend=function(){
    const amt=pf('sp-amt');
    if(!amt){toast('请输入金额');return;}
    if(!U.selCatId){toast('请选择类别');return;}
    const cat=(D.spendCats||[]).find(c=>c.id===U.selCatId)||{label:'其他',icon:'ti-receipt'};
    const wasEdit=U.editId!==null&&U.editId!==undefined&&U.editId!=='';
    const idx=wasEdit?findTxnIndex(U.editId):-1;
    if(wasEdit&&idx<0){toast('找不到要编辑的记录');return;}
    const old=wasEdit?{...D.txns[idx]}:null;
    const payId=(U.selPayId!==null&&U.selPayId!==undefined&&U.selPayId!=='')?U.selPayId:(old?old.payId:null);
    const payCard=(payId!==null&&payId!==undefined)?findCard(payId):null;
    const postingMode=U.postingMode||(old&&old.postingMode)||'normal';
    const isoDate=v('sp-date')||todayISO();
    const txnTime=v('sp-time')||'';
    const txnDate=new Date(isoDate).toLocaleDateString('en-MY',{month:'short',day:'numeric'});
    const desc=v('sp-desc')||cat.label;
    let aaSplit=null;
    if(typeof buildSpendAASplit==='function')aaSplit=buildSpendAASplit(amt);else aaSplit=readAASplit('sp-amt',amt);
    if(aaSplit===false)return;
    const makeTxn=(id,base={})=>({...base,id,amt,desc,catId:U.selCatId,catLabel:cat.label,catIcon:cat.icon,payId,payName:payCard?payCard.name:null,postingMode,date:txnDate,isoDate,time:txnTime,files:(U.pendFiles||[]).slice(),aaSplit:aaSplit||null});
    let txn;
    const aaBackup=JSON.stringify(D.aaReceivables||[]);
    if(wasEdit){
      reverseTransactionBalanceEffect(old);
      removeAAReceivable('txn',old.id);
      txn=makeTxn(old.id,D.txns[idx]);
      if(!applyTransactionBalanceEffect(txn)){
        applyTransactionBalanceEffect(old);
        try{D.aaReceivables=JSON.parse(aaBackup);}catch(e){}
        return;
      }
      D.txns[idx]=txn;
    }else{
      txn=makeTxn(nid());
      if(!applyTransactionBalanceEffect(txn))return;
      D.txns.unshift(txn);
      const fav=document.getElementById('sp-fav');
      if(fav&&fav.checked&&desc)D.favs.push({id:nid(),name:desc,catId:U.selCatId,catLabel:cat.label,catIcon:cat.icon,amt,payId,payName:payCard?payCard.name:null});
      if(U.spTaxOn&&U.selTaxCat)D.taxItems.unshift({id:nid(),year:new Date(isoDate).getFullYear(),cat:U.selTaxCat,amount:amt,note:desc});
    }
    if(payCard&&payCard.type==='cc')ensureCardCycle(payCard,isoDate);
    if(aaSplit)upsertAAReceivable('txn',txn.id,amt,aaSplit,txn.desc);else removeAAReceivable('txn',txn.id);
    rmRefreshDerived();
    save();closeModal();
    toast(wasEdit?'✓ 已更新':(postingMode==='recordOnly'?'✓ 已补录 ':'✓ 已记录 ')+fmtR(amt));
    if(!wasEdit)playSound(postingMode==='recordOnly'?'recordOnly':'out');
  };
  window.savePay=function(ccId){
    const amt=pf('p-amt');if(!amt){toast('请输入金额');return;}
    const cc=findCard(ccId);if(!cc)return;
    const srcId=U.selSavId,src=(srcId&&srcId>0)?findCard(srcId):null;

  function isNumericInput(el){

})();

})();

  }

  function findDefaultPay(){const id=localStorage.getItem(DEFAULT_PAY_KEY)||'';return (D.cards||[]).find(c=>same(c.id,id))||null;}
  function resolvePay(payment){
    const p=norm(payment);
    if(p){
      const exact=(D.cards||[]).find(c=>norm(c.name)===p || p.includes(norm(c.name)) || norm(c.name).includes(p));
      if(exact)return exact;
      const loose=(D.cards||[]).find(c=>{
        const n=norm(c.name);return (p.includes('maybank')&&n.includes('maybank'))||(p.includes('tng')&&n.includes('tng'))||(p.includes('touchngo')&&n.includes('tng'))||(p.includes('grab')&&n.includes('grab'))||(p.includes('cash')&&/cash|现金/.test(n));
      });
      if(loose)return loose;
    }
    return findDefaultPay();
  }
  function guessSpendCat(text){
    const s=norm(text);
    const cats=D.spendCats||[];
    const want=(rx)=>cats.find(c=>rx.test(norm(c.label)));
    if(/kfc|mcd|mcdonald|starbucks|tealive|food|restaurant|cafe|kopitiam|mamak|餐|吃|喝/.test(s))return want(/餐|food|mamak|kopitiam|restaurant|咖啡/)||cats[0];
    if(/grab|petrol|shell|petronas|toll|parking|car|油|停车|过路/.test(s))return want(/油|petrol|grab|transport|parking|toll|车/)||cats[0];
    if(/shopee|lazada|mall|shopping|guardian|watson|购物|网购/.test(s))return want(/shopee|lazada|购物|网购|shopping|guardian|watson/)||cats[0];
    if(/netflix|spotify|icloud|youtube|subscription|订阅/.test(s))return want(/订阅|subscription/)||cats[0];

    const pay=((D.cards||[]).find(c=>same(c.id,raw.payment_id))||resolvePay(e.payment||''));

    const time=e.occurred_time||'';

  };
  const baseRender=window.render||render;
  window.render=function(){baseRender();maybeAutoSync();};
  const baseUnlock=window.unlock||unlock;
  window.unlock=function(){baseUnlock();maybeAutoSync();};
  window.addEventListener('online',maybeAutoSync);
})();
