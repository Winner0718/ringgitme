<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="RinggitMe"/>
<meta name="theme-color" content="#f5f5f0"/>
<title>RinggitMe</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#f5f5f0;--bg2:#ffffff;--bg3:#f0efea;--bg4:#e8e7e2;--text:#1a1a18;--text2:#4a4a45;--text3:#8a8a85;--border:#ddddd8;--border2:#c8c8c2;--green:#1a7a4a;--green-bg:#e8f5ee;--red:#c0392b;--red-bg:#fdecea;--blue:#1a5fa8;--blue-bg:#e8f0fa;--orange:#c05a00;--orange-bg:#fef3e2;--purple:#5a3a9a;--purple-bg:#f0ebfa;--r:14px;--rl:18px;--rx:22px;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a18;--bg2:#242420;--bg3:#2c2c28;--bg4:#343430;--text:#f0f0ec;--text2:#b8b8b4;--text3:#707070;--border:#3a3a36;--border2:#4a4a46;--green:#2ecc71;--green-bg:#0a2a18;--red:#e74c3c;--red-bg:#2a0c08;--blue:#5b9bd5;--blue-bg:#0c1e32;--orange:#e0820a;--orange-bg:#2a1800;--purple:#a07de0;--purple-bg:#1a0f2e;}}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
.app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden}
.topbar{padding:calc(var(--safe-top) + 12px) 16px 10px;display:flex;justify-content:space-between;align-items:center;background:var(--bg);border-bottom:.5px solid var(--border);flex-shrink:0}
.t-title{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.t-sub{font-size:11px;color:var(--text3);margin-top:1px}
.t-r{display:flex;gap:14px;align-items:center}
.t-r i{font-size:22px;color:var(--text3);cursor:pointer}
.content{flex:1;overflow-y:auto;padding:14px 14px calc(var(--safe-bot) + 80px);-webkit-overflow-scrolling:touch}
.nav{position:absolute;bottom:0;left:0;right:0;display:flex;background:var(--bg2);border-top:.5px solid var(--border);padding:8px 0 calc(var(--safe-bot) + 6px);justify-content:space-around}
.ni{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:var(--text3);cursor:pointer;padding:5px 10px;border-radius:10px;border:none;background:none;min-width:52px}
.ni.on{color:var(--blue);background:var(--blue-bg)}
.ni i{font-size:22px}
.card{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--r);padding:13px 14px;margin-bottom:8px}
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.sc{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--r);padding:11px 13px}
.sl{font-size:11px;color:var(--text3);margin-bottom:3px}
.sv{font-size:19px;font-weight:700;letter-spacing:-.3px}
.g{color:var(--green)}.r{color:var(--red)}.b{color:var(--blue)}.w{color:var(--orange)}
.sec{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin:16px 0 8px;display:flex;justify-content:space-between;align-items:center}
.sec-a{font-size:11px;color:var(--blue);cursor:pointer;text-transform:none;letter-spacing:0;font-weight:400}
.row{display:flex;align-items:center;gap:10px}
.ico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px}
.name{font-size:14px;font-weight:500;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{font-size:10px;padding:3px 8px;border-radius:99px;font-weight:600;flex-shrink:0}
.bcc{background:var(--red-bg);color:var(--red)}.bsav{background:var(--green-bg);color:var(--green)}.bew{background:var(--orange-bg);color:var(--orange)}.bsub{background:var(--blue-bg);color:var(--blue)}.bloan{background:var(--purple-bg);color:var(--purple)}
.dg{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:10px}
.db{background:var(--bg3);border-radius:9px;padding:8px 10px}
.dl{font-size:11px;color:var(--text3);margin-bottom:2px}
.dv{font-size:13px;font-weight:600;color:var(--text)}
.dv.r{color:var(--red)}.dv.g{color:var(--green)}.dv.w{color:var(--orange)}.dv.b{color:var(--blue)}
.prog{margin-top:10px}
.pl{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:4px}
.pt{background:var(--bg4);border-radius:99px;height:5px;overflow:hidden}
.pf{height:100%;border-radius:99px}
.acts{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.btn{font-size:12px;padding:7px 12px;border-radius:9px;border:.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap;font-weight:500}
.btn.pay{background:var(--blue-bg);border-color:transparent;color:var(--blue)}
.btn.topup{background:var(--green-bg);border-color:transparent;color:var(--green)}
.btn.spd{background:var(--orange-bg);border-color:transparent;color:var(--orange)}
.btn.del{color:var(--red);border-color:transparent}
.add-btn{width:100%;padding:12px;border-radius:var(--r);border:.5px dashed var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:8px;font-weight:500}
.empty{text-align:center;padding:36px 20px;color:var(--text3)}
.empty i{font-size:40px;display:block;margin-bottom:12px;opacity:.35}
.et{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:6px}
.es{font-size:13px;line-height:1.55}
.mb{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:flex-end}
.md{background:var(--bg2);border-radius:var(--rl) var(--rl) 0 0;padding:16px 18px calc(var(--safe-bot) + 24px);width:100%;max-height:90dvh;overflow-y:auto}
.md-handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:0 auto 16px}
.md-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;color:var(--text3);margin-bottom:5px;font-weight:600;letter-spacing:.02em;text-transform:uppercase}
.field input,.field select,.field textarea{width:100%;border-radius:10px;border:.5px solid var(--border2);padding:11px 13px;font-size:14px;color:var(--text);background:var(--bg3);outline:none;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--blue);background:var(--bg2)}
.field textarea{min-height:60px;resize:none}
.field-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.ma{display:flex;gap:8px;margin-top:18px}
.ma button{flex:1;padding:13px;border-radius:11px;font-size:14px;font-weight:600;cursor:pointer;border:.5px solid var(--border2);background:transparent;color:var(--text2)}
.ma .ok{background:var(--blue);color:#fff;border-color:transparent}
.ma .ok.g{background:var(--green);color:#fff}
.pill-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px}
.pill{font-size:12px;padding:6px 12px;border-radius:99px;border:.5px solid var(--border2);cursor:pointer;color:var(--text2);background:transparent;font-weight:500}
.pill.on{background:var(--blue);color:#fff;border-color:transparent}
.pill.og{background:var(--green);color:#fff;border-color:transparent}
.ib{border-radius:10px;padding:10px 13px;margin-bottom:11px;font-size:13px;display:flex;gap:9px;align-items:flex-start;line-height:1.5}
.ib i{font-size:16px;flex-shrink:0;margin-top:1px}
.ib.b{background:var(--blue-bg);color:var(--blue)}.ib.g{background:var(--green-bg);color:var(--green)}.ib.w{background:var(--orange-bg);color:var(--orange)}
.icon-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:8px;max-height:220px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.ig-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:9px 4px;border-radius:11px;cursor:pointer;border:1.5px solid transparent}
.ig-item.sel{border-color:var(--blue);background:var(--blue-bg)}
.ig-ico{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px}
.ig-label{font-size:10px;color:var(--text3);text-align:center;line-height:1.2}
.cdots{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.cdot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent}
.cdot.on{border-color:var(--text)}
.po{border:.5px solid var(--border);border-radius:11px;padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;margin-bottom:7px}
.po.on{border-color:var(--blue);background:var(--blue-bg)}
.po-ic{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.po-n{font-size:13px;font-weight:600;color:var(--text);flex:1}
.po-s{font-size:11px;color:var(--text3);margin-top:1px}
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:5px}
.cat-btn{padding:9px 10px;border-radius:10px;border:.5px solid var(--border);background:transparent;cursor:pointer;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px;text-align:left;font-weight:500;position:relative}
.cat-btn i{font-size:15px;flex-shrink:0}
.cat-btn.on{background:var(--orange-bg);color:var(--orange);border-color:transparent}
.cat-btn.add-c{border-style:dashed;color:var(--blue);border-color:var(--blue)}
.cat-del{position:absolute;top:4px;right:4px;font-size:11px;color:var(--red);opacity:0}
.cat-btn:hover .cat-del{opacity:1}
.txn{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:.5px solid var(--border)}
.txn:last-child{border-bottom:none}
.txn-ic{width:32px;height:32px;border-radius:9px;background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px}
.txn-m{flex:1;min-width:0}
.txn-n{font-size:13px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.txn-s{font-size:11px;color:var(--text3);margin-top:2px}
.txn-a{font-size:14px;font-weight:700;flex-shrink:0}
.txn-a.r{color:var(--red)}.txn-a.g{color:var(--green)}
.dh{display:flex;justify-content:space-between;align-items:center;margin:14px 0 7px}
.dh-l{font-size:13px;font-weight:700;color:var(--text2)}
.dh-r{font-size:13px;font-weight:600;color:var(--red)}
.aa-p{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--r);margin-bottom:9px;overflow:hidden}
.aa-h{display:flex;align-items:center;gap:11px;padding:13px 14px;cursor:pointer}
.aa-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.aa-info{flex:1;min-width:0}
.aa-name{font-size:14px;font-weight:600;color:var(--text)}
.aa-sub{font-size:11px;color:var(--text3);margin-top:2px}
.aa-bal{text-align:right;flex-shrink:0}
.aa-num{font-size:16px;font-weight:700}
.aa-lbl{font-size:10px;color:var(--text3);margin-top:1px}
.aa-body{border-top:.5px solid var(--border);padding:0 14px}
.aa-txn{display:flex;align-items:center;gap:9px;padding:10px 0;border-bottom:.5px solid var(--border)}
.aa-txn:last-child{border-bottom:none}
.aa-txn-ic{width:30px;height:30px;border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.aa-txn-m{flex:1;min-width:0}
.aa-txn-n{font-size:13px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.aa-txn-s{font-size:11px;color:var(--text3);margin-top:1px}
.aa-txn-r{text-align:right;flex-shrink:0;margin-right:4px}
.aa-txn-a{font-size:13px;font-weight:700}
.aa-txn-w{font-size:10px;color:var(--text3);margin-top:1px}
.aa-acts{display:flex;gap:6px;padding:10px 0 13px}
.fav-row{display:flex;align-items:center;gap:10px;background:var(--bg2);border:.5px solid var(--border);border-radius:var(--r);padding:11px 13px;margin-bottom:7px;cursor:pointer}
.toast{position:absolute;bottom:calc(var(--safe-bot) + 82px);left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);font-size:13px;font-weight:500;padding:10px 20px;border-radius:99px;white-space:nowrap;pointer-events:none;z-index:99}
.mode-row{display:flex;gap:8px;margin-bottom:13px}
.mode-card{flex:1;padding:11px 13px;border-radius:var(--r);border:.5px solid var(--border);text-align:center;cursor:pointer}
.mode-card.on-sal{background:var(--blue-bg);border-color:transparent}
.mode-card.on-fc{background:var(--orange-bg);border-color:transparent}
.mode-lbl{font-size:10px;color:var(--text3);margin-bottom:3px;font-weight:500}
.mode-val{font-size:13px;font-weight:600}
.chevron{font-size:14px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.rot{transform:rotate(180deg)}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const ICONS=[
  {id:'maybank',l:'Maybank',e:'🟡',c:'#F6C000',bg:'#FFF8DC'},{id:'cimb',l:'CIMB',e:'🔴',c:'#E41E24',bg:'#FDEAEA'},{id:'public',l:'Public Bank',e:'🔵',c:'#003087',bg:'#E8EEF8'},{id:'rhb',l:'RHB',e:'💛',c:'#FFCC00',bg:'#FFFAE0'},{id:'hlb',l:'Hong Leong',e:'🟤',c:'#6B3A2A',bg:'#F5EDE9'},{id:'ambank',l:'AmBank',e:'🟠',c:'#E87722',bg:'#FEF1E6'},{id:'bsn',l:'BSN',e:'🟢',c:'#00843D',bg:'#E6F5ED'},{id:'affin',l:'Affin Bank',e:'🔶',c:'#FF6600',bg:'#FFF0E6'},{id:'islamicbk',l:'Bank Islam',e:'☪️',c:'#007A3D',bg:'#E6F3EC'},{id:'bankrakyat',l:'Bank Rakyat',e:'🏦',c:'#004A99',bg:'#E6EDF8'},
  {id:'tng',l:"Touch 'n Go",e:'🔵',c:'#0058A2',bg:'#E6EFF9'},{id:'grabpay',l:'GrabPay',e:'🟢',c:'#00B14F',bg:'#E6F6ED'},{id:'boost',l:'Boost',e:'🔴',c:'#E8192C',bg:'#FDEAEC'},{id:'shopeepay',l:'ShopeePay',e:'🟠',c:'#EE4D2D',bg:'#FDEDE9'},{id:'mae',l:'MAE',e:'💛',c:'#F6C000',bg:'#FFFAE0'},{id:'bigpay',l:'BigPay',e:'🟦',c:'#00D4AA',bg:'#E6FAF5'},{id:'mcash',l:'mCash',e:'🟣',c:'#7B2FBE',bg:'#F2E8FB'},
  {id:'grab',l:'Grab',e:'🟢',c:'#00B14F',bg:'#E6F6ED'},{id:'shopee',l:'Shopee',e:'🟠',c:'#EE4D2D',bg:'#FDEDE9'},{id:'lazada',l:'Lazada',e:'🔵',c:'#0F146D',bg:'#E8E9F7'},{id:'foodpanda',l:'foodpanda',e:'🩷',c:'#D70F64',bg:'#FAE8F0'},{id:'mcdonalds',l:"McDonald's",e:'🟡',c:'#FFC72C',bg:'#FFFAE0'},{id:'kfc',l:'KFC',e:'🔴',c:'#E4002B',bg:'#FDEAEC'},{id:'starbucks',l:'Starbucks',e:'🟢',c:'#00704A',bg:'#E6F2EE'},{id:'guardian',l:'Guardian',e:'🔵',c:'#0066CC',bg:'#E6F0FA'},{id:'watson',l:'Watson',e:'🔵',c:'#003087',bg:'#E8EEF8'},{id:'tgv',l:'TGV',e:'🎬',c:'#E41E24',bg:'#FDEAEA'},{id:'gsc',l:'GSC',e:'🎬',c:'#002B5C',bg:'#E8ECF3'},{id:'netflix',l:'Netflix',e:'🔴',c:'#E50914',bg:'#FDEAEC'},{id:'spotify',l:'Spotify',e:'🟢',c:'#1DB954',bg:'#E7F8EE'},{id:'disney',l:'Disney+',e:'🔵',c:'#0063E5',bg:'#E8EFF8'},{id:'astro',l:'Astro',e:'📡',c:'#0066CC',bg:'#E6F0FA'},{id:'youtube',l:'YouTube',e:'🔴',c:'#FF0000',bg:'#FDEAEC'},{id:'icloud',l:'iCloud',e:'☁️',c:'#378ADD',bg:'#E6EFF9'},
  {id:'wallet',l:'Wallet',e:'👛',c:'#BA7517',bg:'#FEF3E2'},{id:'cash',l:'Cash',e:'💵',c:'#3B6D11',bg:'#EAF3DE'},{id:'card',l:'Card',e:'💳',c:'#378ADD',bg:'#E6EFF9'},{id:'loan',l:'Loan',e:'🏠',c:'#534AB7',bg:'#EEEDFE'},{id:'car',l:'Car',e:'🚗',c:'#D85A30',bg:'#FDEDE9'},{id:'star',l:'Custom',e:'⭐',c:'#888780',bg:'#F1EFE8'},
];
const COLORS=['#1a5fa8','#1a7a4a','#c05a00','#c0392b','#5a3a9a','#8B6914','#0058A2','#00B14F','#D62E31','#6B3A2A'];
const DEF_SPEND=[
  {id:'s1',label:'餐厅 Restaurant',icon:'ti-bowl',group:'食 Food'},{id:'s2',label:'Mamak / Kopitiam',icon:'ti-coffee',group:'食 Food'},{id:'s3',label:'Food delivery',icon:'ti-motorbike',group:'食 Food'},
  {id:'s4',label:'超市 Grocery',icon:'ti-shopping-cart',group:'购 Shopping'},{id:'s5',label:'Shopee / Lazada',icon:'ti-device-mobile',group:'购 Shopping'},{id:'s6',label:'Guardian / Watson',icon:'ti-heart',group:'购 Shopping'},
  {id:'s7',label:'Grab ride',icon:'ti-car',group:'行 Transport'},{id:'s8',label:'Toll 过路费',icon:'ti-road',group:'行 Transport'},{id:'s9',label:'Parking',icon:'ti-parking',group:'行 Transport'},{id:'s10',label:'油费 Petrol',icon:'ti-gas-station',group:'行 Transport'},
  {id:'s11',label:'TGV / GSC 电影',icon:'ti-movie',group:'乐 Entertainment'},{id:'s12',label:'Karaoke',icon:'ti-microphone',group:'乐 Entertainment'},
  {id:'s13',label:'诊所 Klinik',icon:'ti-stethoscope',group:'健 Health'},
  {id:'s14',label:'水电费 Utilities',icon:'ti-bolt',group:'杂 Others'},{id:'s15',label:'其他 Others',icon:'ti-dots',group:'杂 Others'},
];
const DEF_INCOME=[{id:'i1',label:'薪水 Salary',icon:'ti-building'},{id:'i2',label:'房产佣金 Comm.',icon:'ti-home-2'},{id:'i3',label:'外快 Side income',icon:'ti-sparkles'}];
const fresh=()=>({cards:[],subs:[],loans:[],txns:[],incomes:[],aaPeople:[],favs:[],incomeCats:JSON.parse(JSON.stringify(DEF_INCOME)),spendCats:JSON.parse(JSON.stringify(DEF_SPEND)),nextId:1,incomeMode:'salary',privacyMode:false});
const load=()=>{try{const r=localStorage.getItem('rm_v3');return r?JSON.parse(r):fresh();}catch{return fresh();}};
const save=()=>{try{localStorage.setItem('rm_v3',JSON.stringify(D));}catch{}};
let D=load();
let U={tab:'home',modal:null,expandedId:null,selIconId:null,selColor:COLORS[0],selCatId:null,selPayId:null,selSavId:null,selPaidBy:'me',selSplit:2,editId:null,activePersonId:null,activeEditTxnId:null,_presel:false};
const today=()=>new Date().toLocaleDateString('en-MY',{month:'short',day:'numeric'});
const todayISO=()=>new Date().toISOString().slice(0,10);
const fmt=n=>{if(D.privacyMode)return'RM ••••';return'RM '+parseFloat(Math.abs(n)||0).toFixed(2);};
const fmtR=n=>'RM '+parseFloat(Math.abs(n)||0).toFixed(2);
const pct=(u,l)=>Math.min(100,Math.round(((u||0)/(l||1))*100));
const nid=()=>D.nextId++;
const gi=id=>ICONS.find(i=>i.id===id)||{e:'💰',c:'#888',bg:'#eee',l:'?'};
let _tt;
function toast(msg){clearTimeout(_tt);const o=document.getElementById('_t');if(o)o.remove();const el=document.createElement('div');el.id='_t';el.className='toast';el.textContent=msg;document.getElementById('app').appendChild(el);_tt=setTimeout(()=>el.remove(),2200);}
const closeModal=()=>{U.modal=null;U.selIconId=null;U.selCatId=null;U.selPayId=null;U.selSavId=null;U.selPaidBy='me';U.selSplit=2;U.editId=null;U.activePersonId=null;U.activeEditTxnId=null;U._presel=false;render();};
const setTab=t=>{U.tab=t;U.modal=null;U.expandedId=null;render();};
const openModal=(m,ex={})=>{U.modal=m;Object.assign(U,ex);U.selColor=COLORS[0];U._presel=false;render();};
const toggle=id=>{U.expandedId=U.expandedId===id?null:id;render();};
const sIcon=id=>{U.selIconId=id;render();};
const sColor=c=>{U.selColor=c;render();};
const sPay=id=>{U.selPayId=id;render();};
const sSav=id=>{U.selSavId=id;render();};
const sCat=id=>{U.selCatId=id;render();};
const sPaidBy=v=>{U.selPaidBy=v;render();};
const sSplit=v=>{U.selSplit=parseInt(v);render();};
const togglePrivacy=()=>{D.privacyMode=!D.privacyMode;save();render();};
const toggleMode=()=>{D.incomeMode=D.incomeMode==='salary'?'fullcomm':'salary';save();render();};
const delCard=id=>{if(!confirm('删除？'))return;D.cards=D.cards.filter(c=>c.id!==id);save();render();};
const delSub=id=>{if(!confirm('删除？'))return;D.subs=D.subs.filter(s=>s.id!==id);save();render();};
const delLoan=id=>{if(!confirm('删除？'))return;D.loans=D.loans.filter(l=>l.id!==id);save();render();};
const delTxn=id=>{D.txns=D.txns.filter(t=>t.id!==id);save();render();};
const delFav=id=>{D.favs=D.favs.filter(f=>f.id!==id);save();render();};
const delIncomeCat=id=>{D.incomeCats=D.incomeCats.filter(c=>c.id!==id);save();render();};
const delSpendCat=id=>{D.spendCats=D.spendCats.filter(c=>c.id!==id);save();render();};
const delAAPerson=id=>{if(!confirm('删除？'))return;D.aaPeople=D.aaPeople.filter(p=>p.id!==id);save();render();};
const delAATxn=(pid,tid)=>{const p=D.aaPeople.find(p=>p.id===pid);if(p)p.txns=p.txns.filter(t=>t.id!==tid);save();render();};
const v=id=>{const el=document.getElementById(id);return el?el.value.trim():'';};
const pf=id=>{const el=document.getElementById(id);return el?parseFloat(el.value)||0:0;};
const pi=id=>{const el=document.getElementById(id);return el?parseInt(el.value)||0:0;};
function saveCard(type){const name=v('m-name');if(!name){alert('请输入名称');return;}const iconId=U.selIconId||'card';if(type==='cc'){D.cards.push({id:nid(),type:'cc',name,iconId,color:U.selColor,limit:pf('m-limit')||5000,owed:pf('m-owed')||0,dueDay:pi('m-due')||15});}else if(type==='saving'){D.cards.push({id:nid(),type:'saving',name,iconId,color:U.selColor,balance:pf('m-bal')||0});}else if(type==='ew'){D.cards.push({id:nid(),type:'ew',name,iconId,color:U.selColor,balance:pf('m-bal')||0});}save();closeModal();}
function saveSub(){const name=v('m-name');const amt=pf('m-amt');if(!name||!amt){alert('请填写名称和金额');return;}D.subs.push({id:nid(),name,iconId:U.selIconId||'star',color:U.selColor,amt,day:pi('m-day')||1});save();closeModal();}
function saveLoan(){const name=v('m-name');const monthly=pf('m-monthly');if(!name||!monthly){alert('请填写名称和月供');return;}D.loans.push({id:nid(),name,type:v('m-ltype'),color:U.selColor,monthly,remaining:pf('m-remaining')||0,total:pf('m-remaining')||0,dueDay:pi('m-due')||1});save();closeModal();}
function saveIncome(){const amt=pf('m-amt');const cat=U.selCatId;if(!amt||!cat){alert('请输入金额并选择类别');return;}D.incomes.push({id:nid(),amt,catId:cat,desc:v('m-desc'),date:v('m-date')||today()});save();closeModal();}
function saveIncomeCat(){const label=v('m-label');if(!label){alert('请输入名称');return;}D.incomeCats.push({id:'ic'+nid(),label,icon:'ti-sparkles'});save();closeModal();}
function saveSpendCat(){const label=v('m-label');if(!label){alert('请输入名称');return;}D.spendCats.push({id:'sc'+nid(),label,icon:'ti-dots',group:v('m-group')||'杂 Others',custom:true});save();closeModal();}
function saveSpend(){const amt=pf('sp-amt');if(!amt){alert('请输入金额');return;}if(!U.selCatId){alert('请选择类别');return;}const cat=D.spendCats.find(c=>c.id===U.selCatId);const payCard=U.selPayId?D.cards.find(c=>c.id===U.selPayId):null;const isoDate=v('sp-date')||todayISO();const txnDate=new Date(isoDate).toLocaleDateString('en-MY',{month:'short',day:'numeric'});if(U.editId){const idx=D.txns.findIndex(t=>t.id===U.editId);if(idx>-1)D.txns[idx]={...D.txns[idx],amt,desc:v('sp-desc')||cat.label,catId:U.selCatId,catLabel:cat.label,catIcon:cat.icon,payId:U.selPayId,payName:payCard?payCard.name:null,payType:payCard?payCard.type:null,date:txnDate,isoDate};}else{if(payCard){if(payCard.type==='cc')payCard.owed=parseFloat((payCard.owed+amt).toFixed(2));else if(payCard.type==='ew'){if(payCard.balance<amt){alert('余额不足');return;}payCard.balance=parseFloat((payCard.balance-amt).toFixed(2));}else if(payCard.type==='saving'){if(payCard.balance<amt){alert('余额不足');return;}payCard.balance=parseFloat((payCard.balance-amt).toFixed(2));}}const fav=document.getElementById('sp-fav');const desc=v('sp-desc');const txn={id:nid(),amt,desc:desc||cat.label,catId:U.selCatId,catLabel:cat.label,catIcon:cat.icon,payId:U.selPayId,payName:payCard?payCard.name:null,payType:payCard?payCard.type:null,date:txnDate,isoDate};D.txns.unshift(txn);if(fav&&fav.checked&&desc)D.favs.push({id:nid(),name:desc,catId:U.selCatId,catLabel:cat.label,catIcon:cat.icon,amt,payId:U.selPayId,payName:payCard?payCard.name:null,payType:payCard?payCard.type:null});}save();toast(U.editId?'✓ 已更新':'✓ 已记录 '+fmtR(amt));closeModal();}
function savePay(ccId){const amt=pf('p-amt');if(!amt){alert('请输入金额');return;}const cc=D.cards.find(c=>c.id===ccId);if(U.selSavId&&U.selSavId>0){const sav=D.cards.find(c=>c.id===U.selSavId);if(sav){if(sav.balance<amt){alert('储蓄余额不足');return;}sav.balance=parseFloat((sav.balance-amt).toFixed(2));}}cc.owed=parseFloat(Math.max(0,cc.owed-amt).toFixed(2));save();closeModal();toast('✓ 已还款');}
function saveTopup(savId){const amt=pf('t-amt');if(!amt){alert('请输入金额');return;}const s=D.cards.find(c=>c.id===savId);s.balance=parseFloat((s.balance+amt).toFixed(2));save();closeModal();toast('✓ 入账 '+fmtR(amt));}
function saveEwTopup(ewId){const amt=pf('ewt-amt');if(!amt){alert('请输入金额');return;}const ew=D.cards.find(c=>c.id===ewId);if(U.selSavId&&U.selSavId>0){const src=D.cards.find(c=>c.id===U.selSavId);if(src){if(src.type==='saving'&&src.balance<amt){alert('余额不足');return;}if(src.type==='saving')src.balance=parseFloat((src.balance-amt).toFixed(2));if(src.type==='cc')src.owed=parseFloat((src.owed+amt).toFixed(2));}}ew.balance=parseFloat((ew.balance+amt).toFixed(2));save();closeModal();toast('✓ 充值 '+fmtR(amt));}
function saveAAPerson(){const name=v('aa-name');if(!name){alert('请输入名字');return;}D.aaPeople.push({id:nid(),name,color:U.selColor,txns:[]});save();closeModal();}
function saveAATxn(){const p=D.aaPeople.find(p=>p.id===U.activePersonId);const desc=v('aa-desc');const total=pf('aa-total');if(!desc||!total){alert('请填写描述和金额');return;}const cat=U.selCatId?D.spendCats.find(c=>c.id===U.selCatId):null;const payCard=U.selPayId?D.cards.find(c=>c.id===U.selPayId):null;if(U.activeEditTxnId){const idx=p.txns.findIndex(t=>t.id===U.activeEditTxnId);if(idx>-1)p.txns[idx]={...p.txns[idx],desc,total,paidBy:U.selPaidBy,split:U.selSplit,catLabel:cat?cat.label:'其他',catIcon:cat?cat.icon:'ti-receipt',payId:U.selPayId,payName:payCard?payCard.name:null};}else{if(payCard&&U.selPaidBy==='me'){if(payCard.type==='cc')payCard.owed=parseFloat((payCard.owed+total).toFixed(2));else if(payCard.type==='ew'){if(payCard.balance<total){alert('余额不足');return;}payCard.balance=parseFloat((payCard.balance-total).toFixed(2));}}p.txns.push({id:nid(),desc,total,paidBy:U.selPaidBy,split:U.selSplit,catLabel:cat?cat.label:'其他',catIcon:cat?cat.icon:'ti-receipt',payId:U.selPayId,payName:payCard?payCard.name:null,date:today(),settled:false});}save();toast(U.activeEditTxnId?'✓ 已更新':'✓ 已记录');closeModal();}
function settleAA(pid){const p=D.aaPeople.find(p=>p.id===pid);p.txns.forEach(t=>t.settled=true);save();render();toast('✓ 已结算');}
function useFav(id){const f=D.favs.find(f=>f.id===id);if(!f)return;const payCard=f.payId?D.cards.find(c=>c.id===f.payId):null;if(payCard){if(payCard.type==='cc')payCard.owed=parseFloat((payCard.owed+f.amt).toFixed(2));else if(payCard.type==='ew'){if(payCard.balance<f.amt){alert('余额不足');return;}payCard.balance=parseFloat((payCard.balance-f.amt).toFixed(2));}}D.txns.unshift({id:nid(),amt:f.amt,desc:f.name,catId:f.catId,catLabel:f.catLabel,catIcon:f.catIcon,payId:f.payId,payName:f.payName,date:today(),isoDate:todayISO()});save();toast('✓ '+f.name+' '+fmtR(f.amt));render();}
function iconPicker(filter){let icons=ICONS;if(filter==='bank')icons=ICONS.slice(0,10);else if(filter==='ew')icons=ICONS.slice(10,17);else if(filter==='app')icons=ICONS.slice(17);return`<div class="icon-grid">${icons.map(ic=>`<div class="ig-item ${U.selIconId===ic.id?'sel':''}" onclick="sIcon('${ic.id}')"><div class="ig-ico" style="background:${ic.bg}">${ic.e}</div><div class="ig-label">${ic.l}</div></div>`).join('')}</div>`;}
function colorPicker(){return`<div class="cdots">${COLORS.map(c=>`<div class="cdot ${U.selColor===c?'on':''}" style="background:${c}" onclick="sColor('${c}')"></div>`).join('')}</div>`;}
function payOpts(incSav){const ccs=D.cards.filter(c=>c.type==='cc'),ews=D.cards.filter(c=>c.type==='ew'),savs=D.cards.filter(c=>c.type==='saving');let h='';const lbl=t=>`<div style="font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin:9px 0 5px">${t}</div>`;if(ccs.length){h+=lbl('信用卡');ccs.forEach(c=>{const ico=gi(c.iconId);h+=`<div class="po ${U.selPayId===c.id?'on':''}" onclick="sPay(${c.id})"><div class="po-ic" style="background:${c.color}20">${ico.e}</div><div style="flex:1"><div class="po-n">${c.name}</div><div class="po-s">欠 ${fmtR(c.owed)}</div></div>${U.selPayId===c.id?'<i class="ti ti-check" style="color:var(--blue);font-size:16px"></i>':''}</div>`;});}if(ews.length){h+=lbl('eWallet');ews.forEach(c=>{const ico=gi(c.iconId);h+=`<div class="po ${U.selPayId===c.id?'on':''}" onclick="sPay(${c.id})"><div class="po-ic" style="background:${c.color}">${ico.e}</div><div style="flex:1"><div class="po-n">${c.name}</div><div class="po-s">余额 ${fmtR(c.balance)}</div></div>${U.selPayId===c.id?'<i class="ti ti-check" style="color:var(--blue);font-size:16px"></i>':''}</div>`;});}if(incSav&&savs.length){h+=lbl('储蓄');savs.forEach(c=>{const ico=gi(c.iconId);h+=`<div class="po ${U.selPayId===c.id?'on':''}" onclick="sPay(${c.id})"><div class="po-ic" style="background:${c.color}20">${ico.e}</div><div style="flex:1"><div class="po-n">${c.name}</div><div class="po-s">余额 ${fmtR(c.balance)}</div></div>${U.selPayId===c.id?'<i class="ti ti-check" style="color:var(--blue);font-size:16px"></i>':''}</div>`;});}if(!h)h=`<div style="font-size:13px;color:var(--text3);padding:8px 0">还没有卡片 — 先去卡片 tab 添加</div>`;h+=`<div style="font-size:13px;color:var(--text3);margin-top:8px;cursor:pointer" onclick="sPay(null)"><i class="ti ti-x" style="font-size:13px"></i> 不指定</div>`;return h;}
function catPicker(){const groups=[...new Set(D.spendCats.map(c=>c.group))];let h='';groups.forEach(g=>{h+=`<div style="font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin:10px 0 5px">${g}</div><div class="cat-grid">`;D.spendCats.filter(c=>c.group===g).forEach(c=>{h+=`<button class="cat-btn ${U.selCatId===c.id?'on':''}" onclick="sCat('${c.id}')"><i class="ti ${c.icon}"></i>${c.label}${c.custom?`<span class="cat-del" onclick="event.stopPropagation();delSpendCat('${c.id}')"><i class="ti ti-x"></i></span>`:''}</button>`;});h+=`</div>`;});h+=`<div class="cat-grid" style="margin-top:8px"><button class="cat-btn add-c" onclick="openModal('addSpendCat')"><i class="ti ti-plus"></i>自定义添加</button></div>`;return h;}
function aaBal(p){let they=0,me=0;p.txns.filter(t=>!t.settled).forEach(t=>{const s=t.total/t.split;if(t.paidBy==='me')they+=s*(t.split-1);else me+=s;});return{they,me,net:they-me};}
function buildModal(){if(!U.modal)return'';const LTYPES=['车贷 Car loan','房贷 Home loan','房租 Rent','PTPTN','个人贷款','其他'];const GROUPS=['食 Food','购 Shopping','行 Transport','乐 Entertainment','健 Health','杂 Others'];let b='';
if(U.modal==='addcc'){b=`<div class="md-title"><i class="ti ti-credit-card" style="font-size:20px;color:var(--blue)"></i>添加信用卡</div><div class="field"><label>卡名</label><input id="m-name" placeholder="Maybank Visa Gold"/></div><div class="field"><label>选择图标 (银行)</label>${iconPicker('bank')}</div><div class="field"><label>颜色</label>${colorPicker()}</div><div class="field-row"><div class="field"><label>额度 (RM)</label><input id="m-limit" type="number" placeholder="5000"/></div><div class="field"><label>结单日</label><input id="m-due" type="number" min="1" max="31" placeholder="15"/></div></div><div class="field"><label>当前欠额 (RM)</label><input id="m-owed" type="number" placeholder="0"/></div><div class="ma"><button onclick="closeModal()">取消</button><button class="ok" onclick="saveCard('cc')">保存</button></div>`;}
else if(U.modal==='addsaving'){b=`<div class="md-title"><i class="ti ti-building-bank" style="font-size:20px;color:var(--green)"></i>添加储蓄账户</div><div class="field"><label>名称</label><input id="m-name" placeholder="Maybank Saving"/></div><div class="field"><label>选择图标 (银行)</label>${iconPicker('bank')}</div><div class="field"><label>颜色</label>${colorPicker()}</div><div class="field"><label>当前余额 (RM)</label><input id="m-bal" type="number" placeholder="0"/></div><div class="ma"><button onclick="closeModal()">取消</button><button class="ok g" onclick="saveCard('saving')">保存</button></div>`;}
else if(U.modal==='addew'){b=`<div class="md-title"><i class="ti ti-wallet" style="font-size:20px;color:var(--orange)"></i>添加电子钱包</div><div class="field"><label>名称</label><input id="m-name" placeholder="Touch n Go eWallet"/></div><div class="field"><label>选择图标 (eWallet)</label>${iconPicker('ew')}</div><div class="field"><label>颜色</label>${colorPicker()}</div><div class="field"><label>当前余额 (RM)</label><input id="m-bal" type="number" placeholder="0"/></div><div class="ma"><button onclick="closeModal()">取消</button><button class="ok" onclick="saveCard('ew')">保存</button></div>`;}
else if(U.modal==='addsub'){b=`<div class="md-title"><i class="ti ti-refresh" style="font-size:20px;color:var(--blue)"></i>添加订阅</div><div class="field"><label>名称</label><input id="m-name" placeholder="Netflix, Spotify, Astro..."/></div><div class="field"><label>选择图标 (App)</label>${iconPicker('app')}</div><div class="field"><label>颜色</label>${colorPicker()}</div><div class="field-row"><div class="field"><label>月费 (RM)</label><input id="m-amt" type="number" placeholder="17"/></div><div class="field"><label>扣款日</label><input id="m-day" type="number" min="1" max="31" placeholder="1"/></div></div><div class="ma"><button onclick="closeModal()">取消</button><button class="ok" onclick="saveSub()">保存</button></div>`;}
else if(U.modal==='addloan'){b=`<div class="md-title"><i class="ti ti-home" style="font-size:20px;color:var(--purple)"></i>添加贷款 / 租金</div><div class="field"><label>名称</label><input id="m-name" placeholder="Proton X50 车贷"/></div><div class="field"><label>类型</label><select id="m-ltype">${LTYPES.map(t=>`<option>${t}</option>`).join('')}</select></div><div class="field"><label>颜色</label>${colorPicker()}</div><div class="field-row"><div class="field"><label>月供 (RM)</label><input id="m-monthly" type="number" placeholder="700"/></div><div class="field"><label>还款日</label><input id="m-due" type="number" min="1" max="31" placeholder="10"/></div></div><div class="field"><label>剩余贷款 (RM) <span style="font-size:11px;color:var(--text3)">(可选)</span></label><input id="m-remaining" type="number" placeholder="38000"/></div><div class="ma"><button onclick="closeModal()">取消</button><button class="ok" onclick="saveLoan()">保存</button></div>`;}
else if(U.modal==='addincome'){b=`<div class="md-title"><i class="ti ti-plus" style="font-size:20px;color:var(--green)"></i>记录收入</div><div class="field"><label>金额 (RM)</label><input id="m-amt" type="number" placeholder="0.00" style="font-size:22px;font-weight:700"/></div><div class="field"><label>收入类别</label><div class="pill-row">${D.incomeCats.map(c=>`<div class="pill ${U.selCatId===c.id?'on':''}" onclick="sCat('${c.id}')">${c.label}</div>`).join('')}</div></div><div class="field"><label>描述 <span style="font-size:11px;color:var(--text3)">(可选)</span></label><input id="m-desc" placeholder="e.g. Taman Desa 佣金"/></div><div class="field"><label>日期</label><input id="m-date" placeholder="${today()}"/></div><div class="ma"><button onclick="closeModal()">取消</button><button class="ok g" onclick="saveIncome()">记录</button></div>`;}
else if(U.modal==='addIncomeCat'){b=`<div class="md-title"><i class="ti ti-plus" style="font-size:20px"></i>添加收入类别</div><div class="field"><label>名称</label><input id="m-label" placeholder="e.g. 介绍费, Grab Car, 副业收入"/></div><div class="ma"><button onclick="closeModal()">取消</button><button class="ok" onclick="saveIncomeCat()">添加</button></div>`;}
else if(U.modal==='addSpendCat'){b=`<div class="md-title"><i class="ti ti-plus" style="font-size:20px"></i>自定义消费类别</div><div class="field"><label>名称</label><input id="m-label" placeholder="e.g. KFC, Starbucks, 按摩"/></div><div class="field"><label>归入类别组</label><select id="m-group">${GROUPS.map(g=>`<option>${g}</option>`).join('')}</select></div><div class="ma"><button onclick="closeModal()">取消</button><button class="ok" onclick="saveSpendCat()">添加</button></div>`;}
else if(U.modal==='spend'){const ex=U.editId?D.txns.find(t=>t.id===U.editId):null;if(ex&&!U._presel){setTimeout(()=>{U.selCatId=ex.catId;U.selPayId=ex.payId;U._presel=true;render();},0);}b=`<div class="md-title"><i class="ti ti-shopping-bag" style="font-size:20px;color:var(--orange)"></i>${U.editId?'编辑消费':'快速记账'}</div><div class="field"><label>金额 (RM)</label><input id="sp-amt" type="number" placeholder="0.00" step="0.01" style="font-size:22px;font-weight:700" value="${ex?ex.amt:''}"/></div><div class="field"><label>描述 <span style="font-size:11px;color:var(--text3)">(可选，填了可存收藏)</span></label><input id="sp-desc" placeholder="e.g. KFC lunch with GF" value="${ex?ex.desc:''}"/></div><div class="field"><label>日期</label><input id="sp-date" type="date" value="${ex?ex.isoDate:todayISO()}"/></div><div class="field"><label>付款方式</label>${payOpts(true)}</div><div class="field"><label>消费类别</label>${catPicker()}</div>${!U.editId?`<div class="field" style="display:flex;align-items:center;gap:9px"><input type="checkbox" id="sp-fav" style="width:18px;height:18px"/><label for="sp-fav" style="font-size:13px;color:var(--text2);cursor:pointer;margin:0">存为收藏快捷</label></div>`:''}<div class="ma"><button onclick="closeModal()">取消</button><button class="ok" onclick="saveSpend()">${U.editId?'保存修改':'记录'}</button></div>`;}
else if(U.modal==='pay'){const cc=D.cards.find(c=>c.id===U.editId);const savs=D.cards.filter(c=>c.type==='saving');b=`<div class="md-title"><i class="ti ti-arrow-up" style="font-size:20px;color:var(--blue)"></i>还款 — ${cc.name}</div><div class="ib b"><i class="ti ti-info-circle"></i>当前欠额 ${fmtR(cc.owed)}</div><div class="field"><label>还款金额 (RM)</label><input id="p-amt" type="number" placeholder="${cc.owed.toFixed(2)}"/></div><div class="field"><label>从哪个账户还？</label><div class="pill-row">${savs.map(s=>`<div class="pill ${U.selSavId===s.id?'og':''}" onclick="sSav(${s.id})">${s.name} (${fmtR(s.balance)})</div>`).join('')}<div class="pill ${U.selSavId===0?'on':''}" onclick="sSav(0)">不指定</div></div></div><div class="ma"><button onclick="closeModal()">取消</button><button class="ok" onclick="savePay(${cc.id})">确认还款</button></div>`;}

function renderHome(){const ccs=D.cards.filter(c=>c.type==='cc'),savs=D.cards.filter(c=>c.type==='saving'),ews=D.cards.filter(c=>c.type==='ew');const totalOwed=ccs.reduce((a,c)=>a+c.owed,0),totalSav=savs.reduce((a,c)=>a+c.balance,0),totalEw=ews.reduce((a,c)=>a+c.balance,0);const totalSub=D.subs.reduce((a,s)=>a+s.amt,0),totalLoan=D.loans.reduce((a,l)=>a+l.monthly,0);const now=new Date(),thisMonth=D.txns.filter(t=>{const d=new Date(t.isoDate||Date.now());return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).reduce((a,t)=>a+t.amt,0);let h=`<div class="mode-row"><div class="mode-card ${D.incomeMode==='salary'?'on-sal':''}" onclick="if(D.incomeMode!=='salary')toggleMode()"><div class="mode-lbl">薪水模式</div><div class="mode-val" style="color:${D.incomeMode==='salary'?'var(--blue)':'var(--text2)'}">固定收入</div></div><div class="mode-card ${D.incomeMode==='fullcomm'?'on-fc':''}" onclick="if(D.incomeMode!=='fullcomm')toggleMode()"><div class="mode-lbl">全佣模式</div><div class="mode-val" style="color:${D.incomeMode==='fullcomm'?'var(--orange)':'var(--text2)'}">房产经纪</div></div></div><div class="sg"><div class="sc"><div class="sl">储蓄 Savings</div><div class="sv g">${fmt(totalSav)}</div></div><div class="sc"><div class="sl">CC 欠额</div><div class="sv r">${fmt(totalOwed)}</div></div><div class="sc"><div class="sl">eWallet</div><div class="sv w">${fmt(totalEw)}</div></div><div class="sc"><div class="sl">本月消费</div><div class="sv r">${fmt(thisMonth)}</div></div></div>`;

function renderFixed(){const totalSub=D.subs.reduce((a,s)=>a+s.amt,0),totalLoan=D.loans.reduce((a,l)=>a+l.monthly,0);let h=`<div class="sg"><div class="sc"><div class="sl">月订阅</div><div class="sv b">${fmt(totalSub)}</div></div><div class="sc"><div class="sl">月贷款/租金</div><div class="sv r">${fmt(totalLoan)}</div></div></div>`;if(totalSub+totalLoan>0)h+=`<div class="sc" style="margin-bottom:12px;padding:12px 14px"><div class="sl">月固定总支出</div><div class="sv r" style="font-size:23px">${fmt(totalSub+totalLoan)}</div></div>`;h+=`<div class="sec">订阅 Subscriptions</div>`;if(!D.subs.length)h+=`<div class="empty"><i class="ti ti-refresh"></i><div class="et">还没有订阅</div></div>`;D.subs.forEach(s=>{const ico=gi(s.iconId);h+=`<div class="card"><div class="row"><div class="ico" style="background:${s.color}18">${ico.e}</div><div class="name">${s.name}</div><span class="badge bsub">订阅</span></div><div class="dg"><div class="db"><div class="dl">月费</div><div class="dv b">${fmt(s.amt)}</div></div><div class="db"><div class="dl">扣款日</div><div class="dv">每月 ${s.day} 日</div></div></div><div class="acts"><button class="btn del" onclick="delSub(${s.id})"><i class="ti ti-trash" style="font-size:13px"></i>删除</button></div></div>`;});h+=`<button class="add-btn" onclick="openModal('addsub')"><i class="ti ti-plus"></i>添加订阅</button>`;h+=`<div class="sec">贷款 / 租金</div>`;if(!D.loans.length)h+=`<div class="empty"><i class="ti ti-home"></i><div class="et">还没有贷款记录</div></div>`;D.loans.forEach(l=>{const p=l.total>0?pct(l.total-l.remaining,l.total):0;h+=`<div class="card"><div class="row"><div class="ico" style="background:${l.color}18;font-size:22px">🏠</div><div class="name">${l.name}</div><span class="badge bloan">${l.type.split(' ')[0]}</span></div><div class="dg"><div class="db"><div class="dl">月供</div><div class="dv r">${fmt(l.monthly)}</div></div><div class="db"><div class="dl">还款日</div><div class="dv">${l.dueDay}日</div></div>${l.remaining?`<div class="db" style="grid-column:span 2"><div class="dl">剩余贷款</div><div class="dv">${fmt(l.remaining)}</div></div>`:''}</div>${l.total>0&&l.remaining?`<div class="prog"><div class="pl"><span>已还 ${p}%</span><span>剩 ${fmt(l.remaining)}</span></div><div class="pt"><div class="pf" style="width:${p}%;background:${l.color}"></div></div></div>`:''}<div class="acts"><button class="btn del" onclick="delLoan(${l.id})"><i class="ti ti-trash" style="font-size:13px"></i>删除</button></div></div>`;});h+=`<button class="add-btn" onclick="openModal('addloan')"><i class="ti ti-plus"></i>添加贷款 / 租金</button>`;return h;}
function renderAA(){if(!D.aaPeople.length)return`<div class="empty" style="margin-top:50px"><i class="ti ti-users"></i><div class="et">还没有分账记录</div><div class="es">添加朋友或女朋友<br>开始记录 AA 消费</div></div><button class="add-btn" onclick="openModal('addAAPerson')"><i class="ti ti-user-plus"></i>添加分账对象</button>`;let tThey=0,tMe=0;D.aaPeople.forEach(p=>{const b=aaBal(p);tThey+=b.they;tMe+=b.me;});let h=`<div class="sg"><div class="sc"><div class="sl">别人欠我</div><div class="sv g">${fmt(tThey)}</div></div><div class="sc"><div class="sl">我欠别人</div><div class="sv r">${fmt(tMe)}</div></div></div>`;D.aaPeople.forEach(p=>{const{they,me,net}=aaBal(p),unsettled=p.txns.filter(t=>!t.settled),settled=p.txns.filter(t=>t.settled),isOpen=U.expandedId===p.id;h+=`<div class="aa-p"><div class="aa-h" onclick="toggle(${p.id})"><div class="aa-av" style="background:${p.color}20;color:${p.color}">${p.name.slice(0,2).toUpperCase()}</div><div class="aa-info"><div class="aa-name">${p.name}</div><div class="aa-sub">${unsettled.length} 笔未结算</div></div><div class="aa-bal"><div class="aa-num" style="color:${net>0?'var(--green)':net<0?'var(--red)':'var(--text3)'}">${net===0?'—':(net>0?'+':'-')+fmtR(net)}</div><div class="aa-lbl">${net>0?'they owe':net<0?'you owe':'all clear'}</div></div><i class="ti ti-chevron-down chevron ${isOpen?'rot':''}"></i></div>`;if(isOpen){h+=`<div class="aa-body">`;if(!unsettled.length&&!settled.length)h+=`<div style="padding:16px 0;text-align:center;font-size:13px;color:var(--text3)">还没有记录，加一笔！</div>`;if(unsettled.length){h+=`<div style="font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin:12px 0 7px">未结算</div>`;unsettled.forEach(t=>{const myShare=t.total/t.split,owedAmt=myShare*(t.split-1),iAmOwed=t.paidBy==='me';h+=`<div class="aa-txn"><div class="aa-txn-ic"><i class="ti ${t.catIcon||'ti-receipt'}" style="color:var(--text3)"></i></div><div class="aa-txn-m"><div class="aa-txn-n">${t.desc}</div><div class="aa-txn-s">${t.catLabel||''} · ${t.date}${t.payName?' · '+t.payName:''} · 共${fmtR(t.total)} ÷${t.split}</div></div><div class="aa-txn-r"><div class="aa-txn-a" style="color:${iAmOwed?'var(--green)':'var(--red)'}">${iAmOwed?'+':'-'}${fmtR(owedAmt)}</div><div class="aa-txn-w">${iAmOwed?p.name.split(' ')[0]+' owes':'you owe'}</div></div><span onclick="openModal('addAATxn',{activePersonId:${p.id},activeEditTxnId:${t.id},selPaidBy:'${t.paidBy}',selSplit:${t.split}})" style="cursor:pointer;color:var(--blue);font-size:20px;padding:4px"><i class="ti ti-edit"></i></span><span onclick="delAATxn(${p.id},${t.id})" style="cursor:pointer;color:var(--text3);font-size:20px;padding:4px"><i class="ti ti-x"></i></span></div>`;});}if(settled.length){h+=`<div style="font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin:12px 0 7px">已结算 (${settled.length})</div>`;settled.slice(-2).forEach(t=>{h+=`<div class="aa-txn" style="opacity:.38"><div class="aa-txn-ic"><i class="ti ti-check" style="color:var(--text3)"></i></div><div class="aa-txn-m"><div class="aa-txn-n" style="text-decoration:line-through">${t.desc}</div><div class="aa-txn-s">${t.date}</div></div><div class="aa-txn-r"><div class="aa-txn-a" style="color:var(--text3)">${fmtR(t.total/t.split)}</div></div></div>`;});}h+=`<div class="aa-acts"><button class="btn pay" onclick="openModal('addAATxn',{activePersonId:${p.id},selPaidBy:'me',selSplit:2})"><i class="ti ti-plus" style="font-size:13px"></i>加记录</button>${net!==0?`<button class="btn topup" onclick="settleAA(${p.id})"><i class="ti ti-check" style="font-size:13px"></i>结算</button>`:''}<button class="btn del" onclick="delAAPerson(${p.id})"><i class="ti ti-trash" style="font-size:13px"></i></button></div></div>`;}h+=`</div>`;});h+=`<button class="add-btn" onclick="openModal('addAAPerson')"><i class="ti ti-user-plus"></i>添加分账对象</button>`;return h;}
function render(){const TABS=[{id:'home',i:'ti-home',l:'首页'},{id:'cards',i:'ti-credit-card',l:'卡片'},{id:'record',i:'ti-plus',l:'记账'},{id:'history',i:'ti-calendar',l:'记录'},{id:'fixed',i:'ti-repeat',l:'固定'},{id:'aa',i:'ti-users',l:'AA'}];const TITLES={home:'RinggitMe',cards:'卡片管理',record:'收入 & 记账',history:'消费记录',fixed:'固定支出',aa:'AA 分账'};const SUBS={home:'马来西亚理财 · 数据已保存',cards:'信用卡 · 储蓄 · eWallet',record:'收入追踪 · 快速记账',history:'按日期查看消费',fixed:'订阅 · 贷款 · 租金',aa:'分账追踪 · 随时结算'};let content='';if(U.tab==='home')content=renderHome();else if(U.tab==='cards')content=renderCards();else if(U.tab==='record')content=renderRecord();else if(U.tab==='history')content=renderHistory();else if(U.tab==='fixed')content=renderFixed();else if(U.tab==='aa')content=renderAA();document.getElementById('app').innerHTML=`<div class="topbar"><div><div class="t-title">${TITLES[U.tab]}</div><div class="t-sub">${SUBS[U.tab]}</div></div><div class="t-r"><i class="ti ${D.privacyMode?'ti-eye-off':'ti-eye'}" style="color:${D.privacyMode?'var(--orange)':'var(--text3)'}" onclick="togglePrivacy()" title="隐私模式"></i></div></div><div class="content">${content}</div><div class="nav">${TABS.map(t=>`<button class="ni ${U.tab===t.id?'on':''}" onclick="setTab('${t.id}')"><i class="ti ${t.i}"></i>${t.l}</button>`).join('')}</div>${buildModal()}`;}
render();
</script>
</body>
